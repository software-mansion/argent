openapi: '3.0.3'
info:
  title: radon-lite
  version: 0.1.0
  description: >
    HTTP server for controlling iOS simulators.
    Free-tier endpoints (touch, key, button, rotate, paste, scroll, MJPEG stream)
    work without a token. Screenshot, recording, and replay require a Pro/Team/Enterprise JWT.
servers:
  - url: http://localhost:3000
    description: Default local server

tags:
  - name: config
    description: Server configuration and token management
  - name: simulators
    description: Simulator lifecycle management
  - name: sessions
    description: Session lifecycle management
  - name: media
    description: Screenshot, recording, and replay (Pro)
  - name: input
    description: Touch, key, button, rotate, paste, scroll events
  - name: events
    description: Server-sent events stream

paths:
  /config:
    get:
      tags: [config]
      summary: Get server config
      description: Returns the current server configuration including default settings.
      operationId: getConfig
      responses:
        '200':
          description: Server configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'

  /fingerprint:
    get:
      tags: [config]
      summary: Get machine fingerprint
      description: Returns the unique hardware fingerprint for this machine, required when activating a license key.
      operationId: getFingerprint
      responses:
        '200':
          description: Machine fingerprint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FingerprintResponse'

  /token/verify:
    post:
      tags: [config]
      summary: Verify a JWT token
      description: Validates a JWT token and returns the associated plan and feature set.
      operationId: verifyToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The JWT token to verify
      responses:
        '200':
          description: Token verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerifyResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /token/activate:
    post:
      tags: [config]
      summary: Exchange license key for JWT
      description: >
        Activates a Radon IDE license key against the portal and returns a JWT token.
        The license key is a base64-encoded JSON object (`{"a":...,"t":...,"s":...}`).
        Error codes: E000=success, E001=notFound, E002=noSubscription (key claimed by different fingerprint).
      operationId: activateToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [licenseKey]
              properties:
                licenseKey:
                  type: string
                  description: Base64-encoded license activation key
                name:
                  type: string
                  description: Optional display name for the activation
      responses:
        '200':
          description: Activated JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for use with the simulator server
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /simulators:
    get:
      tags: [simulators]
      summary: List all simulators
      description: Returns all available iOS simulators known to Xcode / xcrun simctl.
      operationId: listSimulators
      responses:
        '200':
          description: List of simulators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimulatorInfo'
        '500':
          $ref: '#/components/responses/InternalError'

  /simulators/running:
    get:
      tags: [simulators]
      summary: List booted simulators
      description: Returns only simulators currently in the Booted state.
      operationId: listRunningSimulators
      responses:
        '200':
          description: List of booted simulators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimulatorInfo'
        '500':
          $ref: '#/components/responses/InternalError'

  /simulators/{udid}/boot:
    post:
      tags: [simulators]
      summary: Boot a simulator
      description: Boots the specified simulator via xcrun simctl.
      operationId: bootSimulator
      parameters:
        - $ref: '#/components/parameters/udid'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /simulators/{udid}/shutdown:
    post:
      tags: [simulators]
      summary: Shut down a simulator
      description: Shuts down the specified simulator via xcrun simctl.
      operationId: shutdownSimulator
      parameters:
        - $ref: '#/components/parameters/udid'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions:
    post:
      tags: [sessions]
      summary: Create session
      description: >
        Creates a new simulator session by launching the simulator-server binary for
        the given UDID. Returns the session object including the MJPEG stream URL.
        Optionally accepts a Pro JWT token to enable paywalled features.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [sessions]
      summary: List sessions
      description: Returns all active sessions.
      operationId: listSessions
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

  /sessions/{id}:
    get:
      tags: [sessions]
      summary: Get session
      description: Returns a single session by ID.
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [sessions]
      summary: Destroy session
      description: Terminates the simulator-server process and removes the session.
      operationId: destroySession
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/token:
    put:
      tags: [sessions]
      summary: Update session JWT
      description: Sends an updated JWT token to the running simulator-server process.
      operationId: updateSessionToken
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/settings:
    put:
      tags: [sessions]
      summary: Update replay / showTouches settings
      description: Updates replay buffering and touch pointer visibility for the session.
      operationId: updateSessionSettings
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/stream:
    get:
      tags: [media]
      summary: Get MJPEG stream URL
      description: Returns the MJPEG stream URL for the session. Open the URL in a browser or <img> tag for a live video feed. No token required.
      operationId: getStream
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: MJPEG stream URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/screenshot:
    post:
      tags: [media]
      summary: Take screenshot (Pro)
      description: >
        Captures a screenshot of the simulator screen. Requires a Pro/Team/Enterprise JWT.
        Without a valid token the binary silently ignores the command and the request
        times out after 15 seconds.
      operationId: takeScreenshot
      x-requires-token: Pro
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenshotRequest'
      responses:
        '200':
          description: Screenshot result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  url:
                    type: string
                    format: uri
                  filePath:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/record/start:
    post:
      tags: [media]
      summary: Start screen recording (Pro)
      description: >
        Begins recording the simulator screen. Requires a Pro/Team/Enterprise JWT.
        Stop with POST /sessions/{id}/record/stop to finalize and save the video.
      operationId: startRecording
      x-requires-token: Pro
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/record/stop:
    post:
      tags: [media]
      summary: Stop & save recording (Pro)
      description: >
        Stops the current screen recording and saves it to disk. Requires a Pro/Team/Enterprise JWT.
        Returns the video URL and file path once the binary emits `video_ready recording`.
      operationId: stopRecording
      x-requires-token: Pro
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordStopRequest'
      responses:
        '200':
          description: Saved recording
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/replay:
    post:
      tags: [media]
      summary: Save replay clips (Pro)
      description: >
        Saves one replay clip per requested duration from the rolling replay buffer.
        Requires replay to be enabled in session settings and a Pro/Team/Enterprise JWT.
        If the buffer contains less footage than a requested duration, the clip will
        include what is available and `durationSecs` will be `"full"`.
        Default durations: [5, 10, 30] seconds.
      operationId: saveReplay
      x-requires-token: Pro
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayRequest'
      responses:
        '200':
          description: Array of saved replay clips (one per requested duration)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VideoResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Replay is disabled for this session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/touch:
    post:
      tags: [input]
      summary: Send touch event
      description: >
        Sends a touch Down, Up, or Move event. Coordinates are normalized 0.0–1.0
        relative to the screen dimensions. Supports multi-touch by providing multiple
        points in the `points` array.
      operationId: sendTouchEvent
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TouchRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/key:
    post:
      tags: [input]
      summary: Send key event
      description: Sends a keyboard key Down or Up event using an integer key code.
      operationId: sendKeyEvent
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/button:
    post:
      tags: [input]
      summary: Press hardware button
      description: Simulates pressing or releasing a physical hardware button on the device.
      operationId: sendButtonEvent
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ButtonRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/rotate:
    post:
      tags: [input]
      summary: Rotate device
      description: Changes the simulated device orientation.
      operationId: rotateDevice
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/paste:
    post:
      tags: [input]
      summary: Paste text
      description: Pastes arbitrary text into the simulator as if typed from the clipboard.
      operationId: pasteText
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasteRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/input/scroll:
    post:
      tags: [input]
      summary: Scroll
      description: >
        Sends a scroll (wheel) event at the given normalized position with the
        specified delta values. Coordinates are normalized 0.0–1.0.
      operationId: sendScrollEvent
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrollRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sessions/{id}/events:
    get:
      tags: [events]
      summary: SSE event stream
      description: >
        Opens a Server-Sent Events (SSE) stream for the session. The client receives
        events as long as the session is alive.


        **Event types:**

        - `screenshot_ready` — `{"id": string, "url": string, "filePath": string}`

        - `screenshot_error` — `{"id": string, "message": string}`

        - `video_ready` — `{"id": "recording"|"replay", "durationSecs": number|"full", "url": string, "filePath": string}`

        - `video_error` — `{"id": string, "message": string}`

        - `fps_report` — `{"fps": number, "received": number, "dropped": number, "timestamp": number}`

        - `exit` — `{"code": number|null}`
      operationId: getEventStream
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: SSE stream (keep-alive, text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Newline-delimited Server-Sent Events. Each event has an `event:` type
                  line followed by a `data:` line containing a JSON payload.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    sessionId:
      name: id
      in: path
      required: true
      description: Session ID
      schema:
        type: string
    udid:
      name: udid
      in: path
      required: true
      description: Simulator UDID
      schema:
        type: string

  responses:
    Success:
      description: Operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: Missing or invalid request body field
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Session or simulator not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal or binary error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Config:
      type: object
      properties:
        port:
          type: integer
          example: 3000
        replay:
          type: boolean
          description: Whether replay buffering is enabled by default
        showTouches:
          type: boolean
          description: Whether touch pointer overlay is shown by default

    FingerprintResponse:
      type: object
      required: [fingerprint]
      properties:
        fingerprint:
          type: string
          description: Unique hardware fingerprint for this machine
          example: 5220ebeee9fbccff39a1530945e9e2b73f043918c784bff351747e02e43ce24c

    TokenVerifyResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        plan:
          type: string
          description: Subscription plan name (e.g. "Pro", "Team", "Enterprise")
          example: Pro
        features:
          type: object
          additionalProperties: true
          description: Feature flags enabled by the token
        reason:
          type: string
          description: >
            Reason for invalidity when valid=false.
            One of: corrupted, expired, fingerprint_mismatch, unknown.
          enum: [corrupted, expired, fingerprint_mismatch, unknown]

    SimulatorInfo:
      type: object
      required: [udid, name, state, deviceTypeId, runtimeId]
      properties:
        udid:
          type: string
          example: A1B2C3D4-E5F6-7890-ABCD-EF1234567890
        name:
          type: string
          example: iPhone 16 Pro
        state:
          type: string
          example: Booted
        deviceTypeId:
          type: string
          example: com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro
        runtimeId:
          type: string
          example: com.apple.CoreSimulator.SimRuntime.iOS-18-0

    SessionSettings:
      type: object
      properties:
        replay:
          type: boolean
          description: Whether the rolling replay buffer is active
        showTouches:
          type: boolean
          description: Whether the touch pointer overlay is visible

    Session:
      type: object
      required: [id, udid, streamUrl, state, createdAt, settings]
      properties:
        id:
          type: string
          example: sess_abc123
        udid:
          type: string
          example: A1B2C3D4-E5F6-7890-ABCD-EF1234567890
        streamUrl:
          type: string
          format: uri
          example: http://127.0.0.1:8080/stream.mjpeg
        state:
          type: string
          enum: [starting, ready, dead]
        createdAt:
          type: string
          format: date-time
        settings:
          $ref: '#/components/schemas/SessionSettings'

    VideoResult:
      type: object
      required: [url, filePath, durationSecs]
      properties:
        durationSecs:
          oneOf:
            - type: number
              description: Duration in seconds
              example: 5
            - type: string
              enum: [full]
              description: Returned when the buffer contained less footage than requested
        url:
          type: string
          format: uri
          description: URL to stream or download the video from the simulator-server binary
          example: http://127.0.0.1:8080/media/replay_5s.mp4
        filePath:
          type: string
          description: Absolute path to the saved video file on disk
          example: /tmp/radon/replay_5s.mp4

    TouchPoint:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Normalized horizontal position (0.0 = left, 1.0 = right)
        y:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Normalized vertical position (0.0 = top, 1.0 = bottom)

    DeviceOrientation:
      type: string
      enum:
        - Portrait
        - LandscapeLeft
        - LandscapeRight
        - PortraitUpsideDown

    ButtonName:
      type: string
      enum:
        - home
        - back
        - power
        - volumeUp
        - volumeDown
        - appSwitch
        - actionButton

    CreateSessionRequest:
      type: object
      required: [udid]
      properties:
        udid:
          type: string
          description: UDID of the simulator to attach to
          example: A1B2C3D4-E5F6-7890-ABCD-EF1234567890
        token:
          type: string
          description: Optional Pro/Team/Enterprise JWT to enable paywalled features
        replay:
          type: boolean
          description: Override the server default for replay buffering
        showTouches:
          type: boolean
          description: Override the server default for touch pointer overlay

    UpdateTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: New JWT token to send to the running simulator-server process

    UpdateSettingsRequest:
      type: object
      properties:
        replay:
          type: boolean
          description: Enable or disable the rolling replay buffer
        showTouches:
          type: boolean
          description: Show or hide the touch pointer overlay

    ScreenshotRequest:
      type: object
      properties:
        rotation:
          $ref: '#/components/schemas/DeviceOrientation'

    RecordStopRequest:
      type: object
      properties:
        rotation:
          $ref: '#/components/schemas/DeviceOrientation'

    ReplayRequest:
      type: object
      properties:
        rotation:
          $ref: '#/components/schemas/DeviceOrientation'
        durations:
          type: array
          items:
            type: integer
          description: Clip durations in seconds to save from the replay buffer
          example: [5, 10, 30]
          default: [5, 10, 30]

    TouchRequest:
      type: object
      required: [type, points]
      properties:
        type:
          type: string
          enum: [Down, Up, Move]
          description: Touch event phase
        points:
          type: array
          items:
            $ref: '#/components/schemas/TouchPoint'
          minItems: 1
          description: One or more touch contact points (multi-touch supported)

    KeyRequest:
      type: object
      required: [direction, keyCode]
      properties:
        direction:
          type: string
          enum: [Down, Up]
        keyCode:
          type: integer
          description: Integer key code for the key to simulate

    ButtonRequest:
      type: object
      required: [direction, button]
      properties:
        direction:
          type: string
          enum: [Down, Up]
        button:
          $ref: '#/components/schemas/ButtonName'

    RotateRequest:
      type: object
      required: [orientation]
      properties:
        orientation:
          $ref: '#/components/schemas/DeviceOrientation'

    PasteRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Text to paste into the simulator

    ScrollRequest:
      type: object
      required: [x, y, deltaX, deltaY]
      properties:
        x:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Normalized horizontal scroll origin
        y:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Normalized vertical scroll origin
        deltaX:
          type: number
          description: Horizontal scroll delta
        deltaY:
          type: number
          description: Vertical scroll delta

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
          example: Session not found

    StreamResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: MJPEG stream URL — open in a browser or <img> tag
          example: http://127.0.0.1:8080/stream.mjpeg
