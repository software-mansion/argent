[package]
name = "argent-vega-agent"
version = "0.1.0"
edition = "2021"
description = "On-device command agent for Argent Vega (Fire TV) automation"

[[bin]]
name = "argent-vega-agent"
path = "src/main.rs"

[dependencies]
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
