  Screen-recording corner watermark - DESIGN SOURCE.

  The Argent wordmark + mark with a "By @swmansion" tagline, rendered by the
  finishing step (finish-recording.ts). The mark is drawn monochrome (white);
  finish-recording derives a near-black copy at runtime and picks between the
  two per pixel for maximum contrast against whatever is behind the watermark.

  This SVG is the human-editable source. The runtime consumes a rasterized PNG
  of it, embedded as base64 in watermark-asset.ts (no rasterizer is required at
  runtime). To regenerate after editing this file:

    rsvg-convert -w 900 watermark.svg -o watermark.png
    # then refresh WATERMARK_PNG_BASE64 in ../watermark-asset.ts from watermark.png

  Keep the viewBox aspect ratio in sync with LOGO_ASPECT in finish-recording.ts.
-->
