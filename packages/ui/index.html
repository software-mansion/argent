        return new Promise((resolve) => {
          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            describeWaker = null;
            resolve();
          };
          const floor = Math.max(0, Math.min(floorMs || 0, ms));
          describeKicked = false;
          setTimeout(() => {
            if (done) return;
            const rest = ms - floor;
            if (rest <= 0 || describeKicked) return finish();
            const t = setTimeout(finish, rest);
            describeWaker = () => {
              clearTimeout(t);
              finish();
            };
          }, floor);
        });
      }
      // Single loop (started once, never twice). Background cadence ~300ms
      // while work is on screen; a kick from sendCmd() collapses the wait to
      // the floor so connectors chase live drags/scrolls, then it idles at
      // 900ms when there is nothing to track.
      let describeLoopArmed = false;
      async function pollDescribe() {
        if (describeLoopArmed) return;
        describeLoopArmed = true;
        for (;;) {
          const t0 = Date.now();
          await describeOnce();
          const need = currentUdid && (vp.proposals.length > 0 || vp.inspect);
          const base = need ? Math.max(160, 300 - (Date.now() - t0)) : 900;
          await describeDelay(base, need ? 130 : 0);
        }
      }

      function setNote(text, kind) {
        completeNote.textContent = text || "";
        completeNote.className = "complete-note" + (kind ? " " + kind : "");
      }
      function vpStage(elementId, variantId) {
        // Re-clicking the already-staged variant unstages — this is how the
        // user re-expands the card to see every variant again after picking
        // one. Clicking a different variant simply swaps the selection.
        if (vp.staged[elementId] === variantId) {
          delete vp.staged[elementId];
        } else {
          vp.staged[elementId] = variantId;
        }
        setNote("");
        vpRender();
      }

      // ── Floating cards + connectors ─────────────────────────────────────
      function previewSrc(p, v) {
        if (!v.previewImage) return null;
        if (/^(https?:|data:)/i.test(v.previewImage)) return v.previewImage;
        return `${TOOL_SERVER}/preview/variant-image/${encodeURIComponent(
          p.id
        )}/${encodeURIComponent(v.id)}`;
      }

      // Crop the variant screenshot down to just the target element's box so
      // the thumbnail shows the element — not the whole device screen squeezed
      // into a chip. Letterboxed (no distortion). Falls back to the full,
      // contained image when the element isn't matched on-screen or the agent
      // supplied a data: URI (treated as author-made art, shown whole).
      function applyThumbCrop(tw, frame) {
        const im = tw.querySelector(".thumb-img");
        if (!im || !im.naturalWidth || !im.naturalHeight) return;
        // Prefer the per-variant frame stashed on the thumb (each variant's
        // layout differs); the passed `frame` is the per-element fallback.
        if (tw._variantFrame) frame = tw._variantFrame;
        const NW = im.naturalWidth,
          NH = im.naturalHeight;
        let fx = 0,
          fy = 0,
          fw = 1,
          fh = 1;
        const finite = (n) => typeof n === "number" && isFinite(n);
        if (
          frame &&
          !tw._noCrop &&
          finite(frame.x) &&
          finite(frame.y) &&
          finite(frame.width) &&
          finite(frame.height)
        ) {
          fx = Math.max(0, Math.min(1, frame.x));
          fy = Math.max(0, Math.min(1, frame.y));
          fw = Math.max(0.02, Math.min(1 - fx, frame.width));
          fh = Math.max(0.02, Math.min(1 - fy, frame.height));
        }
        // Arrangement follows the *shown* (cropped) image aspect: stack the
        // image above the text (column) unless the preview is clearly
        // portrait — at least 1.2× taller than wide — where a side-by-side
        // row reads better. rw=fw*NW, rh=fh*NH (cropped region, px).
        const _vr = tw.closest(".vrow");
        if (_vr) _vr.classList.toggle("col", !(fh * NH >= 1.2 * (fw * NW)));
        // Width is part of the cache key so a scrollbar appearing or
        // disappearing (no stable gutter) busts the cache and re-fits.
        const _vrW = _vr ? _vr.clientWidth : 0;
        const key = `${NW}x${NH}:${fx.toFixed(4)},${fy.toFixed(4)},${fw.toFixed(4)},${fh.toFixed(4)}:${_vrW}`;
        if (tw._cropKey === key) return; // unchanged — avoid layout thrash
        tw._cropKey = key;
        const rw = fw * NW,
          rh = fh * NH,
          rx = fx * NW,
          ry = fy * NH;
        const ar = rw / rh; // shown (cropped) aspect, width / height
        // Fill the space the bubble actually gives the preview instead of a
        // fixed 96px chip: the full row content width when stacked (column),
        // a generous height when side-by-side (row). The card width is fixed
        // but the row's content box shrinks when a scrollbar appears, so the
        // cache key above includes the row's clientWidth — the cache then
        // misses on scrollbar toggle and the preview re-fits to the new
        // width instead of overhanging.
        const colMode = _vr ? _vr.classList.contains("col") : false;
        const availW = Math.max(120, (_vr ? _vr.clientWidth : 212) - 20);
        let W, H;
        if (colMode) {
          W = availW;
          H = Math.round(W / ar);
          H = Math.max(56, Math.min(H, Math.round(W * 1.25)));
        } else {
          H = 160;
          W = Math.round(H * ar);
          W = Math.max(56, Math.min(W, Math.round(availW * 0.46)));
        }
        tw.style.width = W + "px";
        tw.style.height = H + "px";
        const s = Math.min(W / rw, H / rh); // contain element region (letterbox)
        im.style.width = NW * s + "px";
        im.style.height = NH * s + "px";
        im.style.left = (W - rw * s) / 2 - rx * s + "px";
        im.style.top = (H - rh * s) / 2 - ry * s + "px";
      }

      function buildCard(p) {
        const el = document.createElement("div");
        el.className = "vcard";

        const head = document.createElement("div");
        head.className = "vcard-head";
        const dot = document.createElement("span");
        dot.className = "dot";
        const nm = document.createElement("span");
        nm.className = "nm";
        nm.textContent = p.element;
        const where = document.createElement("span");
        where.className = "where";
        head.append(dot, nm, where);
        el.appendChild(head);

        head.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          const mr = mainEl.getBoundingClientRect();
          vp.cardDragging = true;
          // Grab the card where the pointer landed, not by its top-centre.
          // Without this offset the card would jump so the pointer sits at
          // (width/2, 12) on the first move event.
          const startRec = vp.cards.get(p.id);
          const startEl = startRec ? startRec.el : el;
          const cr0 = startEl.getBoundingClientRect();
          const grabX = ev.clientX - cr0.left;
          const grabY = ev.clientY - cr0.top;

          let lcx = ev.clientX,
            lcy = ev.clientY,
            lt = performance.now(),
            vx = 0,
            vy = 0;

            // Resolve the live rec/el each move so a poll-driven rebuild
            // (rare while dragging — guarded) can't strand the drag.
            const rec = vp.cards.get(p.id);
            const node = rec ? rec.el : el;
            const x = m.clientX - mr.left - grabX;
            const y = m.clientY - mr.top - grabY;
            // EMA of pointer velocity in px/s (smooths the last-sample spike).
            const now = performance.now();
            const dt = Math.max(8, now - lt);
            vx = ((m.clientX - lcx) / dt) * 1000 * 0.6 + vx * 0.4;
            vy = ((m.clientY - lcy) / dt) * 1000 * 0.6 + vy * 0.4;
            lcx = m.clientX;
            lcy = m.clientY;
            lt = now;
            if (rec) {
              // Pin where the user drops it; freeze the spring so it doesn't
              // fight the pointer (the rAF tick reads pos/home).
              rec.dragging = true;
              rec.pinned = true;
              rec.pos = { x, y };
              rec.home = { x, y };
              rec.vel = { x: 0, y: 0 };
            }
            node.style.left = x + "px";
            node.style.top = y + "px";
          };
          const up = () => {
            vp.cardDragging = false;
            const rec = vp.cards.get(p.id);
            if (rec) {
              rec.dragging = false;
              // Throw: hand the release velocity to the BUB spring, which
              // carries it briefly then damps it back to rest — the same
              // toss feel as a bubble spawning in. Clamp so a hard flick
              // can't fling it across the screen.
              const cap = THEME.flickMaxVel;
              const cl = (v) => (v < -cap ? -cap : v > cap ? cap : v);
              let releaseVx = 0;
              let releaseVy = 0;
              if (Math.abs(vx) > 40 || Math.abs(vy) > 40) {
                releaseVx = cl(vx);
                releaseVy = cl(vy);
              }
              // Out-of-bounds recovery: when the user drops the bubble
              // past a viewport edge, bias home back to the nearest
              // in-bounds point and add inward velocity so the spring
              // pulls the bubble back with momentum (not a snap). The pos
              // stays at the drop point — the bubble flies in smoothly.
              const elW = rec.el.offsetWidth || 0;
              const elH = rec.el.offsetHeight || 0;
              const mr2 = mainEl.getBoundingClientRect();
              const PAD = 8;
              const minXb = PAD,
                maxXb = mr2.width - elW - PAD;
              const minYb = PAD,
                maxYb = mr2.height - elH - PAD;
              const hx = Math.max(minXb, Math.min(maxXb, rec.pos.x));
              const hy = Math.max(minYb, Math.min(maxYb, rec.pos.y));

              let ky = 0;
              const KICK = 700; // px/s — strong enough to feel decisive
              if (rec.pos.x < minXb) kx = +KICK;
              else if (rec.pos.x > maxXb) kx = -KICK;
              if (rec.pos.y < minYb) ky = +KICK;
              else if (rec.pos.y > maxYb) ky = -KICK;

              rec.vel = { x: cl(releaseVx + kx), y: cl(releaseVy + ky) };
            }

            window.removeEventListener("pointerup", up);
            window.removeEventListener("pointercancel", up);
          };
          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
          window.addEventListener("pointercancel", up);
        });

        const body = document.createElement("div");
        body.className = "vcard-body";
        for (const v of p.variants) {
          const row = document.createElement("div");
          row.className = "vrow" + (vp.staged[p.id] === v.id ? " staged" : "");
          row.dataset.vid = v.id;
          row.draggable = true;
          row.addEventListener("dragstart", (ev) => {
            row.classList.add("dragging");
            vp.dragging = true;
            ev.dataTransfer.setData(
              "application/json",
              JSON.stringify({ elementId: p.id, variantId: v.id })
            );
            ev.dataTransfer.effectAllowed = "copy";

          row.addEventListener("dragend", () => {
            row.classList.remove("dragging");
            vp.dragging = false;
          });
          row.addEventListener("click", () => vpStage(p.id, v.id));

          const src = previewSrc(p, v);
          if (src) {
            const tw = document.createElement("div");
            tw.className = "thumb";
            // data: previews are author-supplied art — show whole, don't crop.
            tw._noCrop = /^data:/i.test(src);
            // Per-variant crop frame: the element's bounds WHEN THIS VARIANT was
            // captured (supplied by propose_variant). The layout differs between
            // variants, so each thumbnail must crop to its own bounds. Falls back
            // to the per-element frozen frame (vp.thumbFrames[p.id]) when absent.
            tw._variantFrame = v.frame || null;
            const im = document.createElement("img");
            im.className = "thumb-img";
            im.draggable = false;
            im.alt = v.name;
            im.onload = () => applyThumbCrop(tw, vp.thumbFrames[p.id]);
            im.onerror = () => {
              tw.replaceWith(placeholderThumb());
            };
            im.src = src;
            tw.appendChild(im);
            row.appendChild(tw);
          } else {
            row.appendChild(placeholderThumb());
          }

          const meta = document.createElement("div");
          meta.className = "meta";
          const vn = document.createElement("div");
          vn.className = "vn";
          const vnt = document.createElement("span");
          vnt.textContent = v.name;
          vn.appendChild(vnt);
          if (vp.staged[p.id] === v.id) {
            const tag = document.createElement("span");
            tag.className = "tag";
            tag.textContent = "✓ staged";
            vn.appendChild(tag);
          }
          meta.append(vn);
          // Intentionally NOT rendering v.summary / v.code / v.filePath: the
          // human is picking a look from the preview + name, not reading a
          // spec. The agent still keeps that metadata in the proposal for
          // when it applies the choice.
          row.appendChild(meta);
          body.appendChild(row);
        }
        el.appendChild(body);

        const cmt = document.createElement("textarea");
        cmt.className = "vcard-cmt";
        cmt.placeholder = `Comment on "${cleanLabel(p.element) || p.element}" (optional)…`;
        cmt.value = vp.comments[p.id] || "";
        cmt.addEventListener("input", () => {
          vp.comments[p.id] = cmt.value;
        });
        cmt.addEventListener("pointerdown", (e) => e.stopPropagation());
        el.appendChild(cmt);
        return el;
      }
      function placeholderThumb() {
        const d = document.createElement("div");
        d.className = "thumb placeholder";
        d.textContent = "no preview";
        return d;
      }

      // Structural signature — a card is only torn down & rebuilt when the
      // agent actually changed its variants, never on a routine poll (so the
      // per-card comment box keeps focus and the variant list keeps its
      // scroll position).
      function cardSig(p) {
        return JSON.stringify([p.element, p.variants.map((v) => [v.id, v.name, v.previewImage])]);
      }
      // In-place refresh of the mutable bits (staged highlight, on/off-screen
      // badge) without rebuilding the card DOM.
      function refreshCardState(el, p) {
        el.querySelectorAll(".vrow").forEach((row) => {
          const staged = vp.staged[p.id] === row.dataset.vid;
          row.classList.toggle("staged", staged);
          const vn = row.querySelector(".vn");
          if (!vn) return;
          const tag = vn.querySelector(".tag");
          if (staged && !tag) {
            const t = document.createElement("span");
            t.className = "tag";
            t.textContent = "✓ staged";
            vn.appendChild(t);
          } else if (!staged && tag) {
            tag.remove();
          }
        });
        // The preview screenshot is a static artifact — crop it at the frame
        // the element had when first matched (frozen per id), so the thumbnail
        // does NOT shift when the live screen scrolls.
        el.querySelectorAll(".thumb").forEach((tw) => {
          if (tw.querySelector(".thumb-img")) applyThumbCrop(tw, vp.thumbFrames[p.id]);
        });
        const w = el.querySelector(".where");
        if (w) {
          w.textContent = p._node ? "on screen" : "off screen";
          w.className = "where" + (p._node ? " on" : "");
        }
      }
      function cardHasFocus(el) {
        return el.contains(document.activeElement);
      }

      // Structural pass only. Card *positions* are integrated by the rAF
      // physics tick (vpTick); here we just (re)build DOM, toggle the
      // off-screen fade, and compute each visible card's spring "home"
      // anchored to its element (vertical de-overlap) — not a rigid column.
      const GONE_GRACE_MS = THEME.goneGraceMs; // ride out brief edge drop-outs before fading
      // Keep a card's HOME out of the streamed-phone rect: if it would overlap,
      // slide it horizontally to just past the nearer side of the stream. The
      // bubble spring then glides the card off the phone — the same way homes
      // are inset from the window edges. Priority: staying IN BOUNDS beats
      // avoiding the stream — when there's no room beside the phone, the card
      // overlaps the phone rather than spilling out of the window.
      function homeOffStream(home, cardW, cardH, sr, mw) {
        if (!sr) return home;
        const PAD = 14;
        const overlapX = home.x < sr.x + sr.w && home.x + cardW > sr.x;
        const overlapY = home.y < sr.y + sr.h && home.y + cardH > sr.y;
        if (!overlapX || !overlapY) return home;
        const leftSide = sr.x - cardW - PAD;
        const rightSide = sr.x + sr.w + PAD;
        const leftFits = leftSide >= 2;
        const rightFits = rightSide + cardW <= mw - 2;
        const nearerLeft = home.x + cardW / 2 < sr.x + sr.w / 2;
        let nx;
        if (leftFits && (nearerLeft || !rightFits)) nx = leftSide;
        else if (rightFits) nx = rightSide;
        // Neither side fits in bounds: keep the in-bounds home and let the card
        // overlap the stream. Border-avoidance beats stream-avoidance — going
        // out of bounds is the worse of the two evils.
        else return home;
        return { x: nx, y: home.y };
      }
      function layoutCards() {
        const now = Date.now();
        const mr = mainEl.getBoundingClientRect();
        const r = streamRect();
        const cardW = THEME.cardWidth;
        const live = new Set();
        for (const p of vp.proposals) {
          live.add(p.id);
          let rec = vp.cards.get(p.id);
          const sig = cardSig(p);
          if (!rec) {
            rec = {
              el: buildCard(p),
              sig,
              pinned: false,
              pos: null,
              vel: { x: 0, y: 0 },
              naturalBodyH: null,
              chromeH: null,
            };
            vp.cards.set(p.id, rec);
          } else if (rec.sig !== sig && !vp.dragging && !vp.cardDragging && !cardHasFocus(rec.el)) {
            const fresh = buildCard(p);
            rec.el.replaceWith(fresh);
            rec.el = fresh;
            rec.sig = sig;
            // Card structure changed (variants added/removed/swapped) — drop
            // the cached natural-height so layoutCards re-measures the new
            // body once. Without this, a freshly-added variant doesn't
            // expand the card.
            rec.naturalBodyH = null;
            rec.chromeH = null;

          if (rec.el.parentElement !== cardsEl) cardsEl.appendChild(rec.el);
          refreshCardState(rec.el, p);
          const matched = !!p._node;
          if (matched) {
            rec.everMatched = true;
            rec.lostAt = 0;
            rec.target = p._node.frame;
            rec.lastCY = p._node.frame.y + p._node.frame.height / 2;
          } else if (rec.everMatched && !rec.lostAt) {
            rec.lostAt = now;
          }
          // Hysteresis: an element grazing the screen edge between describe
          // polls must NOT fade+teleport the card. Fade only after it's been
          // gone for GONE_GRACE_MS; never show a phantom card for an element
          // that has never been on screen. Keep the last frame during the
          // grace window so the connector holds steady instead of blinking.
          const lost =
            !matched && (!rec.everMatched || (rec.lostAt && now - rec.lostAt > GONE_GRACE_MS));
          const wasGone = rec.gone;
          // Keep it visible if the user is mid-typing in its comment box.
          rec.gone = lost && !cardHasFocus(rec.el);
          rec.el.classList.toggle("gone", rec.gone);
          if (rec.gone) rec.target = null; // drop the connector when truly gone
          if (wasGone && !rec.gone) {
            rec.spawned = false; // genuine re-entry → pop back in
            rec.pos = null;
          }
        }
        for (const [id, rec] of vp.cards) {
          if (!live.has(id)) {
            rec.el.remove();
            const cn = vp.conn.get(id);
            if (cn) {
              cn.path.remove();
              cn.dot.remove();
              vp.conn.delete(id);
            }
            vp.cards.delete(id);
          }
        }
        // Dynamic homes: distribute cards on BOTH sides of the central
        // stream so they surround the simulator instead of stacking in one
        // column. Each card aligns vertically with its element when matched;
        // otherwise it falls back to an even spread. When the video stream
        // isn't up yet (streamRect null) we arrange around the main area's
        // centre — a card must NEVER be left unpositioned at the (0,0)
        // origin (that was the "everything piles into the top-left" bug,
        // which appeared whenever describe matched but no stream existed).
        const mw = mr.width,
          mh = mr.height;
        const cx = r ? r.x + r.w / 2 : mw / 2;
        const rightX = Math.min(mw - cardW - 14, (r ? r.x + r.w : cx) + 26);
        const leftX = Math.max(14, (r ? r.x : cx) - cardW - 26);
        const vis = [];
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (rec && !rec.gone) vis.push(rec);
        }
        // Card sizing — design constraints driving the implementation:
        //   1. Each card fits its variant count when there's room (no fixed
        //      --vcard-body-max-h cap).
        //   2. If a column's natural stack overflows the viewport, compress
        //      that column proportionally and engage internal scroll on the
        //      cards that had to shrink.
        //   3. layoutCards runs every describe poll. The previous version
        //      cleared body.style.maxHeight to remeasure, then re-set it —
        //      that mangles scrollTop and flickers the scrollbar. So:
        //        • body.scrollHeight reflects the *natural* content height
        //          regardless of an active max-height — read it directly,
        //          never clear the cap.
        //        • chrome (head + inline comment + border, anything that's
        //          not the body) is invariant once the card is built, so it
        //          is cached on rec.chromeH and refreshed only on rebuild.
        //        • The final maxHeight write is diffed against the inline
        //          value so unchanged frames are no-ops — keeps scrollTop.
        const COL_PAD = 8;
        const GAP = 12;
        const want = vis.map((rec, i) => {
          const body = rec.el.querySelector(".vcard-body");
          if (body && rec.chromeH == null) {
            rec.chromeH = rec.el.offsetHeight - body.offsetHeight;
          }
          const chrome = rec.chromeH || 0;
          const bodyH = body ? body.scrollHeight : 0;
          const natural = bodyH + chrome || rec.el.offsetHeight || 132;
          const ecx = rec.target && r ? r.x + (rec.target.x + rec.target.width / 2) * r.w : null;
          // Initial preferred side: follow the element's own half of the
          // stream when matched; alternate for unmatched. A second pass
          // below rebalances if the elements cluster on one side.
          const side = ecx != null ? (ecx < cx ? "L" : "R") : i % 2 ? "L" : "R";
          const cy =
            rec.target && r
              ? r.y + (rec.target.y + rec.target.height / 2) * r.h
              : 24 + ((i + 0.5) / Math.max(1, vis.length)) * (mh - 48);
          // sideBias captures *how strongly* the card prefers its side
          // (signed distance from stream centre when matched; 0 when not).
          // When |L−R| exceeds 1 below, the rebalancer moves whichever card

        popEl.style.top = py + "px";
        ta.focus();
        ta.addEventListener("keydown", (ev) => {
          // ⌘/Ctrl+Enter submits; plain Enter keeps inserting newlines.
          // !isComposing so an IME commit-Enter never submits.
          if (!ev.isComposing && (ev.metaKey || ev.ctrlKey) && ev.key === "Enter") {
            ev.preventDefault();
            save.click();
          }
        });
        const close = () => {
          popEl.hidden = true;
          vp.commentFor = null;
          paintSpot();
        };
        save.addEventListener("click", () => {
          const text = ta.value.trim();
          if (text) {
            vp.annotations.push({
              id: ++vp.annId,
              target: nodeDesc(node),
              match: nodeMatch(node),
              comment: text,
            });
          }
          close();
          setInspect(false);
          vpRender();
        });
        cancel.addEventListener("click", () => {
          close();
          vp.focus = null;
        });
      }

      // Structure only — reconcile the pin set with vp.annotations (reused
      // elements, listener bound once so click survives 60fps repositioning).
      function ensurePins() {
        const live = new Set(vp.annotations.map((a) => String(a.id)));
        for (const [id, el] of vp.pinEls) {
          if (!live.has(id)) {
            el.remove();
            vp.pinEls.delete(id);
            vp.pinAnim.delete(id);
          }
        }
        vp.annotations.forEach((a, i) => {
          let el = vp.pinEls.get(String(a.id));
          if (!el) {
            el = document.createElement("div");
            el.className = "ann-pin";
            // Hover opens the comment detail (no click required); leaving the
            // pin arms the shared grace close (cancelled if the pointer
            // reaches the popover or another pin). `a` is captured per pin.
            el.addEventListener("pointerenter", () => {
              cancelAnnClose();
              if (vp.annPopFor !== a.id) openAnnPop(a);
            });
            el.addEventListener("pointerleave", scheduleAnnClose);
            cardsEl.appendChild(el);
            vp.pinEls.set(String(a.id), el);
          }
          el.textContent = String(i + 1);
          el.title = a.target + ": " + a.comment;
        });
      }
      // Per-frame: place each pin at its spring-eased position (integrated in
      // vpTick from the latest describe sample). No raw poll coords here, so
      // the pin glides continuously and never snaps between polls.
      function positionPins() {
        for (const a of vp.annotations) {
          const el = vp.pinEls.get(String(a.id));
          if (!el) continue;
          const key = String(a.id);
          const pa = vp.pinAnim.get(key);
          const hasTarget = !!(vp._pinT && vp._pinT.has(key));
          if (!pa || !hasTarget) {
            el.style.display = "none";
            continue;
          }
          el.style.display = "";
          el.style.left = pa.p.x + "px";
          el.style.top = pa.p.y + "px";
        }
        placeAnnPop();
      }

      // ── Saved-annotation review popover ─────────────────────────────────
      // The pin's eased on-screen point (same source positionPins uses), so
      // the popover tracks the pin smoothly while the device scrolls.
      function annPopAnchor(a) {
        const pa = vp.pinAnim.get(String(a.id));
        if (pa) return { x: pa.p.x, y: pa.p.y };
        const n = vp.tree && vpMatchNode(vp.tree, a.match);
        return n ? elementPoint(n.frame) : null;
      }
      function placeAnnPop() {
        if (vp.annPopFor == null) return;
        const a = vp.annotations.find((x) => x.id === vp.annPopFor);
        if (!a) {
          closeAnnPop();
          return;
        }
        const pt = annPopAnchor(a);
        if (!pt) {
          // element scrolled away → dismiss the review popover
          closeAnnPop();
          return;
        }
        annPop.style.left = pt.x + "px";
        annPop.style.top = pt.y + "px";
      }
      function renderAnnRead(a) {
        annPop.innerHTML = "";
        const h = document.createElement("h4");
        h.textContent = a.target || "Comment";
        const txt = document.createElement("div");
        txt.className = "txt";
        txt.textContent = a.comment;
        const row = document.createElement("div");
        row.className = "row";
        const edit = document.createElement("button");
        edit.className = "edit";
        edit.textContent = "Edit";
        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "Remove";
        row.append(edit, del);
        annPop.append(h, txt, row);
        edit.addEventListener("click", (e) => {
          e.stopPropagation();
          renderAnnEdit(a);
        });
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          openConfirm("Remove this comment?", () => {
            vp.annotations = vp.annotations.filter((x) => x.id !== a.id);
            closeAnnPop();
            vpRender();
          });
        });
      }
      function renderAnnEdit(a) {
        annPop.innerHTML = "";
        const h = document.createElement("h4");
        h.textContent = a.target || "Comment";
        const ta = document.createElement("textarea");
        ta.value = a.comment;
        const row = document.createElement("div");
        row.className = "row";
        const saveB = document.createElement("button");
        saveB.className = "edit";
        saveB.textContent = "Save";
        const cancelB = document.createElement("button");
        cancelB.className = "cancel";
        cancelB.textContent = "Cancel";
        row.append(saveB, cancelB);
        annPop.append(h, ta, row);
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
        const commit = () => {
          const v = ta.value.trim();
          if (v) {
            a.comment = v;
            renderAnnRead(a);
            vpRender();
          }
        };
        ta.addEventListener("keydown", (ev) => {
          // ⌘/Ctrl+Enter submits; plain Enter keeps inserting newlines.
          // !isComposing so an IME commit-Enter never submits.
          if (!ev.isComposing && (ev.metaKey || ev.ctrlKey) && ev.key === "Enter") {
            ev.preventDefault();
            commit();
          }
        });
        saveB.addEventListener("click", (e) => {
          e.stopPropagation();
          commit();
        });
        cancelB.addEventListener("click", (e) => {
          e.stopPropagation();
          renderAnnRead(a);
        });
      }
      function annPopEsc(ev) {
        if (ev.key === "Escape") closeAnnPop();
      }
      function detachAnnGlobal() {
        if (vp._annPopDown) {
          window.removeEventListener("pointerdown", vp._annPopDown, true);
          vp._annPopDown = null;
        }
        window.removeEventListener("keydown", annPopEsc);
      }
      // Hover-driven open/close for saved-comment pins. The popover opens on
      // pointerenter (no click needed) and stays open while the pointer is
      // over the pin OR the popover; leaving either arms a short grace timer
      // so the user can travel the pin↔popover gap without it vanishing.
      // Focus inside the popover (i.e. editing) suppresses the auto-close —
      // Esc / outside-click still dismiss that path.
      function cancelAnnClose() {
        if (vp._annHoverClose) {
          clearTimeout(vp._annHoverClose);
          vp._annHoverClose = null;
        }
      }
      function scheduleAnnClose() {
        cancelAnnClose();
        if (annPop.contains(document.activeElement)) return;
        vp._annHoverClose = setTimeout(() => {
          vp._annHoverClose = null;
          if (annPop.contains(document.activeElement)) return;
          closeAnnPop();
        }, THEME.annpopGraceMs);
      }
      function openAnnPop(a) {
        detachAnnGlobal(); // switching pins → drop the previous closer
        vp.annPopFor = a.id;
        annPop.hidden = false;
        renderAnnRead(a);
        placeAnnPop();
        // force a reflow so the pre-state (opacity 0) is committed before
        // .show flips it → the fade/slide-in actually transitions.
        void annPop.offsetWidth;
        annPop.classList.add("show");
        const onDown = (ev) => {
          if (annPop.contains(ev.target)) return;
          if (ev.target.classList && ev.target.classList.contains("ann-pin")) return;
          closeAnnPop();
        };
        vp._annPopDown = onDown;
        window.addEventListener("pointerdown", onDown, true);
        window.addEventListener("keydown", annPopEsc);
      }
      function closeAnnPop() {
        if (vp.annPopFor == null) return;
        vp.annPopFor = null;
        cancelAnnClose();
        annPop.classList.remove("show");
        detachAnnGlobal();
        // hide only after the fade-out so it can't swallow clicks meanwhile
        setTimeout(() => {
          if (vp.annPopFor == null) annPop.hidden = true;
        }, 240);
      }
      // Keep the popover alive while the pointer is inside it; re-arm the
      // grace close on leave. Bound once — annPop is a stable element.
      annPop.addEventListener("pointerenter", cancelAnnClose);
      annPop.addEventListener("pointerleave", scheduleAnnClose);

      // Surface proposals that have no visible anchor, split by whether a
      // scroll direction is meaningful:
      //   • Seen then scrolled away (everMatched, has lastCY) → ▲/▼ pill on
      //     the stream edge. The arrow IS a scroll-direction cue — the user
      //     can scroll there to reveal it. This is the original "off-screen"
      //     reminder, untouched.
      //   • Never matched (no anchor ever found in the describe tree) → a
      //     non-directional "◌ N hidden" badge in the top toolbar. No arrow:
      //     scrolling would not reveal it (it isn't on the device screen at
      //     all, just queued). The badge sits next to the round badge so the
      //     user always knows N pending choices exist, even when no stream
      //     is connected to position the directional pills.
      function updateOffscreenHint() {
        const r = streamRect();
        const top = [],
          bot = [],
          hidden = [];
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (!rec || !rec.gone) continue;
          if (rec.everMatched) {
            (rec.lastCY != null && rec.lastCY < 0.5 ? top : bot).push(p.element || "element");
          } else {
            hidden.push(p.element || "element");
          }
        }
        const paint = (el, list, arrow, y) => {
          if (!r || !list.length) {
            el.classList.remove("show");
            return;
          }
          el.textContent = `${arrow} ${list.length} choice${list.length > 1 ? "s" : ""} off-screen`;
          el.title = list.join(", ");
          el.style.left = r.x + r.w / 2 + "px";
          el.style.top = y + "px";
          el.classList.add("show");
        };
        paint(osTop, top, "▲", r ? r.y + 8 : 0);
        paint(osBot, bot, "▼", r ? r.y + r.h - 30 : 0);
        // Same stream-gate as the directional pills: before a stream is live
        // we haven't *tried* to match anything, so "N hidden" is misleading —
        // those proposals just haven't been looked for yet.
        if (r && hidden.length) {
          hiddenBadge.textContent = `◌ ${hidden.length} hidden`;
          hiddenBadge.title = hidden.join(", ");
          hiddenBadge.hidden = false;
        } else {
          hiddenBadge.hidden = true;
        }
      }

      // Structural pass (poll / resize / stage cadence). Positions, connector
      // and pin tracking are handled every animation frame by vpTick().
      function vpRender() {
        for (const p of vp.proposals) {
          // Anchor the match to the element's last-seen FRAME — seeded from the
          // propose-time frame, then updated to the matched element each frame.
          // Size is the stable identity signal: it disambiguates a label shared
          // by two differently-sized elements (a header vs a tab) and follows the
          // target across a big scroll jump (same size), while a same-labeled
          // element that's left the screen fails the size gate so the bubble goes
          // off-screen instead of snapping onto it. See vpMatchNode.
          let anchor = vp.anchors[p.id];
          if (!anchor) {
            const av = p.variants && p.variants.find((v) => v.frame);
            if (av) anchor = vp.anchors[p.id] = { ...av.frame };
          }
          p._node = vp.tree ? vpMatchNode(vp.tree, p.match, anchor) : null;
          if (p._node) {
            const f0 = p._node.frame;
            vp.anchors[p.id] = { x: f0.x, y: f0.y, width: f0.width, height: f0.height };
          }
          if (p._node && !vp.thumbFrames[p.id]) {
            const f = p._node.frame;
            vp.thumbFrames[p.id] = { x: f.x, y: f.y, width: f.width, height: f.height };
          }
        }
        layoutCards();
        ensurePins();
        // Reconcile the review popover in the structural pass (like
        // ensurePins does for pins): if its annotation is gone — e.g. a new
        // round cleared vp.annotations — close it here, not only via the
        // rAF self-heal (vpTick can be idle and skip placeAnnPop).
        if (vp.annPopFor != null && !vp.annotations.some((a) => a.id === vp.annPopFor)) {
          closeAnnPop();
        }
        if (vp.inspect) paintSpot();
        updateOffscreenHint();

        const has = vp.proposals.length > 0 || vp.annotations.length > 0;
        footEl.hidden = !has;
        completeBtn.disabled = vp.submitting || !has;
        commentBtn.hidden = !img; // only when a stream is live
      }

      // rAF loop, fixed-timestep so motion is identical at 60/120 Hz and after
      // a stutter (accumulator). Two damped springs (semi-implicit Euler):
      // bubbles use a slow, near-critically-damped spring so they drift into
      // place like a cloud; the connector endpoint uses a fast, zero-overshoot
      // spring so the line glides *continuously* between describe samples
      // (no arrive-wait-jump) and locks onto a fresh sample without wobble.
      const VP_DT = 1 / 120;
      // Spring feel comes from theme.css (ω rad/s, ζ damping); K = ω², C = 2ζω.
      const BUB_K = THEME.bubbleOmega * THEME.bubbleOmega,
        BUB_C = 2 * THEME.bubbleZeta * THEME.bubbleOmega;
      const CON_K = THEME.tightOmega * THEME.tightOmega,
        CON_C = 2 * THEME.tightZeta * THEME.tightOmega;
      function vpSpr(s, v, key, target, k, c) {
        const a = -k * (s[key] - target) - c * v[key];
        v[key] += a * VP_DT;
        s[key] += v[key] * VP_DT;
      }
      let vpLastT = 0;
      let vpAcc = 0;
      function vpTick(now) {
        requestAnimationFrame(vpTick);
        // Hard-mute the device the entire time a card/chip is being dragged so a
        // drag that crosses or releases over the phone can't tap it. CSS
        // pointer-events:none is bulletproof (no event reaches the stream at
        // all) where the per-handler guard could still race. Held one frame past
        // release, which also swallows the release tap.
        rootEl.classList.toggle("drag-muting", vp.cardDragging || vp.dragging);
        const t = now || performance.now();
        if (!vp.proposals.length && !vp.inspect && !vp.annotations.length) {
          vpLastT = t;
          vpAcc = 0;
          return;
        }
        const dt = vpLastT ? Math.min(0.25, (t - vpLastT) / 1000) : VP_DT;
        vpLastT = t;
        vpAcc += dt;
        let steps = 0;
        // Resolve each pin's target element point ONCE per frame (tree only
        // changes per describe poll); the spring below glides toward it.
        const pinT = vp._pinT || (vp._pinT = new Map());
        pinT.clear();
        if (vp.annotations.length && vp.tree) {
          for (const a of vp.annotations) {
            const n = vpMatchNode(vp.tree, a.match);
            const pt = n && elementPoint(n.frame);
            if (pt) pinT.set(String(a.id), pt);
          }
        }
        while (vpAcc >= VP_DT && steps < 30) {
          vpAcc -= VP_DT;
          steps++;
          for (const p of vp.proposals) {
            const rec = vp.cards.get(p.id);
            if (!rec) continue;
            if (rec.target) {
              const tf = rec.target;
              if (!rec.anim || !rec.animVel) {
                rec.anim = { x: tf.x, y: tf.y, width: tf.width, height: tf.height };
                rec.animVel = { x: 0, y: 0, width: 0, height: 0 };
              } else {
                vpSpr(rec.anim, rec.animVel, "x", tf.x, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "y", tf.y, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "width", tf.width, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "height", tf.height, CON_K, CON_C);
              }
            } else {
              rec.anim = null;
            }
            if (rec.pos && rec.home && !(rec.dragging && vp.cardDragging)) {
              vpSpr(rec.pos, rec.vel, "x", rec.home.x, BUB_K, BUB_C);
              vpSpr(rec.pos, rec.vel, "y", rec.home.y, BUB_K, BUB_C);
            }
          }
          // Pins use the same fast, zero-overshoot spring as connectors so
          // they track every animation frame and never snap between polls.
          for (const a of vp.annotations) {
            const key = String(a.id);
            const tp = pinT.get(key);
            if (!tp) continue;
            const pa = vp.pinAnim.get(key);
            if (!pa) {
              vp.pinAnim.set(key, { p: { x: tp.x, y: tp.y }, v: { x: 0, y: 0 } });
              continue;
            }
            vpSpr(pa.p, pa.v, "x", tp.x, CON_K, CON_C);
            vpSpr(pa.p, pa.v, "y", tp.y, CON_K, CON_C);
          }
        }
        if (steps >= 30) vpAcc = 0; // shed backlog after a long stall
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (rec && rec.pos && rec.home && !(rec.dragging && vp.cardDragging)) {
            rec.el.style.left = rec.pos.x + "px";
            rec.el.style.top = rec.pos.y + "px";
          }
        }
        drawConnectors();
        positionPins();
      }
      requestAnimationFrame(vpTick);

      // Brief green confirmation card centred on the viewport. In Electron
      // host mode the surrounding window squeezes closed shortly after this
      // appears (tool-server adds a delay before sending the close cmd, so
      // the toast is fully visible first). In a regular browser the toast
      // auto-dismisses after THEME.successToastShowMs — purely cosmetic
      // feedback that the round was submitted.
      let successToastTimer = null;
      function showSuccessToast(picked, comments) {
        if (!successToast) return;
        successText.textContent =
          comments > 0
            ? `Sent ${picked} pick(s) + ${comments} comment(s)`
            : `Sent ${picked} pick(s)`;
        successToast.hidden = false;
        // Force a layout pass so the .show transition fires from the
        // hidden→visible state (otherwise the browser may batch and skip
        // the transition entirely).
        // eslint-disable-next-line no-unused-expressions
        successToast.offsetHeight;
        successToast.classList.add("show");
        if (successToastTimer) clearTimeout(successToastTimer);
        successToastTimer = setTimeout(() => {
          successToast.classList.remove("show");
          // Wait for the fade-out before hiding so the transition plays.
          setTimeout(() => {
            if (!successToast.classList.contains("show")) successToast.hidden = true;
          }, 250);
        }, THEME.successToastShowMs);
      }

      async function vpComplete() {
        if (vp.submitting) return;
        if (vp.proposals.length === 0 && vp.annotations.length === 0) return;
        vp.submitting = true;
        completeBtn.disabled = true;
        setNote("Submitting…");
        const selections = vp.proposals.map((p) => ({
          elementId: p.id,
          variantId: vp.staged[p.id] || null,
          comment: vp.comments[p.id] || undefined,
        }));
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants/selection`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selections,
              annotations: vp.annotations.map((a) => ({
                target: a.target,
                match: a.match,
                comment: a.comment,
              })),
              globalComment: globalCommentEl ? globalCommentEl.value : "",
            }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          const picked = selections.filter((s) => s.variantId).length;
          vp.justCompletedRound = vp.round;
          setNote(
            `Sent ${picked} pick(s) + ${vp.annotations.length} comment(s) to the agent.`,
            "ok"
          );
          showSuccessToast(picked, vp.annotations.length);
        } catch (err) {
          setNote(`Failed: ${err.message || err}`, "err");
        } finally {
          vp.submitting = false;
          completeBtn.disabled = false;
        }
      }

      // Called by teardownStream when the stream is torn down.
      function vpResetOverlay() {
        vp.cards.clear();
        vp.thumbFrames = {};
        vp.anchors = {};
        vp.conn.clear();
        vp.pinEls.clear();
        if (cardsEl) cardsEl.innerHTML = "";
        if (connEl) while (connEl.firstChild) connEl.removeChild(connEl.firstChild);
        if (vp.spot) {
          vp.spot.root.remove();
          vp.spot = null;
        }
        if (popEl) popEl.hidden = true;
        // Deterministic teardown — don't rely on the rAF self-heal here.
        closeAnnPop();
        if (annPop) annPop.hidden = true;
        vp.pinAnim.clear();
        if (vp._pinT) vp._pinT.clear();
        clearSpotIdle();
        vp.focus = null;
        vp.commentFor = null;
        // Fully exit inspect mode so a stream re-attach doesn't leave a
        // stuck/double-click state (button label, .inspecting class).
        vp.inspect = false;
        vp.cardDragging = false;
        commentBtn.classList.remove("active");
        commentBtn.textContent = "＋ Add comment";
        document.getElementById("root").classList.remove("inspecting");
      }

      // Safety net: HTML5 dragend can be missed if the source node is removed
      // mid-drag — never let vp.dragging latch true (it gates round clearing).
      document.addEventListener("dragend", () => {
        vp.dragging = false;
      });
      // Confirm modal — shared backstop for destructive actions (Remove, Clear).
      let confirmPending = null;
      function openConfirm(msg, onConfirm) {
        confirmMsg.textContent = msg;
        confirmPending = onConfirm;
        confirmModal.hidden = false;
        confirmYes.focus();
      }
      function closeConfirm() {
        confirmModal.hidden = true;
        confirmPending = null;
      }
      confirmCancel.addEventListener("click", closeConfirm);
      confirmYes.addEventListener("click", () => {
        const cb = confirmPending;
        closeConfirm();
        if (cb) cb();
      });
      confirmModal.addEventListener("click", (e) => {
        if (e.target === confirmModal) closeConfirm();
      });

      function vpClear() {
        vp.staged = {};
        vp.comments = {};
        vp.annotations = [];
        if (globalCommentEl) globalCommentEl.value = "";
        setNote("");
        closeAnnPop();
        vpRender();
      }

      commentBtn.addEventListener("click", () => setInspect(!vp.inspect));
      completeBtn.addEventListener("click", vpComplete);
      clearBtn.addEventListener("click", () =>
        openConfirm("Clear all picks, comments, and the overall note?", vpClear)
      );
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (!confirmModal.hidden) {
          closeConfirm();
          return;
        }
        if (!vp.inspect) return;
        // Don't tear down the inspector (and lose an in-progress comment) if
        // the user is typing — let the comment-pop's own Cancel handle that.
        const ae = document.activeElement;
        if (ae && (ae.tagName === "TEXTAREA" || ae.tagName === "INPUT")) return;
        setInspect(false);
      });
      viewport.addEventListener("dragover", (ev) => {
        if (vp.proposals.length) ev.preventDefault();
      });
      viewport.addEventListener("drop", (ev) => {
        ev.preventDefault();
        let data = null;
        try {
          data = JSON.parse(ev.dataTransfer.getData("application/json"));
        } catch {}
        if (data) vpStage(data.elementId, data.variantId);
      });
      // Keep floating cards in their RELATIVE place across a window resize.
      // Their left/top is absolute px, so without this they'd stay pinned to the
      // left/top edge as the window grows; scale each card's live + home
      // position by the size change so they track the resize immediately (the
      // spring then settles them to the recomputed homes).
      let lastMainSize = null;
      window.addEventListener("resize", () => {
        const mr = mainEl.getBoundingClientRect();
        if (
          lastMainSize &&
          lastMainSize.w > 0 &&
          lastMainSize.h > 0 &&
          mr.width > 0 &&
          mr.height > 0
        ) {
          const sx = mr.width / lastMainSize.w;
          const sy = mr.height / lastMainSize.h;
          if (sx !== 1 || sy !== 1) {
            for (const rec of vp.cards.values()) {
              if (rec.pos) {
                rec.pos.x *= sx;
                rec.pos.y *= sy;
              }
              if (rec.home) {
                rec.home.x *= sx;
                rec.home.y *= sy;
              }
            }
          }
        }
        lastMainSize = { w: mr.width, h: mr.height };
        vpRender();
      });
      setInterval(pollVariants, THEME.pollMs);
      pollVariants();
      pollDescribe(); // arms the single fast describe loop

      // Opened for a specific device → stream it straight away. Otherwise fall
      // back to discovering booted simulators (single → auto-connect, multiple →
      // in-viewport picker).
      if (initialUdid) {
        connect(initialUdid).catch((err) => setStatus(String(err.message || err), "error"));
      } else {
        refreshSimulators();
      }
    </script>
  </body>
</html>
