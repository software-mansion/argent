<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argent Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0e0e10;
        --fg: #eaeaea;
        --muted: #8a8a90;
        --accent: #6aa6ff;
        --border: #2a2a2e;
        --surface: #16161a;
        --error: #ff8080;
        --ok: #5cdc8b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .toolbar label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .toolbar select,
      .toolbar button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 13px;
      }
      .toolbar select {
        min-width: 240px;
      }
      .toolbar button {
        cursor: pointer;
      }
      .toolbar .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }
      .toolbar .debug {
        color: var(--muted);
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        min-width: 220px;
        text-align: right;
      }
      .status.live::before,
      .status.error::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .status.live::before {
        background: var(--ok);
        animation: pulse 1.6s ease-in-out infinite;
      }
      .status.error::before {
        background: var(--error);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        min-height: 0;
        position: relative;
      }
      .stage {
        position: relative;
        max-width: 100%;
        max-height: 100%;
        display: flex;
      }
      .stage img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 10px;
        box-shadow: 0 10px 48px #0008;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        touch-action: none;
        pointer-events: auto;
        cursor: crosshair;
      }
      /* Multi-touch indicators overlay on the image, positioned via CSS vars. */
      .touch-dot {
        position: absolute;
        top: var(--y);
        left: var(--x);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: rgba(106, 166, 255, 0.25);
        border: 2px solid rgba(106, 166, 255, 0.9);
        pointer-events: none;
        box-shadow: 0 0 12px rgba(106, 166, 255, 0.5);
      }
      .touch-dot.pressed {
        background: rgba(106, 166, 255, 0.55);
      }
      .touch-dot.anchor {
        background: rgba(255, 200, 80, 0.9);
        border-color: rgba(255, 200, 80, 1);
      }
      .empty,
      .error-box {
        color: var(--muted);
        text-align: center;
        padding: 32px;
        max-width: 480px;
        line-height: 1.5;
      }
      .error-box {
        color: var(--error);
      }
      code {
        background: var(--surface);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 12px;
      }

      /* Layout: toolbar on top, then a row with viewport + activity feed. */
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .feed {
        width: 360px;
        flex-shrink: 0;
        border-left: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: width 180ms ease;
      }
      .feed.collapsed {
        width: 0;
        border-left: 0;
      }
      .feed-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .feed-header .clear-btn {
        margin-left: auto;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 11px;
        cursor: pointer;
      }
      .feed-status {
        font-size: 11px;
        color: var(--muted);
      }
      .feed-status.live {
        color: var(--ok);
      }
      .feed-status.error {
        color: var(--error);
      }
      .feed-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .feed-empty {
        color: var(--muted);
        text-align: center;
        padding: 32px 12px;
        font-size: 12px;
      }
      .feed-item {
        padding: 6px 12px;
        border-bottom: 1px solid var(--border);
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        cursor: pointer;
        animation: feedItemIn 220ms ease-out;
      }
      .feed-item:hover {
        background: rgba(106, 166, 255, 0.05);
      }
      .feed-item.expanded {
        background: rgba(106, 166, 255, 0.08);
      }
      .feed-item .row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .feed-item .name {
        color: var(--fg);
        font-weight: 500;
      }
      .feed-item .duration {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
      }
      .feed-item .args {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .feed-item .badge {
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 600;
      }
      .feed-item.in-progress .badge {
        background: rgba(106, 166, 255, 0.18);
        color: var(--accent);
      }
      .feed-item.ok .badge {
        background: rgba(92, 220, 139, 0.15);
        color: var(--ok);
      }
      .feed-item.error .badge {
        background: rgba(255, 128, 128, 0.18);
        color: var(--error);
      }
      .feed-item.error .name {
        color: var(--error);
      }
      .feed-item .detail {
        display: none;
        font-size: 11px;
        color: var(--muted);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        margin-top: 6px;
        padding: 6px;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 280px;
        overflow: auto;
      }
      .feed-item.expanded .detail {
        display: block;
      }
      @keyframes feedItemIn {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Action overlay above the simulator video. */
      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: visible;
      }
      .action-tap {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        background: rgba(106, 166, 255, 0.18);
        box-shadow: 0 0 18px rgba(106, 166, 255, 0.65);
        transform: translate(-50%, -50%);
        animation: tapPulse 700ms ease-out forwards;
      }
      .action-tap.inspect {
        border-color: #f7c948;
        background: rgba(247, 201, 72, 0.2);
        box-shadow: 0 0 18px rgba(247, 201, 72, 0.65);
      }
      .action-tap.error {
        border-color: var(--error);
        background: rgba(255, 128, 128, 0.2);
        box-shadow: 0 0 18px rgba(255, 128, 128, 0.65);
      }
      .action-tap.pinch-marker {
        border-color: #f7c948;
        background: rgba(247, 201, 72, 0.2);
        box-shadow: 0 0 18px rgba(247, 201, 72, 0.65);
        animation: none;
        transition:
          left 380ms ease-out,
          opacity 400ms ease-out;
      }
      @keyframes tapPulse {
        0% {
          transform: translate(-50%, -50%) scale(0.4);
          opacity: 0;
        }
        25% {
          transform: translate(-50%, -50%) scale(1.05);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.7);
          opacity: 0;
        }
      }
      .swipe-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      .swipe-svg path {
        fill: none;
        stroke: var(--accent);
        stroke-width: 3;
        stroke-linecap: round;
        filter: drop-shadow(0 0 6px rgba(106, 166, 255, 0.7));
        stroke-dasharray: 1500;
        stroke-dashoffset: 1500;
        animation:
          dashIn 700ms ease-out forwards,
          fadeOut 700ms 900ms ease-in forwards;
      }
      .swipe-svg polygon {
        fill: var(--accent);
        filter: drop-shadow(0 0 6px rgba(106, 166, 255, 0.7));
        opacity: 0;
        animation:
          fadeIn 220ms 420ms ease-out forwards,
          fadeOut 700ms 900ms ease-in forwards;
      }
      @keyframes dashIn {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
      .action-flash {
        position: absolute;
        background: white;
        border-radius: 10px;
        opacity: 0;
        animation: flashFade 480ms ease-out forwards;
      }
      @keyframes flashFade {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 0.55;
        }
        100% {
          opacity: 0;
        }
      }

      /* HUD chips for non-spatial actions (button, keyboard, app launch...). */
      .hud-layer {
        position: absolute;
        left: 12px;
        top: 12px;
        right: 12px;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-start;
      }
      .hud-chip {
        background: rgba(0, 0, 0, 0.78);
        color: var(--fg);
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 6px 12px;
        border-radius: 18px;
        font-size: 12px;
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        backdrop-filter: blur(6px);
        animation:
          chipIn 220ms ease-out,
          chipOut 280ms 1900ms ease-in forwards;
      }
      .hud-chip.error {
        color: var(--error);
        border-color: rgba(255, 128, 128, 0.4);
      }
      @keyframes chipIn {
        from {
          transform: translateY(-8px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes chipOut {
        to {
          transform: translateY(-8px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="toolbar">
        <label for="sim-select">Simulator</label>
        <select id="sim-select">
          <option>Loading…</option>
        </select>
        <button id="refresh-btn" title="Refresh simulator list">⟳</button>
        <button id="feed-toggle" title="Toggle activity feed">☰</button>
        <span id="hint" class="debug" style="min-width: auto"></span>
        <span id="debug" class="debug"></span>
        <span id="status" class="status">idle</span>
      </div>
      <div class="main">
        <div class="viewport" id="viewport">
          <div class="empty">Select a booted simulator to start streaming.</div>
        </div>
        <aside class="feed" id="feed-aside">
          <div class="feed-header">
            <span>Agent activity</span>
            <span id="feed-status" class="feed-status">offline</span>
            <button id="clear-feed" class="clear-btn">clear</button>
          </div>
          <div class="feed-list" id="feed-list">
            <div class="feed-empty" id="feed-empty">No tool calls yet.</div>
          </div>
        </aside>
      </div>
    </div>

    <script>
      "use strict";

      // ── Config ──────────────────────────────────────────────────────────
      // Tool-server base URL. When this page is served by tool-server itself,
      // same-origin is correct. Override via ?toolServer=http://host:port for
      // standalone testing.
      const urlParams = new URLSearchParams(window.location.search);
      const TOOL_SERVER =
        urlParams.get("toolServer") ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:3001");

      // Browser KeyboardEvent.code → USB HID Keyboard Usage Page (0x07) keycode.
      // sim-server's `key` command expects these raw HID codes — shift/modifier
      // state is conveyed by the browser issuing separate ShiftLeft/ShiftRight
      // key events which we forward verbatim.
      const HID = {
        KeyA: 4,
        KeyB: 5,
        KeyC: 6,
        KeyD: 7,
        KeyE: 8,
        KeyF: 9,
        KeyG: 10,
        KeyH: 11,
        KeyI: 12,
        KeyJ: 13,
        KeyK: 14,
        KeyL: 15,
        KeyM: 16,
        KeyN: 17,
        KeyO: 18,
        KeyP: 19,
        KeyQ: 20,
        KeyR: 21,
        KeyS: 22,
        KeyT: 23,
        KeyU: 24,
        KeyV: 25,
        KeyW: 26,
        KeyX: 27,
        KeyY: 28,
        KeyZ: 29,
        Digit1: 30,
        Digit2: 31,
        Digit3: 32,
        Digit4: 33,
        Digit5: 34,
        Digit6: 35,
        Digit7: 36,
        Digit8: 37,
        Digit9: 38,
        Digit0: 39,
        Enter: 40,
        Escape: 41,
        Backspace: 42,
        Tab: 43,
        Space: 44,
        Minus: 45,
        Equal: 46,
        BracketLeft: 47,
        BracketRight: 48,
        Backslash: 49,
        Semicolon: 51,
        Quote: 52,
        Backquote: 53,
        Comma: 54,
        Period: 55,
        Slash: 56,
        CapsLock: 57,
        F1: 58,
        F2: 59,
        F3: 60,
        F4: 61,
        F5: 62,
        F6: 63,
        F7: 64,
        F8: 65,
        F9: 66,
        F10: 67,
        F11: 68,
        F12: 69,
        ArrowRight: 79,
        ArrowLeft: 80,
        ArrowDown: 81,
        ArrowUp: 82,
        NumpadDivide: 84,
        NumpadMultiply: 85,
        NumpadSubtract: 86,
        NumpadAdd: 87,
        NumpadEnter: 88,
        Numpad1: 89,
        Numpad2: 90,
        Numpad3: 91,
        Numpad4: 92,
        Numpad5: 93,
        Numpad6: 94,
        Numpad7: 95,
        Numpad8: 96,
        Numpad9: 97,
        Numpad0: 98,
        NumpadDecimal: 99,
        ControlLeft: 224,
        ShiftLeft: 225,
        AltLeft: 226,
        MetaLeft: 227,
        ControlRight: 228,
        ShiftRight: 229,
        AltRight: 230,
        MetaRight: 231,
        IntlBackslash: 86,
      };
      const CAPS_LOCK_HID = 57;

      // Multi-touch modifier — matches radon-ide: Alt on macOS, Ctrl elsewhere.
      const IS_MAC = /Mac|iPhone|iPad/.test(navigator.platform);
      const MULTITOUCH_CODES = IS_MAC
        ? new Set(["AltLeft", "AltRight"])
        : new Set(["ControlLeft", "ControlRight"]);

      // ── DOM ─────────────────────────────────────────────────────────────
      const select = document.getElementById("sim-select");
      const status = document.getElementById("status");
      const viewport = document.getElementById("viewport");
      const refreshBtn = document.getElementById("refresh-btn");
      const debugEl = document.getElementById("debug");
      const hintEl = document.getElementById("hint");
      hintEl.textContent = `Hold ${IS_MAC ? "Option" : "Ctrl"} for pinch · +Shift to move anchor`;

      // ── State ───────────────────────────────────────────────────────────
      /** @type {WebSocket | null} */
      let ws = null;
      let wsOpen = false;
      let currentUdid = null;
      let img = null;
      let stage = null;
      /** Action-overlay layers (created per-stream alongside the <img>). */
      let overlayLayer = null;
      let hudLayer = null;
      /** Elements for the three multi-touch indicators (primary / mirror / anchor). */
      let touchDots = { primary: null, mirror: null, anchor: null };
      let activePointerId = null;
      /** True while the mouse button is held inside the stage (finger is "down"). */
      let isPressing = false;
      /** True while the multi-touch modifier is held. */
      let isMultiTouching = false;
      /** Primary and anchor points in normalized [0,1] space. */
      let touchPoint = { x: 0.5, y: 0.5 };
      let anchorPoint = { x: 0.5, y: 0.5 };
      /** Keys currently held down (HID codes) — released on blur. */
      const pressedKeys = new Set();
      /** Last known CapsLock state to resync iOS if it drifts. */
      let lastCapsLockState = false;
      let cmdCounter = 0;

      // ── Helpers ─────────────────────────────────────────────────────────
      function setStatus(text, kind = "") {
        status.textContent = text;
        status.className = "status" + (kind ? " " + kind : "");
      }

      function nextCmdId() {
        return String(++cmdCounter);
      }

      function sendCmd(obj) {
        if (!ws || !wsOpen) {
          debugEl.textContent = `ws not open — dropped ${obj.cmd}`;
          return;
        }
        ws.send(JSON.stringify({ id: nextCmdId(), ...obj }));
        if (obj.cmd === "touch") {
          const tail =
            obj.second_x != null
              ? ` / (${obj.second_x.toFixed(3)}, ${obj.second_y.toFixed(3)})`
              : "";
          debugEl.textContent = `${obj.type} (${obj.x.toFixed(3)}, ${obj.y.toFixed(3)})${tail}`;
        } else if (obj.cmd === "key") {
          debugEl.textContent = `key ${obj.direction} ${obj.code}`;
        } else if (obj.cmd === "wheel") {
          debugEl.textContent = `wheel dx=${obj.dx} dy=${obj.dy}`;
        } else {
          debugEl.textContent = `${obj.cmd}`;
        }
      }

      /**
       * Convert a pointer/mouse/wheel event (in client coords) into the
       * normalized 0.0–1.0 device space the simulator-server expects.
       */
      function toDeviceCoords(ev) {
        if (!img) return null;
        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return null;
        const xRatio = (ev.clientX - rect.left) / rect.width;
        const yRatio = (ev.clientY - rect.top) / rect.height;
        return {
          x: Math.max(0, Math.min(1, xRatio)),
          y: Math.max(0, Math.min(1, yRatio)),
        };
      }

      function mirrorAround(pt, anchor) {
        return {
          x: Math.max(0, Math.min(1, 2 * anchor.x - pt.x)),
          y: Math.max(0, Math.min(1, 2 * anchor.y - pt.y)),
        };
      }

      /**
       * sim-server wheel deltas are small integers (~3–7). Browser deltaY can be
       * anything from 0.001 to 400+, so we clamp by magnitude the way radon-ide
       * does. Sign is negated so scroll direction matches iOS natural-scroll.
       */
      function normalizeWheel(delta) {
        const abs = Math.abs(delta);
        const magnitude = abs > 150 ? 7 : abs > 50 ? 5 : 3;
        return -Math.sign(delta) * magnitude;
      }

      function sendTouchEvent(type) {
        if (isMultiTouching) {
          const secondary = mirrorAround(touchPoint, anchorPoint);
          sendCmd({
            cmd: "touch",
            type,
            x: touchPoint.x,
            y: touchPoint.y,
            second_x: secondary.x,
            second_y: secondary.y,
          });
        } else {
          sendCmd({ cmd: "touch", type, x: touchPoint.x, y: touchPoint.y });
        }
      }

      // ── Multi-touch indicators ─────────────────────────────────────────
      function updateIndicators() {
        if (!stage) return;
        if (!isMultiTouching) {
          for (const k of ["primary", "mirror", "anchor"]) {
            if (touchDots[k]) touchDots[k].remove();
            touchDots[k] = null;
          }
          return;
        }
        const mirror = mirrorAround(touchPoint, anchorPoint);
        ensureDot("primary", touchPoint, 28, false);
        ensureDot("mirror", mirror, 28, false);
        ensureDot("anchor", anchorPoint, 10, true);
      }
      function ensureDot(key, pt, size, isAnchor) {
        const imgRect = img.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        // Position relative to the stage, inside the image area.
        const offsetX = imgRect.left - stageRect.left;
        const offsetY = imgRect.top - stageRect.top;
        const x = offsetX + pt.x * imgRect.width;
        const y = offsetY + pt.y * imgRect.height;
        let el = touchDots[key];
        if (!el) {
          el = document.createElement("div");
          el.className = "touch-dot" + (isAnchor ? " anchor" : "");
          stage.appendChild(el);
          touchDots[key] = el;
        }
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--size", `${size}px`);
        el.classList.toggle("pressed", isPressing && !isAnchor);
      }

      // ── Simulator list ─────────────────────────────────────────────────
      async function refreshSimulators() {
        setStatus("loading simulators…");
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/simulators`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { simulators } = await res.json();
          select.innerHTML = "";
          if (!simulators || simulators.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "(no simulators found)";
            select.appendChild(opt);
            select.disabled = true;
            setStatus("no simulators", "error");
            return;
          }
          select.disabled = false;
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "— choose simulator —";
          select.appendChild(placeholder);
          for (const s of simulators) {
            const opt = document.createElement("option");
            opt.value = s.udid;
            opt.textContent = `${s.state === "Booted" ? "● " : "○ "}${s.name}`;
            opt.disabled = s.state !== "Booted";
            select.appendChild(opt);
          }
          setStatus("idle");
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
        }
      }

      // ── Stream + WS wiring ─────────────────────────────────────────────
      function teardownStream() {
        releaseAllInput();
        if (ws) {
          try {
            ws.close();
          } catch {}
          ws = null;
        }
        wsOpen = false;
        // Explicitly clear the img src — otherwise the browser keeps the MJPEG
        // HTTP connection open after the element is detached, and re-selecting
        // a simulator leaks more connections. Same trick radon-ide uses.
        if (img) {
          img.src = "";
          img.removeAttribute("src");
        }
        img = null;
        stage = null;
        overlayLayer = null;
        hudLayer = null;
        touchDots = { primary: null, mirror: null, anchor: null };
        // Any in-flight tool-call records point at DOM nodes we just dropped;
        // discard them so finalize() doesn't write to a detached subtree.
        inflight.clear();
        viewport.innerHTML = "";
      }

      async function connect(udid) {
        teardownStream();
        currentUdid = udid;
        setStatus("starting simulator-server…");
        viewport.innerHTML = '<div class="empty">Starting simulator-server…</div>';
        let info;
        try {
          const res = await fetch(
            `${TOOL_SERVER}/preview/simulator-server/${encodeURIComponent(udid)}`
          );
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          info = await res.json();
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
          viewport.innerHTML = `<div class="error-box">Could not start simulator-server.<br/>${escapeHtml(String(err.message || err))}</div>`;
          return;
        }

        if (!info.streamUrl) {
          setStatus("no stream URL", "error");
          viewport.innerHTML =
            '<div class="error-box">Simulator-server is running but did not advertise a stream URL.<br/>Rebuild with the <code>argent</code> cargo feature (which enables <code>streaming</code>).</div>';
          return;
        }

        // Build the viewport.
        stage = document.createElement("div");
        stage.className = "stage";
        img = document.createElement("img");
        img.alt = `Simulator ${udid.slice(0, 8)}`;
        img.draggable = false;
        // Append a cache-buster so re-connects don't reuse a stale MJPEG stream.
        img.src = `${info.streamUrl}?t=${Date.now()}`;
        img.onerror = () => setStatus("stream error", "error");
        stage.appendChild(img);
        // Action overlay (taps/swipes/etc) and HUD (button/keyboard chips) are
        // siblings of the <img>, sized via CSS to inset:0 of the stage.
        overlayLayer = document.createElement("div");
        overlayLayer.className = "overlay";
        stage.appendChild(overlayLayer);
        hudLayer = document.createElement("div");
        hudLayer.className = "hud-layer";
        stage.appendChild(hudLayer);
        viewport.innerHTML = "";
        viewport.appendChild(stage);

        attachInputHandlers(img);

        // Open WebSocket to sim-server.
        ws = new WebSocket(info.wsUrl);
        ws.onopen = () => {
          wsOpen = true;
          setStatus("live", "live");
        };
        ws.onclose = () => {
          wsOpen = false;
          if (currentUdid === udid) setStatus("disconnected", "error");
        };
        ws.onerror = () => {
          setStatus("ws error", "error");
        };
      }

      // ── Input handlers ─────────────────────────────────────────────────
      /**
       * Release any held touch/keys. Called on teardown and on window blur —
       * without this, losing focus mid-drag (or Cmd-tabbing with Shift held)
       * leaves the device stuck with a phantom touch / modifier.
       */
      function releaseAllInput() {
        if (isPressing) {
          sendTouchEvent("Up");
          isPressing = false;
        }
        isMultiTouching = false;
        updateIndicators();
        for (const code of pressedKeys) {
          sendCmd({ cmd: "key", direction: "Up", code });
        }
        pressedKeys.clear();
        activePointerId = null;
      }

      function attachInputHandlers(target) {
        target.addEventListener("dragstart", (ev) => ev.preventDefault());

        target.addEventListener("pointerdown", (ev) => {
          if (activePointerId !== null) return;
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          activePointerId = ev.pointerId;
          try {
            target.setPointerCapture(ev.pointerId);
          } catch {}
          touchPoint = pt;
          isPressing = true;
          sendTouchEvent("Down");
          updateIndicators();
          ev.preventDefault();
        });
        target.addEventListener("pointermove", (ev) => {
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          // Shift + Multi-touch + drag → move the anchor point along with the finger.
          if (isMultiTouching && ev.shiftKey) {
            anchorPoint = {
              x: Math.max(0, Math.min(1, anchorPoint.x + (pt.x - touchPoint.x))),
              y: Math.max(0, Math.min(1, anchorPoint.y + (pt.y - touchPoint.y))),
            };
          }
          touchPoint = pt;
          if (ev.pointerId === activePointerId && isPressing) {
            sendTouchEvent("Move");
          }
          updateIndicators();
          ev.preventDefault();
        });
        const endPointer = (ev) => {
          if (ev.pointerId !== activePointerId) return;
          const pt = toDeviceCoords(ev);
          if (pt) touchPoint = pt;
          if (isPressing) sendTouchEvent("Up");
          isPressing = false;
          try {
            target.releasePointerCapture(ev.pointerId);
          } catch {}
          activePointerId = null;
          updateIndicators();
          ev.preventDefault();
        };
        target.addEventListener("pointerup", endPointer);
        target.addEventListener("pointercancel", endPointer);

        // Mouse leaves the image while dragging — commit an Up so the device
        // doesn't stay stuck. If the user drags back in with the button still
        // held, pointerenter (re)starts a Down at the entry point.
        target.addEventListener("pointerleave", (ev) => {
          if (isPressing) {
            sendTouchEvent("Up");
            isPressing = false;
            updateIndicators();
          }
        });
        target.addEventListener("pointerenter", (ev) => {
          // Only auto-resume if the button is still held (buttons bitmask).
          if (ev.buttons & 1 && !isPressing) {
            const pt = toDeviceCoords(ev);
            if (pt) {
              touchPoint = pt;
              isPressing = true;
              sendTouchEvent("Down");
              updateIndicators();
            }
          }
        });

        target.addEventListener(
          "wheel",
          (ev) => {
            const pt = toDeviceCoords(ev);
            if (!pt) return;
            const dx = normalizeWheel(ev.deltaX);
            const dy = normalizeWheel(ev.deltaY);
            if (dx === 0 && dy === 0) {
              ev.preventDefault();
              return;
            }
            sendCmd({ cmd: "wheel", x: pt.x, y: pt.y, dx, dy });
            ev.preventDefault();
          },
          { passive: false }
        );
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
        );
      }

      // ── Events ──────────────────────────────────────────────────────────
      select.addEventListener("change", () => {
        const udid = select.value;
        if (!udid) return;
        // Blur the select so keys (including the multi-touch Option/Ctrl modifier)
        // route to our window-level handler instead of being swallowed by the
        // dropdown's built-in keyboard handling.
        select.blur();
        connect(udid).catch((err) => setStatus(String(err.message || err), "error"));
      });
      refreshBtn.addEventListener("click", () => {
        refreshBtn.blur();
        refreshSimulators();
      });

      // Global keyboard forwarding — active whenever a simulator is connected
      // and focus is not on a toolbar control. We forward raw keydown/keyup so
      // the simulator sees modifier keys (Shift, Ctrl, etc.) as real key events.
      function shouldForwardKey(ev) {
        if (!wsOpen) return false;
        const ae = document.activeElement;
        if (ae && (ae.tagName === "SELECT" || ae.tagName === "BUTTON" || ae.tagName === "INPUT")) {
          return false;
        }
        // Let the browser keep its own shortcuts (Cmd+R, Cmd+T, Cmd+W, Cmd+L, …).
        if (ev.metaKey && ev.code !== "MetaLeft" && ev.code !== "MetaRight") return false;
        return true;
      }

      /**
       * Sync CapsLock state to the device. Browser only fires keydown when
       * CapsLock turns on and keyup when it turns off — never a full sequence.
       * iOS expects a full down-up to toggle, and can drift out of sync when
       * CapsLock is pressed outside the webview. On any key event we check if
       * our cached CapsLock state diverges from the event's modifier state and
       * emit a full toggle sequence to resync.
       */
      function syncCapsLock(ev) {
        const current = ev.getModifierState && ev.getModifierState("CapsLock");
        if (current === undefined) return;
        if (current !== lastCapsLockState) {
          lastCapsLockState = current;
          sendCmd({ cmd: "key", direction: "Down", code: CAPS_LOCK_HID });
          sendCmd({ cmd: "key", direction: "Up", code: CAPS_LOCK_HID });
        }
      }

      function handleKeyEvent(ev) {
        if (!shouldForwardKey(ev)) return;
        syncCapsLock(ev);

        const isDown = ev.type === "keydown";

        // Multi-touch modifier → enter/exit two-finger mode, anchored at screen
        // center with the primary finger at the cursor. Shift+drag during
        // multi-touch moves the anchor.
        if (MULTITOUCH_CODES.has(ev.code)) {
          if (isDown && !isMultiTouching) {
            anchorPoint = { x: 0.5, y: 0.5 };
            // If we're mid-drag, smoothly promote the single touch to multi-touch
            // by issuing a Move with the second finger materialized.
            isMultiTouching = true;
            updateIndicators();
            if (isPressing) sendTouchEvent("Move");
          } else if (!isDown && isMultiTouching) {
            if (isPressing) sendTouchEvent("Up");
            isPressing = false;
            isMultiTouching = false;
            updateIndicators();
          }
          ev.preventDefault();
          return;
        }

        const code = HID[ev.code];
        if (code == null) return;
        if (code === CAPS_LOCK_HID) return; // handled by syncCapsLock

        if (isDown) {
          pressedKeys.add(code);
        } else {
          pressedKeys.delete(code);
        }
        sendCmd({ cmd: "key", direction: isDown ? "Down" : "Up", code });
        ev.preventDefault();
      }
      window.addEventListener("keydown", handleKeyEvent);
      window.addEventListener("keyup", handleKeyEvent);

      // Disable the right-click context menu over the stage so right-button
      // drags (if the user tries) don't pop up a menu on top of the stream.
      window.addEventListener("contextmenu", (ev) => {
        if (stage && stage.contains(ev.target)) ev.preventDefault();
      });

      // On focus loss, release any active touches/keys so the device doesn't
      // stay stuck with a held finger or modifier.
      window.addEventListener("blur", releaseAllInput);

      window.addEventListener("beforeunload", teardownStream);

      // ── Action overlay & activity feed ─────────────────────────────────
      // Subscribes to /preview/events (SSE) and renders every tool call the
      // agent makes both as a transient overlay above the stream and as a
      // permanent entry in the right-hand activity feed.
      const feedListEl = document.getElementById("feed-list");
      const feedEmptyEl = document.getElementById("feed-empty");
      const feedStatusEl = document.getElementById("feed-status");
      const feedAside = document.getElementById("feed-aside");
      const feedToggleBtn = document.getElementById("feed-toggle");
      const clearFeedBtn = document.getElementById("clear-feed");

      /** id → { item, badge, duration, detail } for in-progress tool calls. */
      const inflight = new Map();
      /**
       * `${id}:${phase}` keys we have already rendered. Browser EventSource
       * auto-reconnects on transient drops; if the server re-sends events
       * after a brief disconnect we don't want duplicate rows in the feed.
       * Bounded so a long session doesn't grow unbounded.
       */
      const seenEvents = new Set();
      const SEEN_CAP = 1000;
      /** EventSource singleton. Browser auto-reconnects on transient failure. */
      let actionEvents = null;

      clearFeedBtn.addEventListener("click", () => {
        feedListEl.querySelectorAll(".feed-item").forEach((n) => n.remove());
        inflight.clear();
        feedEmptyEl.style.display = "block";
        clearFeedBtn.blur();
      });
      feedToggleBtn.addEventListener("click", () => {
        feedAside.classList.toggle("collapsed");
        feedToggleBtn.blur();
      });

      function setFeedStatus(text, kind) {
        feedStatusEl.textContent = text;
        feedStatusEl.className = "feed-status" + (kind ? " " + kind : "");
      }

      function imgRectInStage() {
        if (!img || !stage) return null;
        const a = img.getBoundingClientRect();
        const s = stage.getBoundingClientRect();
        if (!a.width || !a.height) return null;
        return {
          left: a.left - s.left,
          top: a.top - s.top,
          width: a.width,
          height: a.height,
        };
      }

      /** Map a normalized [0,1] device point to stage-local pixels. */
      function devToStagePx(pt) {
        const r = imgRectInStage();
        if (!r) return null;
        const x = Math.max(0, Math.min(1, pt.x));
        const y = Math.max(0, Math.min(1, pt.y));
        return { x: r.left + x * r.width, y: r.top + y * r.height };
      }

      function spawnTap(args, kind) {
        if (!overlayLayer) return;
        if (typeof args?.x !== "number" || typeof args?.y !== "number") return;
        const p = devToStagePx({ x: args.x, y: args.y });
        if (!p) return;
        const el = document.createElement("div");
        el.className = "action-tap" + (kind ? " " + kind : "");
        el.style.left = p.x + "px";
        el.style.top = p.y + "px";
        overlayLayer.appendChild(el);
        setTimeout(() => el.remove(), 800);
      }

      function spawnSwipePath(points) {
        if (!overlayLayer || points.length < 2) return;
        const NS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(NS, "svg");
        svg.setAttribute("class", "swipe-svg");
        const d = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
        const path = document.createElementNS(NS, "path");
        path.setAttribute("d", d);
        svg.appendChild(path);
        // Arrowhead at the final point.
        const last = points[points.length - 1];
        const prev = points[points.length - 2];
        const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
        const ah = 12;
        const lx = last.x - ah * Math.cos(angle - Math.PI / 6);
        const ly = last.y - ah * Math.sin(angle - Math.PI / 6);
        const rx = last.x - ah * Math.cos(angle + Math.PI / 6);
        const ry = last.y - ah * Math.sin(angle + Math.PI / 6);
        const arrow = document.createElementNS(NS, "polygon");
        arrow.setAttribute("points", `${last.x},${last.y} ${lx},${ly} ${rx},${ry}`);
        svg.appendChild(arrow);
        overlayLayer.appendChild(svg);
        setTimeout(() => svg.remove(), 1700);
      }

      function spawnSwipe(args) {
        const a = devToStagePx({ x: args.fromX, y: args.fromY });
        const b = devToStagePx({ x: args.toX, y: args.toY });
        if (!a || !b) return;
        spawnSwipePath([a, b]);
      }

      function spawnCustomGesture(args) {
        const events = Array.isArray(args?.events) ? args.events : [];
        const points = [];
        for (const e of events) {
          if (typeof e?.x !== "number" || typeof e?.y !== "number") continue;
          const p = devToStagePx({ x: e.x, y: e.y });
          if (p) points.push(p);
        }
        if (!points.length) return;
        if (points.length === 1) {
          spawnTap({ x: events[0].x, y: events[0].y });
          return;
        }
        spawnSwipePath(points);
      }

      function spawnPinch(args) {
        if (!overlayLayer) return;
        if (typeof args?.centerX !== "number" || typeof args?.centerY !== "number") return;
        const c = devToStagePx({ x: args.centerX, y: args.centerY });
        if (!c) return;
        // Pinch is animated as two fingers spreading from startDistance to
        // endDistance (in normalized [0,1] device coords). We render in pixels.
        const r = imgRectInStage();
        const scaleToPx = r ? Math.min(r.width, r.height) : 0;
        const startSpread = (Number(args.startDistance) || 0.1) * scaleToPx * 0.5;
        const endSpread = (Number(args.endDistance) || 0.2) * scaleToPx * 0.5;
        for (const sign of [-1, 1]) {
          const dot = document.createElement("div");
          dot.className = "action-tap pinch-marker";
          dot.style.left = c.x + sign * startSpread + "px";
          dot.style.top = c.y + "px";
          overlayLayer.appendChild(dot);
          // Animate after layout so the transition fires.
          requestAnimationFrame(() => {
            dot.style.left = c.x + sign * endSpread + "px";
          });
          setTimeout(() => {
            dot.style.opacity = "0";
          }, 480);
          setTimeout(() => dot.remove(), 900);
        }
      }

      function spawnFlash() {
        if (!overlayLayer) return;
        const r = imgRectInStage();
        if (!r) return;
        const flash = document.createElement("div");
        flash.className = "action-flash";
        flash.style.left = r.left + "px";
        flash.style.top = r.top + "px";
        flash.style.width = r.width + "px";
        flash.style.height = r.height + "px";
        overlayLayer.appendChild(flash);
        setTimeout(() => flash.remove(), 600);
      }

      function spawnHud(text, kind) {
        if (!hudLayer) return;
        const chip = document.createElement("div");
        chip.className = "hud-chip" + (kind ? " " + kind : "");
        chip.textContent = text;
        hudLayer.appendChild(chip);
        setTimeout(() => chip.remove(), 2400);
      }

      /**
       * Per-tool visualization. Called twice per invocation: once with phase
       * "start" (we know args), once with "end" or "error" (we know result).
       * Most spatial visualizations fire on start so the agent's intent shows
       * up immediately; screenshot's flash also fires on start.
       */
      function visualize(name, phase, args, error) {
        if (phase !== "start") {
          if (phase === "error" && (name === "gesture-tap" || name === "gesture-swipe")) {
            spawnHud(`${name} failed: ${truncate(error || "", 60)}`, "error");
          }
          return;
        }
        switch (name) {
          case "gesture-tap":
            spawnTap(args);
            return;
          case "gesture-swipe":
            spawnSwipe(args);
            return;
          case "gesture-pinch":
            spawnPinch(args);
            return;
          case "gesture-rotate":
            if (typeof args?.centerX === "number" && typeof args?.centerY === "number") {
              spawnTap({ x: args.centerX, y: args.centerY }, "inspect");
            }
            {
              const sweep =
                typeof args?.startAngle === "number" && typeof args?.endAngle === "number"
                  ? `${(((args.endAngle - args.startAngle) * 180) / Math.PI).toFixed(0)}°`
                  : "";
              spawnHud(`↻ rotate ${sweep}`);
            }
            return;
          case "gesture-custom":
            spawnCustomGesture(args);
            return;
          case "native-view-at-point":
          case "native-user-interactable-view-at-point":
            spawnTap(args, "inspect");
            spawnHud(`🔍 inspect (${formatXY(args)})`);
            return;
          case "screenshot":
            spawnFlash();
            spawnHud("📸 screenshot");
            return;
          case "describe":
          case "native-describe-screen":
          case "native-full-hierarchy":
            spawnHud(`🌳 ${name}`);
            return;
          case "native-find-views": {
            // Pick the most descriptive selector field that was actually set.
            const sel =
              args?.identifier || args?.label || args?.nativeID || args?.className || "";
            spawnHud(`🔎 find: ${truncate(sel, 32)}`);
            return;
          }
          case "button":
            spawnHud(`⏺ ${args?.button || "button"}`);
            return;
          case "keyboard":
            if (args?.text) {
              spawnHud(`⌨ ${truncate(args.text, 24)}`);
            } else if (args?.key) {
              spawnHud(`⌨ ${args.key}`);
            } else {
              spawnHud("⌨ keyboard");
            }
            return;
          case "rotate":
            spawnHud(`↻ ${args?.orientation || "rotate"}`);
            return;
          case "launch-app":
            spawnHud(`🚀 launch ${args?.bundleId || ""}`);
            return;
          case "restart-app":
            spawnHud(`🔄 restart ${args?.bundleId || ""}`);
            return;
          case "reinstall-app":
            spawnHud(`📦 reinstall ${args?.bundleId || ""}`);
            return;
          case "boot-simulator":
            spawnHud(`⏻ boot ${(args?.udid || "").slice(0, 8)}`);
            return;
          case "open-url":
            spawnHud(`🔗 ${truncate(args?.url || "", 48)}`);
            return;
          case "run-sequence": {
            const n = Array.isArray(args?.steps) ? args.steps.length : 0;
            spawnHud(`▶ sequence (${n} step${n === 1 ? "" : "s"})`);
            return;
          }
          case "view-network-logs":
            spawnHud(`🌐 network logs`);
            return;
          case "debugger-evaluate":
            spawnHud(`🪛 eval: ${truncate(args?.expression || "", 32)}`);
            return;
          case "debugger-reload-metro":
            spawnHud("🔁 metro reload");
            return;
          default:
            // Feed-only — no overlay treatment for this tool.
            return;
        }
      }

      function formatXY(args) {
        if (typeof args?.x === "number" && typeof args?.y === "number") {
          return `${args.x.toFixed(2)}, ${args.y.toFixed(2)}`;
        }
        return "";
      }
      function truncate(s, n) {
        s = String(s);
        return s.length > n ? s.slice(0, n - 1) + "…" : s;
      }

      // ── Activity feed ───────────────────────────────────────────────────
      function feedAdd(event) {
        feedEmptyEl.style.display = "none";
        const item = document.createElement("div");
        item.className = "feed-item in-progress";
        const row = document.createElement("div");
        row.className = "row";
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "•••";
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = event.name;
        const duration = document.createElement("span");
        duration.className = "duration";
        duration.textContent = "…";
        row.appendChild(badge);
        row.appendChild(name);
        row.appendChild(duration);
        item.appendChild(row);
        const args = document.createElement("div");
        args.className = "args";
        args.textContent = formatArgsLine(event.args);
        item.appendChild(args);
        const detail = document.createElement("div");
        detail.className = "detail";
        item.appendChild(detail);
        item.addEventListener("click", () => item.classList.toggle("expanded"));
        feedListEl.insertBefore(item, feedListEl.firstChild?.nextSibling || null);
        // Cap at 200 items to keep the DOM bounded during long sessions.
        const items = feedListEl.querySelectorAll(".feed-item");
        for (let i = 200; i < items.length; i++) items[i].remove();
        return { item, badge, duration, detail };
      }

      function feedFinalize(rec, event, ok) {
        if (!rec || !rec.item.isConnected) return;
        rec.item.classList.remove("in-progress");
        rec.item.classList.add(ok ? "ok" : "error");
        rec.badge.textContent = ok ? "OK" : "ERR";
        rec.duration.textContent = formatMs(event.durationMs);
        rec.detail.textContent = formatDetailBlock(event, ok);
      }

      function formatArgsLine(a) {
        if (a == null) return "";
        try {
          const s = JSON.stringify(a);
          return truncate(s, 96);
        } catch {
          return String(a);
        }
      }
      function formatDetailBlock(event, ok) {
        const parts = [];
        if (event.args !== undefined) {
          parts.push("args:\n" + safeStringify(event.args));
        }
        if (ok && event.result !== undefined) {
          parts.push("result:\n" + safeStringify(event.result));
        }
        if (!ok && event.error) {
          parts.push("error:\n" + event.error);
        }
        return parts.join("\n\n");
      }
      function safeStringify(v) {
        try {
          const s = JSON.stringify(v, null, 2);
          // Cap detail body to avoid pathological multi-MB results making the
          // sidebar jank — full payload is still on the wire if needed.
          return s.length > 4000 ? s.slice(0, 4000) + "\n…(truncated)" : s;
        } catch {
          return String(v);
        }
      }
      function formatMs(ms) {
        if (ms == null) return "—";
        if (ms < 1000) return Math.round(ms) + "ms";
        return (ms / 1000).toFixed(2) + "s";
      }

      function handleAction(event) {
        const key = `${event.id}:${event.phase}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        if (seenEvents.size > SEEN_CAP) {
          // Drop oldest insertion order — Set iteration order is insertion order.
          const drop = seenEvents.size - SEEN_CAP;
          let i = 0;
          for (const k of seenEvents) {
            if (i++ >= drop) break;
            seenEvents.delete(k);
          }
        }
        if (event.phase === "start") {
          const rec = feedAdd(event);
          inflight.set(event.id, rec);
          visualize(event.name, "start", event.args);
        } else {
          const rec = inflight.get(event.id);
          inflight.delete(event.id);
          feedFinalize(rec, event, event.phase === "end");
          visualize(event.name, event.phase, event.args, event.error);
        }
      }

      function subscribeActions() {
        if (actionEvents) {
          try {
            actionEvents.close();
          } catch {}
        }
        actionEvents = new EventSource(`${TOOL_SERVER}/preview/events`);
        actionEvents.addEventListener("open", () => setFeedStatus("live", "live"));
        actionEvents.addEventListener("action", (e) => {
          let event;
          try {
            event = JSON.parse(e.data);
          } catch {
            return;
          }
          handleAction(event);
        });
        actionEvents.onerror = () => {
          // EventSource auto-retries on the next tick. Reflect status until then.
          setFeedStatus("reconnecting…", "error");
        };
      }

      subscribeActions();
      refreshSimulators();
    </script>
  </body>
</html>
