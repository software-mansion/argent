<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Argent — observing</title>
    <style>
      /* ─────────────────────────────────────────────────────────────────
         Tokens
         ───────────────────────────────────────────────────────────────── */
      :root {
        /* Surface palette */
        --bg: #06070b;
        --bg-2: #0b0d14;
        --surface-1: rgba(255, 255, 255, 0.04);
        --surface-2: rgba(255, 255, 255, 0.06);
        --border-1: rgba(255, 255, 255, 0.07);
        --border-2: rgba(255, 255, 255, 0.12);

        /* Text */
        --fg-1: #f6f7fb;
        --fg-2: #b9bcca;
        --fg-3: #757988;
        --fg-4: #4a4e5d;

        /* Category accents */
        --c-touch: #6aa6ff;
        --c-hardware: #b794ff;
        --c-inspect: #ffd166;
        --c-capture: #5cdc8b;
        --c-lifecycle: #ff9b6a;
        --c-debug: #6affd4;
        --c-meta: #cfd2dd;
        --c-error: #ff8080;

        /* Sizing */
        --device-max-h: 86vh;
        --device-min-w: 360px;
        --sidebar-w: 400px;

        /* Easings */
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      }

      /* ─────────────────────────────────────────────────────────────────
         Reset + base
         ───────────────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg-1);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, system-ui,
          sans-serif;
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::selection {
        background: rgba(106, 166, 255, 0.35);
        color: var(--fg-1);
      }

      /* ─────────────────────────────────────────────────────────────────
         Layout
         ───────────────────────────────────────────────────────────────── */
      #root {
        position: relative;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 1fr var(--sidebar-w);
        background:
          radial-gradient(
            140% 100% at 30% 0%,
            rgba(106, 166, 255, 0.18) 0%,
            transparent 55%
          ),
          radial-gradient(140% 100% at 80% 100%, rgba(183, 148, 255, 0.14) 0%, transparent 60%),
          radial-gradient(60% 60% at 50% 50%, var(--bg-2) 0%, var(--bg) 100%);
      }
      /* Vignette that focuses attention on the centered device. */
      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: radial-gradient(
          80% 70% at 50% 55%,
          transparent 0%,
          transparent 50%,
          rgba(0, 0, 0, 0.45) 100%
        );
      }
      .ambient {
        position: fixed;
        inset: -15vh -15vw;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(46% 36% at 28% 28%, rgba(106, 166, 255, 0.32), transparent 62%),
          radial-gradient(40% 30% at 72% 64%, rgba(183, 148, 255, 0.28), transparent 62%),
          radial-gradient(28% 22% at 50% 50%, rgba(106, 255, 212, 0.08), transparent 70%);
        filter: blur(80px) saturate(1.25);
        animation: ambientDrift 22s var(--ease-in-out) infinite alternate;
      }
      @keyframes ambientDrift {
        from {
          transform: translate3d(-2%, -1%, 0) scale(1);
        }
        to {
          transform: translate3d(3%, 2%, 0) scale(1.05);
        }
      }
      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.5;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.045) 1px,
          transparent 1px
        );
        background-size: 3px 3px;
        mix-blend-mode: overlay;
      }

      /* ─────────────────────────────────────────────────────────────────
         Header chrome
         ───────────────────────────────────────────────────────────────── */
      header.chrome {
        grid-column: 1 / -1;
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 14px 22px 12px;
        border-bottom: 1px solid var(--border-1);
        background: linear-gradient(
          180deg,
          rgba(8, 10, 14, 0.92) 0%,
          rgba(8, 10, 14, 0.62) 100%
        );
        backdrop-filter: blur(14px) saturate(1.2);
        -webkit-backdrop-filter: blur(14px) saturate(1.2);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fg-2);
        font-weight: 600;
      }
      .brand .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6aa6ff, #b794ff);
        box-shadow: 0 0 12px rgba(106, 166, 255, 0.8);
      }
      .brand .word {
        color: var(--fg-1);
      }
      .brand .verb {
        color: var(--fg-3);
        margin-left: 4px;
        letter-spacing: 0.14em;
      }
      .device-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 11px 5px 9px;
        border: 1px solid var(--border-2);
        border-radius: 999px;
        background: var(--surface-1);
        font-size: 12px;
        color: var(--fg-1);
      }
      .device-pill .icon {
        width: 14px;
        height: 14px;
        opacity: 0.9;
      }
      .device-pill .runtime {
        color: var(--fg-3);
      }
      .conn {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--fg-2);
      }
      .conn .pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--fg-3);
        box-shadow: 0 0 0 0 transparent;
      }
      .conn.live .pulse {
        background: var(--c-capture);
        animation: livePulse 1.6s ease-out infinite;
      }
      .conn.reconnecting .pulse {
        background: var(--c-inspect);
        animation: livePulse 1s ease-out infinite;
      }
      .conn.offline .pulse {
        background: var(--c-error);
      }
      @keyframes livePulse {
        0% {
          box-shadow: 0 0 0 0 currentColor;
          opacity: 1;
        }
        70% {
          box-shadow: 0 0 0 8px transparent;
          opacity: 1;
        }
        100% {
          opacity: 1;
        }
      }
      .stats {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 12px;
        color: var(--fg-2);
      }
      .stats .stat strong {
        color: var(--fg-1);
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        margin-right: 4px;
      }
      .stats .stat .label {
        color: var(--fg-3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 10px;
      }
      .stats .sep {
        width: 1px;
        height: 12px;
        background: var(--border-1);
      }

      /* ─────────────────────────────────────────────────────────────────
         Stage (centered device)
         ───────────────────────────────────────────────────────────────── */
      main.stage {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-rows: 1fr auto;
        align-items: center;
        justify-items: center;
        padding: 28px 28px 24px;
        min-height: 0;
      }
      .device-wrap {
        position: relative;
        display: grid;
        place-items: center;
        height: 100%;
        width: 100%;
        min-height: 0;
      }
      .device-glow {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 78%;
        max-width: 760px;
        aspect-ratio: 9 / 16;
        background: radial-gradient(
          55% 55% at 50% 50%,
          rgba(106, 166, 255, 0.55) 0%,
          rgba(183, 148, 255, 0.28) 40%,
          transparent 78%
        );
        filter: blur(64px);
        opacity: 0.85;
        z-index: 0;
        animation: glowBreathe 7s ease-in-out infinite;
      }
      @keyframes glowBreathe {
        0%,
        100% {
          opacity: 0.7;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      .device {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        max-height: var(--device-max-h);
        min-width: var(--device-min-w);
        z-index: 1;
        filter: drop-shadow(0 40px 90px rgba(0, 0, 0, 0.7))
          drop-shadow(0 0 60px rgba(106, 166, 255, 0.12));
      }
      .stream {
        max-width: 100%;
        max-height: var(--device-max-h);
        min-width: var(--device-min-w);
        object-fit: contain;
        border-radius: 18px;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        pointer-events: none;
        display: block;
      }
      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: visible;
      }
      .stream-fallback {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: min(420px, 60vw);
        aspect-ratio: 9 / 19.5;
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
          radial-gradient(60% 40% at 50% 30%, rgba(106, 166, 255, 0.12), transparent 70%);
        border: 1px solid var(--border-1);
        padding: 32px;
        gap: 14px;
        color: var(--fg-2);
        text-align: center;
      }
      .stream-fallback .title {
        font-size: 15px;
        color: var(--fg-1);
        font-weight: 600;
      }
      .stream-fallback .sub {
        font-size: 12px;
        color: var(--fg-3);
        max-width: 280px;
        line-height: 1.5;
      }
      .stream-fallback .spinner {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--border-2);
        border-top-color: var(--c-touch);
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ─────────────────────────────────────────────────────────────────
         Spatial overlay primitives
         ───────────────────────────────────────────────────────────────── */
      .ov-tap {
        position: absolute;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .ov-tap .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid currentColor;
        opacity: 0;
        box-shadow: 0 0 32px currentColor, 0 0 8px currentColor;
        animation: tapRing 2400ms var(--ease-out) forwards;
      }
      .ov-tap .ring.r2 {
        animation-delay: 220ms;
      }
      .ov-tap .ring.r3 {
        animation-delay: 440ms;
      }
      .ov-tap .core {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 28px;
        height: 28px;
        margin-left: -14px;
        margin-top: -14px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 40px currentColor, 0 0 12px currentColor;
        opacity: 0;
        animation: tapCore 1800ms var(--ease-out) forwards;
      }
      @keyframes tapRing {
        0% {
          transform: scale(0.1);
          opacity: 0;
          border-width: 5px;
        }
        15% {
          opacity: 1;
        }
        50% {
          opacity: 0.9;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
          border-width: 1px;
        }
      }
      @keyframes tapCore {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }
        18% {
          transform: scale(1.1);
          opacity: 1;
        }
        70% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.7);
          opacity: 0;
        }
      }
      .ov-label {
        position: absolute;
        transform: translate(-50%, calc(-100% - 12px));
        font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fg-1);
        background: color-mix(in srgb, currentColor 35%, rgba(0, 0, 0, 0.85));
        border: 1px solid color-mix(in srgb, currentColor 60%, transparent);
        padding: 4px 10px;
        border-radius: 6px;
        box-shadow: 0 0 18px color-mix(in srgb, currentColor 35%, transparent),
          0 4px 16px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        white-space: nowrap;
        opacity: 0;
        animation: labelFloat 1500ms var(--ease-out) forwards;
        pointer-events: none;
      }
      @keyframes labelFloat {
        0% {
          opacity: 0;
          transform: translate(-50%, calc(-100% + 0px));
        }
        15% {
          opacity: 1;
          transform: translate(-50%, calc(-100% - 12px));
        }
        80% {
          opacity: 1;
          transform: translate(-50%, calc(-100% - 12px));
        }
        100% {
          opacity: 0;
          transform: translate(-50%, calc(-100% - 26px));
        }
      }
      .ov-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
      }
      .ov-svg .trail {
        fill: none;
        stroke: currentColor;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 16px currentColor) drop-shadow(0 0 6px currentColor);
        animation: fadeOut 900ms 2100ms var(--ease-in-out) forwards;
      }
      .ov-svg .trail-glow {
        fill: none;
        stroke: currentColor;
        stroke-width: 24;
        stroke-linecap: round;
        opacity: 0.32;
        filter: blur(8px);
        animation: fadeOut 900ms 2100ms var(--ease-in-out) forwards;
      }
      @keyframes dashIn {
        to {
          stroke-dashoffset: 0;
        }
      }
      .ov-svg .arrow {
        fill: currentColor;
        opacity: 0;
        filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 6px currentColor);
        animation:
          fadeIn 280ms 800ms var(--ease-out) forwards,
          fadeOut 900ms 2100ms var(--ease-in-out) forwards;
      }
      .ov-svg .head {
        fill: currentColor;
        filter: drop-shadow(0 0 12px currentColor);
        opacity: 0;
        animation: headTravel 800ms var(--ease-out) forwards,
          fadeOut 600ms 800ms ease-out forwards;
      }
      .ov-svg .pinch-line {
        stroke: currentColor;
        stroke-width: 2;
        stroke-dasharray: 4 6;
        opacity: 0;
        filter: drop-shadow(0 0 6px currentColor);
        animation:
          fadeIn 220ms 80ms var(--ease-out) forwards,
          fadeOut 500ms 1000ms ease-out forwards;
      }
      @keyframes dashIn {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
      @keyframes headTravel {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }
      .ov-pinch {
        position: absolute;
        width: 110px;
        height: 110px;
        margin-left: -55px;
        margin-top: -55px;
        border-radius: 50%;
        pointer-events: none;
        background-color: color-mix(in srgb, currentColor 18%, transparent);
        background-image: radial-gradient(
          circle,
          color-mix(in srgb, currentColor 45%, transparent) 0%,
          color-mix(in srgb, currentColor 12%, transparent) 50%,
          rgba(255, 255, 255, 0) 78%
        );
        border: 4px solid currentColor;
        box-shadow: 0 0 32px currentColor, 0 0 10px currentColor;
        opacity: 0;
        animation: pinchPop 2200ms var(--ease-out) forwards;
        transition: left 1000ms var(--ease-out), top 1000ms var(--ease-out);
      }
      @keyframes pinchPop {
        0% {
          opacity: 0;
          transform: scale(0.4);
        }
        15% {
          opacity: 1;
          transform: scale(1);
        }
        85% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.9);
        }
      }
      .ov-crosshair {
        position: absolute;
        width: 160px;
        height: 160px;
        margin-left: -80px;
        margin-top: -80px;
        pointer-events: none;
        color: var(--c-inspect);
        opacity: 0;
        animation: crossPop 2400ms var(--ease-out) forwards;
      }
      .ov-crosshair .v,
      .ov-crosshair .h {
        position: absolute;
        background: currentColor;
        box-shadow: 0 0 16px currentColor, 0 0 4px currentColor;
      }
      .ov-crosshair .v {
        left: 50%;
        top: 0;
        bottom: 0;
        width: 3px;
        margin-left: -1.5px;
      }
      .ov-crosshair .h {
        top: 50%;
        left: 0;
        right: 0;
        height: 3px;
        margin-top: -1.5px;
      }
      .ov-crosshair .ring {
        position: absolute;
        inset: 32px;
        border-radius: 50%;
        border: 3px solid currentColor;
        box-shadow: 0 0 18px currentColor inset, 0 0 18px currentColor;
      }
      @keyframes crossPop {
        0% {
          opacity: 0;
          transform: scale(0.4);
        }
        12% {
          opacity: 1;
          transform: scale(1.05);
        }
        25% {
          transform: scale(1);
        }
        80% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.15);
        }
      }
      .ov-flash {
        position: absolute;
        background: white;
        border-radius: 14px;
        opacity: 0;
        animation: shutter 700ms var(--ease-out) forwards;
        pointer-events: none;
      }
      .ov-shutter-bar {
        position: absolute;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.7));
        pointer-events: none;
      }
      .ov-shutter-bar.top {
        top: 0;
        transform: translateY(-101%);
        animation: shutterTop 700ms var(--ease-out) forwards;
        border-radius: 14px 14px 0 0;
      }
      .ov-shutter-bar.bot {
        bottom: 0;
        transform: translateY(101%);
        animation: shutterBot 700ms var(--ease-out) forwards;
        border-radius: 0 0 14px 14px;
      }
      @keyframes shutter {
        0% {
          opacity: 0;
        }
        18% {
          opacity: 0.55;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes shutterTop {
        0%,
        100% {
          transform: translateY(-101%);
        }
        25%,
        45% {
          transform: translateY(0%);
        }
      }
      @keyframes shutterBot {
        0%,
        100% {
          transform: translateY(101%);
        }
        25%,
        45% {
          transform: translateY(0%);
        }
      }

      /* ─────────────────────────────────────────────────────────────────
         Now-playing caption
         ───────────────────────────────────────────────────────────────── */
      .now {
        position: relative;
        z-index: 3;
        margin-top: 18px;
        width: min(720px, 90%);
        min-height: 64px;
      }
      .now-card {
        position: relative;
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 14px;
        align-items: center;
        padding: 14px 22px;
        border-radius: 18px;
        border: 1px solid var(--border-2);
        background: linear-gradient(
          180deg,
          rgba(14, 16, 24, 0.85) 0%,
          rgba(8, 10, 14, 0.85) 100%
        );
        backdrop-filter: blur(18px) saturate(1.3);
        -webkit-backdrop-filter: blur(18px) saturate(1.3);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 30px 60px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 420ms var(--ease-out),
          transform 420ms var(--ease-out);
        overflow: hidden;
      }
      .now.show .now-card {
        opacity: 1;
        transform: translateY(0);
      }
      .now-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: currentColor;
        box-shadow: 0 0 16px currentColor;
      }
      .now-card.ok::after,
      .now-card.err::after {
        content: "";
        position: absolute;
        right: 18px;
        top: 16px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .now-card.ok::after {
        background: var(--c-capture);
        box-shadow: 0 0 10px var(--c-capture);
      }
      .now-card.err::after {
        background: var(--c-error);
        box-shadow: 0 0 10px var(--c-error);
      }
      .now-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        background: color-mix(in srgb, currentColor 18%, transparent);
        border: 1px solid color-mix(in srgb, currentColor 36%, transparent);
        color: currentColor;
        text-shadow: 0 0 14px currentColor;
      }
      .now-text .title {
        font-size: 19px;
        font-weight: 600;
        letter-spacing: -0.005em;
        color: var(--fg-1);
        line-height: 1.2;
      }
      .now-text .sub {
        font-size: 12.5px;
        color: var(--fg-3);
        margin-top: 3px;
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
      }
      .now-progress {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: var(--border-1);
        overflow: hidden;
      }
      .now-progress::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 30%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }
      .now-card.indeterminate .now-progress::before {
        animation: indet 1.6s linear infinite;
      }
      .now-card.done .now-progress::before {
        width: 100%;
        animation: none;
        opacity: 0.5;
      }
      @keyframes indet {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(360%);
        }
      }

      /* ─────────────────────────────────────────────────────────────────
         Timeline (right sidebar)
         ───────────────────────────────────────────────────────────────── */
      aside.timeline {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        border-left: 1px solid var(--border-1);
        background: linear-gradient(
          180deg,
          rgba(8, 10, 14, 0.6) 0%,
          rgba(8, 10, 14, 0.78) 100%
        );
        backdrop-filter: blur(14px) saturate(1.2);
        -webkit-backdrop-filter: blur(14px) saturate(1.2);
        min-height: 0;
      }
      .timeline-header {
        padding: 18px 22px 10px;
        display: flex;
        align-items: baseline;
        gap: 10px;
        border-bottom: 1px solid var(--border-1);
      }
      .timeline-header .eyebrow {
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fg-3);
      }
      .timeline-header .count {
        font-size: 11px;
        color: var(--fg-2);
        margin-left: auto;
        font-variant-numeric: tabular-nums;
      }
      .timeline-list {
        flex: 1;
        margin: 0;
        padding: 8px 0 24px;
        overflow-y: auto;
        list-style: none;
        scroll-behavior: smooth;
      }
      .timeline-list::-webkit-scrollbar {
        width: 8px;
      }
      .timeline-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 6px;
      }
      .timeline-empty {
        padding: 32px 22px;
        color: var(--fg-3);
        font-size: 12px;
        text-align: center;
      }
      .tl-item {
        position: relative;
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 22px 12px 22px;
        animation: tlIn 420ms var(--ease-out);
      }
      .tl-item::before {
        /* color rail */
        content: "";
        position: absolute;
        left: 14px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: currentColor;
        opacity: 0.16;
      }
      .tl-item:first-child::before {
        top: 50%;
      }
      .tl-item:last-child::before {
        bottom: 50%;
      }
      .tl-item.in-progress {
        background: linear-gradient(
          90deg,
          color-mix(in srgb, currentColor 12%, transparent),
          transparent 60%
        );
      }
      @keyframes tlIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tl-icon {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        background: color-mix(in srgb, currentColor 22%, transparent);
        color: currentColor;
        border: 1px solid color-mix(in srgb, currentColor 38%, transparent);
        box-shadow: 0 0 18px color-mix(in srgb, currentColor 45%, transparent);
      }
      .tl-text {
        min-width: 0;
      }
      .tl-text .title {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--fg-1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.005em;
      }
      .tl-text .sub {
        font-size: 11.5px;
        color: var(--fg-3);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        margin-top: 2px;
      }
      .tl-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .tl-time {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg-3);
        font-variant-numeric: tabular-nums;
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
      }
      .tl-status {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .tl-status.in-progress {
        background: currentColor;
        animation: livePulse 1.2s ease-out infinite;
      }
      .tl-status.ok {
        background: var(--c-capture);
        box-shadow: 0 0 6px var(--c-capture);
      }
      .tl-status.err {
        background: var(--c-error);
        box-shadow: 0 0 6px var(--c-error);
      }
      .tl-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-1), transparent);
        margin: 8px 22px;
      }

      /* ─────────────────────────────────────────────────────────────────
         Category color hooks
         ───────────────────────────────────────────────────────────────── */
      .c-touch {
        color: var(--c-touch);
      }
      .c-hardware {
        color: var(--c-hardware);
      }
      .c-inspect {
        color: var(--c-inspect);
      }
      .c-capture {
        color: var(--c-capture);
      }
      .c-lifecycle {
        color: var(--c-lifecycle);
      }
      .c-debug {
        color: var(--c-debug);
      }
      .c-meta {
        color: var(--c-meta);
      }
      .c-error {
        color: var(--c-error);
      }
      .c-other {
        color: var(--c-meta);
      }

      /* ─────────────────────────────────────────────────────────────────
         Initial empty / waiting states
         ───────────────────────────────────────────────────────────────── */
      .waiting {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        color: var(--fg-2);
      }
      .waiting .pulse-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--c-touch);
        box-shadow: 0 0 28px var(--c-touch);
        animation: livePulse 1.6s ease-out infinite;
      }

      /* responsive: collapse sidebar on narrow screens */
      @media (max-width: 1080px) {
        :root {
          --sidebar-w: 360px;
        }
      }
      @media (max-width: 880px) {
        #root {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr auto;
        }
        aside.timeline {
          border-left: 0;
          border-top: 1px solid var(--border-1);
          max-height: 38vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="ambient" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <header class="chrome">
        <div class="brand">
          <span class="dot"></span>
          <span class="word">Argent</span>
          <span class="verb">observing</span>
        </div>
        <div class="device-pill" id="device-pill" hidden>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="2" width="12" height="20" rx="2.5"></rect>
            <path d="M11 18h2"></path>
          </svg>
          <span id="device-name">—</span>
          <span class="runtime" id="device-runtime"></span>
        </div>
        <div class="stats">
          <div class="stat">
            <strong id="stat-actions">0</strong>
            <span class="label">actions</span>
          </div>
          <div class="sep"></div>
          <div class="stat">
            <strong id="stat-errors">0</strong>
            <span class="label">errors</span>
          </div>
          <div class="sep"></div>
          <div class="stat">
            <strong id="stat-elapsed">0:00</strong>
            <span class="label">elapsed</span>
          </div>
        </div>
        <div class="conn offline" id="conn">
          <span class="pulse"></span>
          <span id="conn-text">connecting</span>
        </div>
      </header>

      <main class="stage">
        <div class="device-wrap" id="device-wrap">
          <div class="device-glow"></div>
          <div class="waiting" id="waiting">
            <span class="pulse-dot"></span>
            <span>looking for a booted simulator…</span>
          </div>
        </div>
        <div class="now" id="now"></div>
      </main>

      <aside class="timeline">
        <div class="timeline-header">
          <span class="eyebrow">Timeline</span>
          <span class="count" id="tl-count"></span>
        </div>
        <ol class="timeline-list" id="tl-list">
          <li class="timeline-empty" id="tl-empty">No actions observed yet.</li>
        </ol>
      </aside>
    </div>

    <script>
      "use strict";

      // ─────────────────────────────────────────────────────────────────
      // Config
      // ─────────────────────────────────────────────────────────────────
      const urlParams = new URLSearchParams(window.location.search);
      const TOOL_SERVER =
        urlParams.get("toolServer") ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:3001");

      // ─────────────────────────────────────────────────────────────────
      // DOM refs
      // ─────────────────────────────────────────────────────────────────
      const $ = (id) => document.getElementById(id);
      const els = {
        deviceWrap: $("device-wrap"),
        waiting: $("waiting"),
        devicePill: $("device-pill"),
        deviceName: $("device-name"),
        deviceRuntime: $("device-runtime"),
        statActions: $("stat-actions"),
        statErrors: $("stat-errors"),
        statElapsed: $("stat-elapsed"),
        conn: $("conn"),
        connText: $("conn-text"),
        now: $("now"),
        tlList: $("tl-list"),
        tlEmpty: $("tl-empty"),
        tlCount: $("tl-count"),
      };

      // ─────────────────────────────────────────────────────────────────
      // State
      // ─────────────────────────────────────────────────────────────────
      let stream = null; // <img> element of MJPEG stream
      let overlayLayer = null; // floats above .stream
      let device = null; // .device wrapper
      let currentUdid = null;
      let actionEvents = null;
      const inflight = new Map(); // id → { item, statusEl, descObj, startedAt }
      const seen = new Set(); // `${id}:${phase}` deduplication
      const SEEN_CAP = 1000;
      const sessionStart = performance.now();
      let totalActions = 0;
      let totalErrors = 0;
      let visibleNowId = null;
      let nowFadeTimer = null;

      // ─────────────────────────────────────────────────────────────────
      // Action taxonomy
      // ─────────────────────────────────────────────────────────────────
      function categoryFor(name) {
        if (!name) return "other";
        if (name.startsWith("gesture-")) return "touch";
        if (["button", "keyboard", "rotate", "paste"].includes(name)) return "hardware";
        if (
          name === "describe" ||
          name === "native-describe-screen" ||
          name === "native-full-hierarchy" ||
          name === "native-find-views" ||
          name === "native-view-at-point" ||
          name === "native-user-interactable-view-at-point"
        )
          return "inspect";
        if (name === "screenshot") return "capture";
        if (
          [
            "launch-app",
            "restart-app",
            "reinstall-app",
            "boot-simulator",
            "open-url",
            "stop-metro",
            "stop-simulator-server",
            "stop-all-simulator-servers",
          ].includes(name)
        )
          return "lifecycle";
        if (
          name.startsWith("debugger-") ||
          name.startsWith("react-profiler-") ||
          name.startsWith("ios-profiler-") ||
          name.startsWith("profiler-") ||
          name.startsWith("view-network-") ||
          name === "native-network-logs"
        )
          return "debug";
        if (name === "run-sequence" || name.startsWith("flow-")) return "meta";
        return "other";
      }

      function pct(n) {
        if (typeof n !== "number") return "—";
        return `${Math.round(n * 100)}%`;
      }
      function loc(args) {
        if (!args) return "";
        if (typeof args.x === "number" && typeof args.y === "number")
          return `${pct(args.x)} × ${pct(args.y)}`;
        if (typeof args.centerX === "number" && typeof args.centerY === "number")
          return `${pct(args.centerX)} × ${pct(args.centerY)}`;
        return "";
      }
      function trunc(s, n) {
        s = String(s ?? "");
        return s.length > n ? s.slice(0, n - 1) + "…" : s;
      }
      function dirWord(args) {
        const dx = (args.toX ?? 0) - (args.fromX ?? 0);
        const dy = (args.toY ?? 0) - (args.fromY ?? 0);
        if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? "right" : "left";
        return dy > 0 ? "down" : "up";
      }
      function dirArrow(args) {
        const dx = (args.toX ?? 0) - (args.fromX ?? 0);
        const dy = (args.toY ?? 0) - (args.fromY ?? 0);
        if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? "→" : "←";
        return dy > 0 ? "↓" : "↑";
      }
      function buttonIcon(name) {
        switch (name) {
          case "home":
            return "⏺";
          case "back":
            return "◁";
          case "power":
            return "⏻";
          case "volumeUp":
            return "🔊";
          case "volumeDown":
            return "🔉";
          case "appSwitch":
            return "⊞";
          case "actionButton":
            return "◉";
          default:
            return "⏺";
        }
      }

      /**
       * Map a raw tool name + args into a presentable description.
       * { icon, title, sub, label } — `label` is the tiny floating label
       * drawn next to spatial markers; falls back to title.
       */
      function describe(name, args = {}) {
        switch (name) {
          case "gesture-tap":
            return { icon: "👆", title: "Tap", sub: loc(args), label: "TAP" };
          case "gesture-swipe":
            return {
              icon: dirArrow(args),
              title: `Swipe ${dirWord(args)}`,
              sub: `${pct(args.fromX)},${pct(args.fromY)} → ${pct(args.toX)},${pct(args.toY)}`,
              label: `SWIPE ${dirArrow(args)}`,
            };
          case "gesture-pinch": {
            const grow = (args.endDistance ?? 0) > (args.startDistance ?? 0);
            return {
              icon: grow ? "⤢" : "⤡",
              title: `Pinch ${grow ? "out" : "in"}`,
              sub: `${pct(args.startDistance)} → ${pct(args.endDistance)} @ ${loc({ x: args.centerX, y: args.centerY })}`,
              label: `PINCH ${grow ? "OUT" : "IN"}`,
            };
          }
          case "gesture-rotate":
            return {
              icon: "↻",
              title: "Rotate gesture",
              sub: `${loc({ x: args.centerX, y: args.centerY })}`,
              label: "ROTATE",
            };
          case "gesture-custom":
            return {
              icon: "〰",
              title: "Custom gesture",
              sub: `${args.events?.length || 0} events`,
              label: "GESTURE",
            };
          case "native-view-at-point":
          case "native-user-interactable-view-at-point":
            return {
              icon: "🎯",
              title: "Inspect view",
              sub: loc(args),
              label: "INSPECT",
            };
          case "describe":
            return { icon: "🌳", title: "Describe screen", sub: "reading accessibility tree" };
          case "native-describe-screen":
            return {
              icon: "🌳",
              title: "Describe native screen",
              sub: trunc(args.bundleId, 40),
            };
          case "native-full-hierarchy":
            return {
              icon: "🌲",
              title: "Full view hierarchy",
              sub: trunc(args.bundleId, 40),
            };
          case "native-find-views": {
            const sel =
              args.identifier ||
              args.label ||
              args.nativeID ||
              args.className ||
              "(any)";
            return { icon: "🔎", title: "Find views", sub: trunc(sel, 40) };
          }
          case "screenshot":
            return { icon: "📸", title: "Screenshot", sub: "capturing screen" };
          case "button":
            return {
              icon: buttonIcon(args.button),
              title: `Press ${args.button || "button"}`,
              sub: "hardware button",
            };
          case "keyboard":
            return {
              icon: "⌨",
              title: "Keyboard",
              sub: args.text ? trunc(args.text, 40) : args.key || "—",
            };
          case "paste":
            return { icon: "📋", title: "Paste", sub: trunc(args.text || "", 40) };
          case "rotate":
            return {
              icon: "↻",
              title: "Rotate device",
              sub: args.orientation || "—",
            };
          case "launch-app":
            return { icon: "🚀", title: "Launch app", sub: args.bundleId || "—" };
          case "restart-app":
            return { icon: "🔄", title: "Restart app", sub: args.bundleId || "—" };
          case "reinstall-app":
            return { icon: "📦", title: "Reinstall app", sub: args.bundleId || "—" };
          case "boot-simulator":
            return {
              icon: "⏻",
              title: "Boot simulator",
              sub: (args.udid || "").slice(0, 8),
            };
          case "open-url":
            return { icon: "🔗", title: "Open URL", sub: trunc(args.url, 48) };
          case "run-sequence":
            return {
              icon: "▶",
              title: "Run sequence",
              sub: `${args.steps?.length || 0} steps`,
            };
          case "view-network-logs":
            return { icon: "🌐", title: "Network logs", sub: trunc(args.bundleId, 40) };
          case "view-network-request-details":
            return { icon: "🌐", title: "Inspect request", sub: trunc(args.eventId, 24) };
          case "debugger-evaluate":
            return {
              icon: "🪛",
              title: "Evaluate JS",
              sub: trunc(args.expression || "", 48),
            };
          case "debugger-reload-metro":
            return { icon: "🔁", title: "Reload Metro", sub: "" };
          case "debugger-component-tree":
            return { icon: "⚛", title: "Component tree", sub: "" };
          case "debugger-inspect-element":
            return { icon: "⚛", title: "Inspect element", sub: "" };
          case "debugger-log-registry":
            return { icon: "🪵", title: "Read console logs", sub: "" };
          case "debugger-connect":
            return { icon: "🪛", title: "Connect debugger", sub: "" };
          case "debugger-status":
            return { icon: "🪛", title: "Debugger status", sub: "" };
          case "react-profiler-start":
          case "react-profiler-stop":
          case "react-profiler-analyze":
          case "react-profiler-renders":
          case "react-profiler-cpu-summary":
          case "react-profiler-component-source":
          case "react-profiler-fiber-tree":
            return { icon: "📈", title: name.replace(/-/g, " "), sub: "react profiler" };
          case "ios-profiler-start":
          case "ios-profiler-stop":
          case "ios-profiler-analyze":
            return { icon: "📈", title: name.replace(/-/g, " "), sub: "instruments" };
          case "profiler-load":
          case "profiler-cpu-query":
          case "profiler-commit-query":
          case "profiler-stack-query":
          case "profiler-combined-report":
            return { icon: "📈", title: name.replace(/-/g, " "), sub: "profiler" };
          case "list-simulators":
            return { icon: "📋", title: "List simulators", sub: "" };
          case "gather-workspace-data":
            return { icon: "📁", title: "Read workspace", sub: "" };
          case "stop-metro":
            return { icon: "⏹", title: "Stop Metro", sub: "" };
          case "stop-simulator-server":
            return { icon: "⏹", title: "Stop simulator-server", sub: "" };
          case "stop-all-simulator-servers":
            return { icon: "⏹", title: "Stop all simulator-servers", sub: "" };
          case "native-devtools-status":
            return { icon: "🛠", title: "Native devtools status", sub: "" };
          case "native-network-logs":
            return { icon: "🌐", title: "Native network logs", sub: trunc(args.bundleId, 40) };
          case "flow-start-recording":
          case "flow-add-step":
          case "flow-add-echo":
          case "flow-finish-recording":
          case "flow-read-prerequisite":
          case "flow-execute":
            return { icon: "🎬", title: name.replace(/-/g, " "), sub: trunc(args.flowName || args.name || "", 40) };
          default:
            return { icon: "·", title: name, sub: "" };
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // Streaming: pick a simulator, build the device DOM
      // ─────────────────────────────────────────────────────────────────
      async function pickSimulator() {
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/simulators`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { simulators } = await res.json();
          const booted = (simulators || []).filter((s) => s.state === "Booted");
          if (booted.length === 0) {
            renderWaiting("looking for a booted simulator…");
            return null;
          }
          return booted[0];
        } catch (err) {
          renderWaiting(`could not reach tool-server (${trunc(err.message, 40)})`);
          return null;
        }
      }

      function renderWaiting(message) {
        if (!els.deviceWrap) return;
        // Re-create waiting state if it's been removed.
        let w = $("waiting");
        if (!w) {
          w = document.createElement("div");
          w.className = "waiting";
          w.id = "waiting";
          w.innerHTML = `<span class="pulse-dot"></span><span></span>`;
          els.deviceWrap.appendChild(w);
        }
        w.lastChild.textContent = message;
        teardownDevice();
      }

      function teardownDevice() {
        if (device && device.parentNode) device.remove();
        device = null;
        stream = null;
        overlayLayer = null;
      }

      function buildDevice(info) {
        const w = $("waiting");
        if (w) w.remove();
        teardownDevice();
        device = document.createElement("div");
        device.className = "device";
        if (info.streamUrl) {
          stream = document.createElement("img");
          stream.className = "stream";
          stream.alt = "";
          stream.draggable = false;
          stream.src = `${info.streamUrl}?t=${Date.now()}`;
          stream.onerror = () => {
            // Replace with a fallback panel; overlays still render on top of it.
            renderStreamFallback("the stream dropped — overlays still live");
          };
          device.appendChild(stream);
        } else {
          renderStreamFallbackInto(device, "no stream URL — overlays still live");
        }
        overlayLayer = document.createElement("div");
        overlayLayer.className = "overlay";
        device.appendChild(overlayLayer);
        els.deviceWrap.appendChild(device);
      }

      function renderStreamFallback(msg) {
        if (!device) return;
        device.innerHTML = "";
        renderStreamFallbackInto(device, msg);
        overlayLayer = document.createElement("div");
        overlayLayer.className = "overlay";
        device.appendChild(overlayLayer);
      }

      function renderStreamFallbackInto(parent, msg) {
        const fb = document.createElement("div");
        fb.className = "stream-fallback";
        fb.innerHTML = `
          <div class="spinner"></div>
          <div class="title">${msg}</div>
          <div class="sub">Action overlays continue to render here for every tool call the agent makes.</div>
        `;
        parent.appendChild(fb);
      }

      async function connectSimulator() {
        const sim = await pickSimulator();
        if (!sim) {
          // Try again in 3s.
          setTimeout(connectSimulator, 3000);
          return;
        }
        currentUdid = sim.udid;
        els.deviceName.textContent = sim.name;
        els.deviceRuntime.textContent = formatRuntime(sim.runtime);
        els.devicePill.hidden = false;

        let info;
        try {
          const res = await fetch(
            `${TOOL_SERVER}/preview/simulator-server/${encodeURIComponent(sim.udid)}`
          );
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          info = await res.json();
        } catch (err) {
          renderWaiting(`simulator-server failed: ${trunc(err.message, 60)}`);
          setTimeout(connectSimulator, 4000);
          return;
        }

        buildDevice(info);
      }

      function formatRuntime(s) {
        if (!s) return "";
        // "com.apple.CoreSimulator.SimRuntime.iOS-18-5" → "iOS 18.5"
        const m = /SimRuntime\.([A-Za-z]+)-(\d+)-(\d+)/.exec(s);
        if (m) return `${m[1]} ${m[2]}.${m[3]}`;
        return s;
      }

      // ─────────────────────────────────────────────────────────────────
      // Geometry helpers
      // ─────────────────────────────────────────────────────────────────
      function streamRect() {
        if (!stream || !device) return null;
        const a = stream.getBoundingClientRect();
        const d = device.getBoundingClientRect();
        if (!a.width || !a.height) return null;
        return {
          left: a.left - d.left,
          top: a.top - d.top,
          width: a.width,
          height: a.height,
        };
      }
      function fallbackRect() {
        // For the fallback panel, use the device rect itself.
        if (!device) return null;
        const d = device.getBoundingClientRect();
        if (!d.width || !d.height) return null;
        return { left: 0, top: 0, width: d.width, height: d.height };
      }
      function deviceRect() {
        return streamRect() || fallbackRect();
      }
      function devToPx(pt) {
        const r = deviceRect();
        if (!r) return null;
        const x = Math.max(0, Math.min(1, pt.x));
        const y = Math.max(0, Math.min(1, pt.y));
        return { x: r.left + x * r.width, y: r.top + y * r.height };
      }

      // ─────────────────────────────────────────────────────────────────
      // Spatial visualizers
      // ─────────────────────────────────────────────────────────────────
      function spawnTap(args, cat, label) {
        if (!overlayLayer) return;
        const p = devToPx({ x: args.x, y: args.y });
        if (!p) return;
        const wrap = document.createElement("div");
        wrap.className = `ov-tap c-${cat}`;
        wrap.style.left = p.x + "px";
        wrap.style.top = p.y + "px";
        wrap.innerHTML =
          '<span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span>';
        overlayLayer.appendChild(wrap);
        setTimeout(() => wrap.remove(), 2900);
        if (label) spawnLabel(p, label, cat);
      }

      function spawnLabel(p, text, cat) {
        const lab = document.createElement("div");
        lab.className = `ov-label c-${cat}`;
        lab.textContent = text;
        lab.style.left = p.x + "px";
        lab.style.top = p.y - 28 + "px";
        overlayLayer.appendChild(lab);
        setTimeout(() => lab.remove(), 1700);
      }

      function spawnPath(points, cat, label, anchor) {
        if (!overlayLayer || points.length < 2) return;
        const NS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(NS, "svg");
        svg.setAttribute("class", `ov-svg c-${cat}`);
        // Lock the SVG user-coordinate system to match its rendered pixel
        // size so the absolute coords we emit below land where we want.
        const r = overlayLayer.getBoundingClientRect();
        svg.setAttribute("viewBox", `0 0 ${r.width} ${r.height}`);
        svg.setAttribute("preserveAspectRatio", "none");
        const d = points.map((pt, i) => `${i === 0 ? "M" : "L"}${pt.x},${pt.y}`).join(" ");
        // Compute the actual path length so the dasharray animation can be
        // exact (rather than guessing 2400 — large constants don't always
        // animate cleanly across browsers).
        const dx = points[points.length - 1].x - points[0].x;
        const dy = points[points.length - 1].y - points[0].y;
        const len = Math.max(40, Math.hypot(dx, dy));
        const glow = document.createElementNS(NS, "path");
        glow.setAttribute("class", "trail-glow");
        glow.setAttribute("d", d);
        glow.setAttribute("fill", "none");
        glow.setAttribute("stroke", "currentColor");
        glow.style.strokeDasharray = String(len);
        glow.style.strokeDashoffset = String(len);
        svg.appendChild(glow);
        const trail = document.createElementNS(NS, "path");
        trail.setAttribute("class", "trail");
        trail.setAttribute("d", d);
        trail.setAttribute("fill", "none");
        trail.setAttribute("stroke", "currentColor");
        trail.style.strokeDasharray = String(len);
        trail.style.strokeDashoffset = String(len);
        svg.appendChild(trail);
        // Force reflow then animate to 0 so the keyframe is reliable
        // even when the target value differs per element.
        requestAnimationFrame(() => {
          trail.style.transition = "stroke-dashoffset 1100ms cubic-bezier(0.22, 1, 0.36, 1)";
          glow.style.transition = "stroke-dashoffset 1100ms cubic-bezier(0.22, 1, 0.36, 1)";
          trail.style.strokeDashoffset = "0";
          glow.style.strokeDashoffset = "0";
        });
        // Arrowhead at the final point.
        const last = points[points.length - 1];
        const prev = points[points.length - 2];
        const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
        const ah = 16;
        const lx = last.x - ah * Math.cos(angle - Math.PI / 6);
        const ly = last.y - ah * Math.sin(angle - Math.PI / 6);
        const rx = last.x - ah * Math.cos(angle + Math.PI / 6);
        const ry = last.y - ah * Math.sin(angle + Math.PI / 6);
        const arrow = document.createElementNS(NS, "polygon");
        arrow.setAttribute("class", "arrow");
        arrow.setAttribute("fill", "currentColor");
        arrow.setAttribute("points", `${last.x},${last.y} ${lx},${ly} ${rx},${ry}`);
        svg.appendChild(arrow);
        overlayLayer.appendChild(svg);
        setTimeout(() => svg.remove(), 3200);
        if (label && anchor) spawnLabel(anchor, label, cat);
      }

      function spawnSwipe(args, cat, label) {
        const a = devToPx({ x: args.fromX, y: args.fromY });
        const b = devToPx({ x: args.toX, y: args.toY });
        if (!a || !b) return;
        spawnPath([a, b], cat, label, a);
      }

      function spawnCustomGesture(args, cat, label) {
        const events = Array.isArray(args.events) ? args.events : [];
        const points = [];
        for (const e of events) {
          if (typeof e?.x !== "number" || typeof e?.y !== "number") continue;
          const p = devToPx({ x: e.x, y: e.y });
          if (p) points.push(p);
        }
        if (!points.length) return;
        if (points.length === 1) {
          spawnTap({ x: events[0].x, y: events[0].y }, cat, label);
          return;
        }
        spawnPath(points, cat, label, points[0]);
      }

      function spawnPinch(args, cat, label) {
        if (!overlayLayer) return;
        if (typeof args.centerX !== "number" || typeof args.centerY !== "number") return;
        const c = devToPx({ x: args.centerX, y: args.centerY });
        if (!c) return;
        const r = deviceRect();
        const px = (v) => v * Math.min(r.width, r.height) * 0.5;
        const startSpread = px(Math.max(0.04, args.startDistance || 0));
        const endSpread = px(Math.max(0.04, args.endDistance || 0));
        const NS = "http://www.w3.org/2000/svg";
        // Connecting line that extends with the spread.
        const svg = document.createElementNS(NS, "svg");
        svg.setAttribute("class", `ov-svg c-${cat}`);
        const olr = overlayLayer.getBoundingClientRect();
        svg.setAttribute("viewBox", `0 0 ${olr.width} ${olr.height}`);
        svg.setAttribute("preserveAspectRatio", "none");
        const line = document.createElementNS(NS, "line");
        line.setAttribute("class", "pinch-line");
        line.setAttribute("x1", c.x - startSpread);
        line.setAttribute("y1", c.y);
        line.setAttribute("x2", c.x + startSpread);
        line.setAttribute("y2", c.y);
        svg.appendChild(line);
        overlayLayer.appendChild(svg);
        // Animate the line endpoints to the end spread.
        requestAnimationFrame(() => {
          line.setAttribute("x1", c.x - endSpread);
          line.setAttribute("x2", c.x + endSpread);
          line.style.transition = "all 1000ms var(--ease-out)";
        });
        setTimeout(() => svg.remove(), 2400);
        for (const sign of [-1, 1]) {
          const dot = document.createElement("div");
          dot.className = `ov-pinch c-${cat}`;
          dot.style.left = c.x + sign * startSpread + "px";
          dot.style.top = c.y + "px";
          overlayLayer.appendChild(dot);
          requestAnimationFrame(() => {
            dot.style.left = c.x + sign * endSpread + "px";
          });
          setTimeout(() => dot.remove(), 2400);
        }
        if (label) spawnLabel(c, label, cat);
      }

      function spawnInspect(args, cat, label) {
        if (!overlayLayer) return;
        const p = devToPx({ x: args.x, y: args.y });
        if (!p) return;
        const el = document.createElement("div");
        el.className = `ov-crosshair c-${cat}`;
        el.style.left = p.x + "px";
        el.style.top = p.y + "px";
        el.innerHTML = '<span class="v"></span><span class="h"></span><span class="ring"></span>';
        overlayLayer.appendChild(el);
        setTimeout(() => el.remove(), 2500);
        if (label) spawnLabel(p, label, cat);
      }

      function spawnScreenshotEffect() {
        if (!overlayLayer) return;
        const r = deviceRect();
        if (!r) return;
        // White flash filling the screen rect.
        const flash = document.createElement("div");
        flash.className = "ov-flash";
        flash.style.left = r.left + "px";
        flash.style.top = r.top + "px";
        flash.style.width = r.width + "px";
        flash.style.height = r.height + "px";
        overlayLayer.appendChild(flash);
        setTimeout(() => flash.remove(), 800);
        // Two shutter bars that meet then split.
        for (const side of ["top", "bot"]) {
          const bar = document.createElement("div");
          bar.className = `ov-shutter-bar ${side}`;
          bar.style.left = r.left + "px";
          bar.style.width = r.width + "px";
          bar.style.height = r.height / 2 + "px";
          if (side === "top") bar.style.top = r.top + "px";
          if (side === "bot") bar.style.top = r.top + r.height / 2 + "px";
          // Override since CSS uses absolute fixed sides; we want stage-relative.
          bar.style.position = "absolute";
          bar.style.bottom = "auto";
          overlayLayer.appendChild(bar);
          setTimeout(() => bar.remove(), 800);
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // Now-playing caption
      // ─────────────────────────────────────────────────────────────────
      function showNow(event, descObj, cat) {
        clearTimeout(nowFadeTimer);
        visibleNowId = event.id;
        const phase = event.phase;
        const isStart = phase === "start";
        const isErr = phase === "error";
        let card = els.now.querySelector(".now-card");
        if (!card) {
          card = document.createElement("div");
          card.className = "now-card";
          card.innerHTML = `
            <div class="now-icon"></div>
            <div class="now-text">
              <div class="title"></div>
              <div class="sub"></div>
            </div>
            <div class="now-progress"></div>
          `;
          els.now.appendChild(card);
        }
        card.classList.remove("ok", "err", "indeterminate", "done");
        card.classList.add(isStart ? "indeterminate" : isErr ? "err" : "ok");
        if (!isStart) card.classList.add("done");
        // Color the card by category (inherits via currentColor).
        card.style.color = `var(--c-${cat})`;
        card.querySelector(".now-icon").textContent = isErr ? "⚠" : descObj.icon;
        const title = isStart
          ? descObj.title
          : isErr
            ? `${descObj.title} failed`
            : `${descObj.title}`;
        card.querySelector(".title").textContent = title;
        const dur = event.durationMs;
        const subText = isErr
          ? trunc(event.error || "", 80)
          : !isStart && dur != null
            ? `${descObj.sub ? descObj.sub + " · " : ""}${formatMs(dur)}`
            : descObj.sub || "—";
        card.querySelector(".sub").textContent = subText;

        els.now.classList.add("show");
        if (!isStart) {
          // Done — auto-fade.
          nowFadeTimer = setTimeout(() => {
            // Only fade if a newer event hasn't already taken over.
            if (visibleNowId === event.id) els.now.classList.remove("show");
          }, 2200);
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // Timeline
      // ─────────────────────────────────────────────────────────────────
      function timelineAdd(event, descObj, cat) {
        if (els.tlEmpty && els.tlEmpty.parentNode) els.tlEmpty.remove();
        const li = document.createElement("li");
        li.className = `tl-item c-${cat} in-progress`;
        li.dataset.ts = String(event.ts);
        li.innerHTML = `
          <div class="tl-icon"></div>
          <div class="tl-text">
            <div class="title"></div>
            <div class="sub"></div>
          </div>
          <div class="tl-meta">
            <span class="tl-time">now</span>
            <span class="tl-status in-progress"></span>
          </div>
        `;
        li.querySelector(".tl-icon").textContent = descObj.icon;
        li.querySelector(".title").textContent = descObj.title;
        li.querySelector(".sub").textContent = descObj.sub;
        // Insert at top.
        els.tlList.insertBefore(li, els.tlList.firstChild);
        // Cap to 80 items (drop oldest).
        const items = els.tlList.querySelectorAll(".tl-item");
        for (let i = 80; i < items.length; i++) items[i].remove();
        return { item: li, statusEl: li.querySelector(".tl-status") };
      }

      function timelineFinalize(rec, event, descObj) {
        if (!rec || !rec.item.isConnected) return;
        rec.item.classList.remove("in-progress");
        const ok = event.phase === "end";
        rec.statusEl.classList.remove("in-progress");
        rec.statusEl.classList.add(ok ? "ok" : "err");
        // Update subtitle to include duration; preserve original sub if present.
        const sub = rec.item.querySelector(".sub");
        const original = descObj.sub || "";
        const dur = event.durationMs != null ? formatMs(event.durationMs) : "";
        if (ok) {
          sub.textContent = original ? `${original} · ${dur}` : dur;
        } else {
          sub.textContent = trunc(event.error || "failed", 60);
          rec.item.classList.add("c-error");
        }
      }

      function formatMs(ms) {
        if (ms == null) return "—";
        if (ms < 1000) return `${Math.round(ms)} ms`;
        return `${(ms / 1000).toFixed(2)} s`;
      }
      function timeAgo(then) {
        const s = Math.max(0, Math.round((Date.now() - then) / 1000));
        if (s < 5) return "now";
        if (s < 60) return `${s}s ago`;
        const m = Math.floor(s / 60);
        if (m < 60) return `${m}m ago`;
        const h = Math.floor(m / 60);
        return `${h}h ago`;
      }
      function refreshTimes() {
        document.querySelectorAll(".tl-item[data-ts]").forEach((el) => {
          const ts = Number(el.dataset.ts);
          const t = el.querySelector(".tl-time");
          if (t) t.textContent = timeAgo(ts);
        });
      }
      setInterval(refreshTimes, 1000);

      // ─────────────────────────────────────────────────────────────────
      // Stats / chrome
      // ─────────────────────────────────────────────────────────────────
      function bumpCounters(event) {
        if (event.phase === "start") {
          totalActions++;
          els.statActions.textContent = String(totalActions);
        } else if (event.phase === "error") {
          totalErrors++;
          els.statErrors.textContent = String(totalErrors);
        }
        const elapsed = Math.floor((performance.now() - sessionStart) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        els.statElapsed.textContent = `${m}:${String(s).padStart(2, "0")}`;
        els.tlCount.textContent = `${totalActions} ${totalActions === 1 ? "action" : "actions"}`;
      }
      setInterval(() => {
        const elapsed = Math.floor((performance.now() - sessionStart) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        els.statElapsed.textContent = `${m}:${String(s).padStart(2, "0")}`;
      }, 1000);

      function setConn(state, label) {
        els.conn.classList.remove("live", "reconnecting", "offline");
        els.conn.classList.add(state);
        els.connText.textContent = label;
      }

      // ─────────────────────────────────────────────────────────────────
      // Visualizer dispatch
      // ─────────────────────────────────────────────────────────────────
      function visualize(event, descObj, cat) {
        if (event.phase !== "start") return;
        const args = event.args || {};
        switch (event.name) {
          case "gesture-tap":
            spawnTap(args, cat, descObj.label);
            return;
          case "gesture-swipe":
            spawnSwipe(args, cat, descObj.label);
            return;
          case "gesture-pinch":
            spawnPinch(args, cat, descObj.label);
            return;
          case "gesture-rotate":
            spawnTap({ x: args.centerX, y: args.centerY }, cat, descObj.label);
            return;
          case "gesture-custom":
            spawnCustomGesture(args, cat, descObj.label);
            return;
          case "native-view-at-point":
          case "native-user-interactable-view-at-point":
            spawnInspect(args, "inspect", descObj.label);
            return;
          case "screenshot":
            spawnScreenshotEffect();
            return;
          default:
            // Non-spatial action — caption + timeline only, no overlay marker.
            return;
        }
      }

      // ─────────────────────────────────────────────────────────────────
      // Event handler
      // ─────────────────────────────────────────────────────────────────
      function handleAction(event) {
        const key = `${event.id}:${event.phase}`;
        if (seen.has(key)) return;
        seen.add(key);
        if (seen.size > SEEN_CAP) {
          let drop = seen.size - SEEN_CAP;
          for (const k of seen) {
            if (drop-- <= 0) break;
            seen.delete(k);
          }
        }

        const cat = categoryFor(event.name);
        const descObj = describe(event.name, event.args || {});

        if (event.phase === "start") {
          const rec = timelineAdd(event, descObj, cat);
          inflight.set(event.id, { rec, descObj, cat, startedAt: event.ts });
          showNow(event, descObj, cat);
          visualize(event, descObj, cat);
        } else {
          const ent = inflight.get(event.id);
          inflight.delete(event.id);
          if (ent) {
            timelineFinalize(ent.rec, event, ent.descObj);
            showNow(event, ent.descObj, ent.cat);
          } else {
            // We missed the start (e.g., we were just opening). Add it now.
            const rec = timelineAdd(event, descObj, cat);
            timelineFinalize(rec, event, descObj);
            showNow(event, descObj, cat);
          }
        }

        bumpCounters(event);
      }

      // ─────────────────────────────────────────────────────────────────
      // SSE subscription
      // ─────────────────────────────────────────────────────────────────
      function subscribeActions() {
        if (actionEvents) {
          try {
            actionEvents.close();
          } catch {}
        }
        setConn("reconnecting", "connecting");
        actionEvents = new EventSource(`${TOOL_SERVER}/preview/events`);
        actionEvents.addEventListener("open", () => setConn("live", "live"));
        actionEvents.addEventListener("action", (e) => {
          let event;
          try {
            event = JSON.parse(e.data);
          } catch {
            return;
          }
          handleAction(event);
        });
        actionEvents.onerror = () => {
          setConn("reconnecting", "reconnecting");
        };
      }

      // ─────────────────────────────────────────────────────────────────
      // Bootstrap
      // ─────────────────────────────────────────────────────────────────
      // Pause MJPEG when tab is hidden so we don't burn cycles.
      document.addEventListener("visibilitychange", () => {
        if (!stream) return;
        if (document.hidden) {
          stream.dataset.paused = stream.src;
          stream.src = "";
        } else if (stream.dataset.paused) {
          stream.src = stream.dataset.paused;
          delete stream.dataset.paused;
        }
      });

      subscribeActions();
      connectSimulator();
    </script>
  </body>
</html>
