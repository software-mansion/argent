            vp.cards.set(p.id, rec);
          } else if (rec.sig !== sig && !vp.dragging && !vp.cardDragging && !cardHasFocus(rec.el)) {
            const fresh = buildCard(p);
            rec.el.replaceWith(fresh);
            rec.el = fresh;
            rec.sig = sig;
          }
          if (rec.el.parentElement !== cardsEl) cardsEl.appendChild(rec.el);
          refreshCardState(rec.el, p);
          const matched = !!p._node;
          if (matched) {
            rec.everMatched = true;
            rec.lostAt = 0;
            rec.target = p._node.frame;
            rec.lastCY = p._node.frame.y + p._node.frame.height / 2;
          } else if (rec.everMatched && !rec.lostAt) {
            rec.lostAt = now;
          }
          // Hysteresis: an element grazing the screen edge between describe
          // polls must NOT fade+teleport the card. Fade only after it's been
          // gone for GONE_GRACE_MS; never show a phantom card for an element
          // that has never been on screen. Keep the last frame during the
          // grace window so the connector holds steady instead of blinking.
          const lost =
            !matched && (!rec.everMatched || (rec.lostAt && now - rec.lostAt > GONE_GRACE_MS));
          const wasGone = rec.gone;
          // Keep it visible if the user is mid-typing in its comment box.
          rec.gone = lost && !cardHasFocus(rec.el);
          rec.el.classList.toggle("gone", rec.gone);
          if (rec.gone) rec.target = null; // drop the connector when truly gone
          if (wasGone && !rec.gone) {
            rec.spawned = false; // genuine re-entry → pop back in
            rec.pos = null;
          }
        }
        for (const [id, rec] of vp.cards) {
          if (!live.has(id)) {
            rec.el.remove();
            const cn = vp.conn.get(id);
            if (cn) {
              cn.path.remove();
              cn.dot.remove();
              vp.conn.delete(id);
            }
            vp.cards.delete(id);
          }
        }
        // Dynamic homes: distribute cards on BOTH sides of the central
        // stream so they surround the simulator instead of stacking in one
        // column. Each card aligns vertically with its element when matched;
        // otherwise it falls back to an even spread. When the video stream
        // isn't up yet (streamRect null) we arrange around the main area's
        // centre — a card must NEVER be left unpositioned at the (0,0)
        // origin (that was the "everything piles into the top-left" bug,
        // which appeared whenever describe matched but no stream existed).
        const mw = mr.width,
          mh = mr.height;
        const cx = r ? r.x + r.w / 2 : mw / 2;
        const rightX = Math.min(mw - cardW - 14, (r ? r.x + r.w : cx) + 26);
        const leftX = Math.max(14, (r ? r.x : cx) - cardW - 26);
        const vis = [];
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (rec && !rec.gone) vis.push(rec);
        }
        const want = vis.map((rec, i) => {
          const ch = rec.el.offsetHeight || 132;
          // Side: follow the element's own half of the stream when matched,
          // else alternate so the two columns stay balanced.
          const ecx = rec.target && r ? r.x + (rec.target.x + rec.target.width / 2) * r.w : null;
          const side = ecx != null ? (ecx < cx ? "L" : "R") : i % 2 ? "L" : "R";
          // Vertical anchor: element centre when matched, else even spread.
          const cy =
            rec.target && r
              ? r.y + (rec.target.y + rec.target.height / 2) * r.h
              : 24 + ((i + 0.5) / Math.max(1, vis.length)) * (mh - 48);
          return { rec, ch, side, y: Math.max(8, Math.min(mh - ch - 8, cy - ch / 2)) };
        });
        // De-overlap each column independently (top → down push).
        for (const col of ["L", "R"]) {
          const cwant = want.filter((w) => w.side === col).sort((a, b) => a.y - b.y);
          let prevBottom = -Infinity;
          for (const w of cwant) {
            if (w.y < prevBottom + 12) w.y = prevBottom + 12;
            prevBottom = w.y + w.ch;
          }
        }
        for (const w of want) {
          const hx = w.side === "L" ? leftX : rightX;
          w.rec.home = w.rec.pinned && w.rec.pos ? w.rec.pos : { x: hx, y: w.y };
          if (!w.rec.pos) {
            // First appearance: drift in from just outside its own side
            // toward home so it floats into place like a cloud (px/s — the
            // spring tick is time-based, not per-frame).
            const off = w.side === "L" ? -28 : 28;
            w.rec.pos = { x: w.rec.home.x + off, y: w.rec.home.y + 18 };
            w.rec.vel = {
              x: (w.side === "L" ? 1 : -1) * (12 + Math.random() * 16),
              y: -(24 + Math.random() * 30),
            };
            // Place immediately so it doesn't flash at (0,0) before vpTick.
            w.rec.el.style.left = w.rec.pos.x + "px";
            w.rec.el.style.top = w.rec.pos.y + "px";
          }
          if (!w.rec.spawned) {
            w.rec.spawned = true;
            // A whisper of extra drift so multiple bubbles don't move in
            // lockstep — soft enough to stay cloud-like.
            w.rec.vel.x += Math.random() * 22 - 11;
            w.rec.vel.y += Math.random() * 18 - 9;
          }
        }
      }

      // Reuses SVG nodes (no per-frame teardown) and draws to the *eased*
      // element frame (rec.anim) + live card rect, so the line tracks the
      // stream smoothly every animation frame. Off-screen → no line at all.
      function drawConnectors() {
        const mr = mainEl.getBoundingClientRect();
        connEl.setAttribute("width", mr.width);
        connEl.setAttribute("height", mr.height);
        const r = streamRect();
        const live = new Set();
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (!rec || rec.gone || !rec.anim || !r) continue;
          live.add(p.id);
          let cn = vp.conn.get(p.id);
          if (!cn) {
            const path = document.createElementNS(SVGNS, "path");
            const dot = document.createElementNS(SVGNS, "circle");
            dot.setAttribute("r", "4");
            connEl.append(path, dot);
            cn = { path, dot };
            vp.conn.set(p.id, cn);
          }
          const cr = rec.el.getBoundingClientRect();
          const cardLeft = cr.left - mr.left;
          const from = {
            x: cardLeft > r.x + r.w ? cardLeft : cardLeft + cr.width,
            y: cr.top - mr.top + cr.height / 2,
          };
          const to = {
            x: r.x + (rec.anim.x + rec.anim.width / 2) * r.w,
            y: r.y + (rec.anim.y + rec.anim.height / 2) * r.h,
          };
          const mx = (from.x + to.x) / 2;
          cn.path.setAttribute(
            "d",
            `M ${from.x} ${from.y} C ${mx} ${from.y} ${mx} ${to.y} ${to.x} ${to.y}`
          );
          cn.dot.setAttribute("cx", to.x);
          cn.dot.setAttribute("cy", to.y);
        }
        for (const [id, cn] of vp.conn) {
          if (!live.has(id)) {
            cn.path.remove();
            cn.dot.remove();
            vp.conn.delete(id);
          }
        }
      }

      // ── Element-comment inspector (spotlight) ───────────────────────────
      // Spotlight dismissal has two deliberately different rules:
      //   • pointer LEAVES the stream rect    → reset immediately (the user
      //     has clearly stopped inspecting; pointerleave handler).
      //   • a hovered element is lost while still on the stream (a gap or a
      //     non-hoverable region) → keep the focus box on the last element
      //     and run a single short ease-off (spotIdleMs); release only if
      //     nothing new is hovered in that window. Brief crossings covered free.
      // clearSpotIdle cancels the ease-off (new element hovered, or the
      // inspector/stream was torn down); armSpotIdle starts it. A locked
      // comment target (vp.commentFor) is never auto-dismissed by either.
      function clearSpotIdle() {
        if (vp._spotIdle) {
          clearTimeout(vp._spotIdle);
          vp._spotIdle = null;
        }
      }
      function armSpotIdle() {
        // Armed once: the countdown runs from the FIRST lost-element moment
        // and is not reset by further empty moves over the stream. A locked
        // comment target (vp.commentFor) stays put.
        if (vp.commentFor || !vp.focus || vp._spotIdle) return;
        vp._spotIdle = setTimeout(() => {
          vp._spotIdle = null;
          if (vp.commentFor) return;
          vp.focus = null;
          paintSpot();
        }, THEME.spotIdleMs);
      }
      function ensureSpot() {
        if (vp.spot) return vp.spot;
        const root = document.createElement("div");
        root.style.position = "absolute";
        root.style.inset = "0";
        root.style.zIndex = "8";
        root.style.pointerEvents = "none";
        const mask = document.createElement("div");
        mask.className = "spot";
        root.appendChild(mask);
        const ring = document.createElement("div");
        ring.className = "spot-ring";
        const lab = document.createElement("span");
        lab.className = "lab";
        ring.appendChild(lab);
        root.appendChild(ring);
        const hit = document.createElement("div");
        hit.className = "spot-hit";
        root.appendChild(hit);
        hit.addEventListener("pointermove", (ev) => {
          const r = streamRect();
          if (!r || !vp.tree || vp.commentFor) return;
          const x = (ev.clientX - mainEl.getBoundingClientRect().left - r.x) / r.w;
          const y = (ev.clientY - mainEl.getBoundingClientRect().top - r.y) / r.h;
          const node = vpNodeAtPoint(vp.tree, x, y);
          if (node) {
            // Over an element → cancel any pending idle release and move the
            // spotlight there.
            clearSpotIdle();
            if (node !== vp.focus) {
              vp.focus = node;
              paintSpot();
            }
            return;
          }
          // No element under the pointer — a thin gap between elements, or a
          // genuinely non-hoverable region. Do NOT dismiss: hold the last
          // element and run the shared ease-off. Brief gap crossings are
          // covered for free (returning to an element clears the timer before
          // it fires); a real "moved off everything" releases after spotIdleMs.
          armSpotIdle();
        });
        hit.addEventListener("pointerleave", () => {
          // Left the stream rect entirely → reset immediately, by design.
          // The ease-off (spotIdleMs) is ONLY for losing a hovered element
          // while the pointer is still on the stream. Locked comment stays.
          clearSpotIdle();
          if (vp.commentFor) return;
          vp.focus = null;
          paintSpot();
        });
        hit.addEventListener("click", (ev) => {
          if (!vp.focus) return;
          vp.commentFor = vp.focus;
          openCommentPop(vp.focus);
        });
        mainEl.appendChild(root);
        vp.spot = { root, mask, ring, lab, hit };
        return vp.spot;
      }
      function paintSpot() {
        if (!vp.inspect) return;
        const s = ensureSpot();
        const r = streamRect();
        if (!r) {
          s.root.style.display = "none";
          return;
        }
        s.root.style.display = "";
        s.hit.style.left = r.x + "px";
        s.hit.style.top = r.y + "px";
        s.hit.style.width = r.w + "px";
        s.hit.style.height = r.h + "px";
        // One dim+blur layer over exactly the stream rect; the cutout is a
        // clip-path hole in element-local coords.
        s.mask.style.left = r.x + "px";
        s.mask.style.top = r.y + "px";
        s.mask.style.width = r.w + "px";
        s.mask.style.height = r.h + "px";
        const W = r.w,
          H = r.h;
        const q = (v) => Math.round(v * 10) / 10;
        const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);
        const n = vp.commentFor || vp.focus;
        const f = n && n.frame;
        // No focus (or a frame the describe tree somehow didn't validate) →
        // expand the hole to the WHOLE stream so nothing is blurred until the
        // user actually hovers an element (the even-odd inner rect then equals
        // the outer rect and cancels the entire dim layer). Keeps the SAME
        // path segment structure so the clip-path transition still
        // interpolates. Mirrors applyThumbCrop's finite guard so a non-finite
        // frame can never emit NaN CSS.
        const validFrame =
          f && [f.x, f.y, f.width, f.height].every((v) => typeof v === "number" && isFinite(v));
        let hx, hy, hx2, hy2;
        if (!validFrame) {
          hx = 0;
          hy = 0;
          hx2 = W;
          hy2 = H;
          s.ring.style.display = "none";
        } else {
          const ex = f.x * W,
            ey = f.y * H,
            ew = f.width * W,
            eh = f.height * H;
          hx = clamp(ex, 0, W);
          hy = clamp(ey, 0, H);
          hx2 = clamp(ex + ew, hx, W);
          hy2 = clamp(ey + eh, hy, H);
          s.ring.style.display = "";
          s.ring.style.left = r.x + ex + "px";
          s.ring.style.top = r.y + ey + "px";
          s.ring.style.width = ew + "px";
          s.ring.style.height = eh + "px";
          s.lab.textContent = nodeDesc(n);
        }
        const path = `path(evenodd, "M0 0H${q(W)}V${q(H)}H0Z M${q(hx)} ${q(hy)}H${q(hx2)}V${q(hy2)}H${q(hx)}Z")`;
        s.mask.style.clipPath = path;
        s.mask.style.webkitClipPath = path;
      }
      function setInspect(on) {
        vp.inspect = on;
        commentBtn.classList.toggle("active", on);
        commentBtn.textContent = on ? "✕ Done commenting" : "＋ Add comment";
        document.getElementById("root").classList.toggle("inspecting", on);
        if (!on) {
          clearSpotIdle();
          vp.focus = null;
          vp.commentFor = null;
          popEl.hidden = true;
          if (vp.spot) {
            vp.spot.root.remove();
            vp.spot = null;
          }
        } else {
          // Annotate mode is read-only w.r.t. the device — drop any held
          // touch/keys; sendCmd() also no-ops while inspecting.
          releaseAllInput();
          ensureSpot();
          paintSpot();
          describeOnce(); // immediate tree for the spotlight; loop continues
        }
      }
      function openCommentPop(node) {
        const r = streamRect();
        if (!r) return;
        const f = node.frame;
        const ex = r.x + f.x * r.w,
          ey = r.y + f.y * r.h,
          ew = f.width * r.w;
        popEl.innerHTML = "";
        const h = document.createElement("h3");
        h.textContent = "Comment on ";
        const sp = document.createElement("span");
        sp.textContent = nodeDesc(node);
        h.appendChild(sp);
        const ta = document.createElement("textarea");
        ta.placeholder = "What should change about this element?";
        const rowd = document.createElement("div");
        rowd.className = "row";
        const save = document.createElement("button");
        save.className = "save";
        save.textContent = "Save comment";
        const cancel = document.createElement("button");
        cancel.className = "cancel";
        cancel.textContent = "Cancel";
        rowd.append(save, cancel);
        popEl.append(h, ta, rowd);
        popEl.hidden = false;
        // place to the right of the element, or left if no room
        const mr = mainEl.getBoundingClientRect();
        let px = ex + ew + 14;
        if (px + 260 > mr.width) px = Math.max(8, ex - 262);
        let py = Math.min(Math.max(8, ey - 10), mr.height - 180);
        popEl.style.left = px + "px";
        popEl.style.top = py + "px";
        ta.focus();
        ta.addEventListener("keydown", (ev) => {
          // ⌘/Ctrl+Enter submits; plain Enter keeps inserting newlines.
          // !isComposing so an IME commit-Enter never submits.
          if (!ev.isComposing && (ev.metaKey || ev.ctrlKey) && ev.key === "Enter") {
            ev.preventDefault();
            save.click();
          }
        });
        const close = () => {
          popEl.hidden = true;
          vp.commentFor = null;
          paintSpot();
        };
        save.addEventListener("click", () => {
          const text = ta.value.trim();
          if (text) {
            vp.annotations.push({
              id: ++vp.annId,
              target: nodeDesc(node),
              match: nodeMatch(node),
              comment: text,
            });
          }
          close();
          setInspect(false);
          vpRender();
        });
        cancel.addEventListener("click", () => {
          close();
          vp.focus = null;
        });
      }

      // Structure only — reconcile the pin set with vp.annotations (reused
      // elements, listener bound once so click survives 60fps repositioning).
      function ensurePins() {
        const live = new Set(vp.annotations.map((a) => String(a.id)));
        for (const [id, el] of vp.pinEls) {
          if (!live.has(id)) {
            el.remove();
            vp.pinEls.delete(id);
            vp.pinAnim.delete(id);
          }
        }
        vp.annotations.forEach((a, i) => {
          let el = vp.pinEls.get(String(a.id));
          if (!el) {
            el = document.createElement("div");
            el.className = "ann-pin";
            // Hover opens the comment detail (no click required); leaving the
            // pin arms the shared grace close (cancelled if the pointer
            // reaches the popover or another pin). `a` is captured per pin.
            el.addEventListener("pointerenter", () => {
              cancelAnnClose();
              if (vp.annPopFor !== a.id) openAnnPop(a);
            });
            el.addEventListener("pointerleave", scheduleAnnClose);
            cardsEl.appendChild(el);
            vp.pinEls.set(String(a.id), el);
          }
          el.textContent = String(i + 1);
          el.title = a.target + ": " + a.comment;
        });
      }
      // Per-frame: place each pin at its spring-eased position (integrated in
      // vpTick from the latest describe sample). No raw poll coords here, so
      // the pin glides continuously and never snaps between polls.
      function positionPins() {
        for (const a of vp.annotations) {
          const el = vp.pinEls.get(String(a.id));
          if (!el) continue;
          const key = String(a.id);
          const pa = vp.pinAnim.get(key);
          const hasTarget = !!(vp._pinT && vp._pinT.has(key));
          if (!pa || !hasTarget) {
            el.style.display = "none";
            continue;
          }
          el.style.display = "";
          el.style.left = pa.p.x + "px";
          el.style.top = pa.p.y + "px";
        }
        placeAnnPop();
      }

      // ── Saved-annotation review popover ─────────────────────────────────
      // The pin's eased on-screen point (same source positionPins uses), so
      // the popover tracks the pin smoothly while the device scrolls.
      function annPopAnchor(a) {
        const pa = vp.pinAnim.get(String(a.id));
        if (pa) return { x: pa.p.x, y: pa.p.y };
        const n = vp.tree && vpMatchNode(vp.tree, a.match);
        return n ? elementPoint(n.frame) : null;
      }
      function placeAnnPop() {
        if (vp.annPopFor == null) return;
        const a = vp.annotations.find((x) => x.id === vp.annPopFor);
        if (!a) {
          closeAnnPop();
          return;
        }
        const pt = annPopAnchor(a);
        if (!pt) {
          // element scrolled away → dismiss the review popover
          closeAnnPop();
          return;
        }
        annPop.style.left = pt.x + "px";
        annPop.style.top = pt.y + "px";
      }
      function renderAnnRead(a) {
        annPop.innerHTML = "";
        const h = document.createElement("h4");
        h.textContent = a.target || "Comment";
        const txt = document.createElement("div");
        txt.className = "txt";
        txt.textContent = a.comment;
        const row = document.createElement("div");
        row.className = "row";
        const edit = document.createElement("button");
        edit.className = "edit";
        edit.textContent = "Edit";
        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "Remove";
        row.append(edit, del);
        annPop.append(h, txt, row);
        edit.addEventListener("click", (e) => {
          e.stopPropagation();
          renderAnnEdit(a);
        });
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          vp.annotations = vp.annotations.filter((x) => x.id !== a.id);
          closeAnnPop();
          vpRender();
        });
      }
      function renderAnnEdit(a) {
        annPop.innerHTML = "";
        const h = document.createElement("h4");
        h.textContent = a.target || "Comment";
        const ta = document.createElement("textarea");
        ta.value = a.comment;
        const row = document.createElement("div");
        row.className = "row";
        const saveB = document.createElement("button");
        saveB.className = "edit";
        saveB.textContent = "Save";
        const cancelB = document.createElement("button");
        cancelB.className = "cancel";
        cancelB.textContent = "Cancel";
        row.append(saveB, cancelB);
        annPop.append(h, ta, row);
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
        const commit = () => {
          const v = ta.value.trim();
          if (v) {
            a.comment = v;
            renderAnnRead(a);
            vpRender();
          }
        };
        ta.addEventListener("keydown", (ev) => {
          // ⌘/Ctrl+Enter submits; plain Enter keeps inserting newlines.
          // !isComposing so an IME commit-Enter never submits.
          if (!ev.isComposing && (ev.metaKey || ev.ctrlKey) && ev.key === "Enter") {
            ev.preventDefault();
            commit();
          }
        });
        saveB.addEventListener("click", (e) => {
          e.stopPropagation();
          commit();
        });
        cancelB.addEventListener("click", (e) => {
          e.stopPropagation();
          renderAnnRead(a);
        });
      }
      function annPopEsc(ev) {
        if (ev.key === "Escape") closeAnnPop();
      }
      function detachAnnGlobal() {
        if (vp._annPopDown) {
          window.removeEventListener("pointerdown", vp._annPopDown, true);
          vp._annPopDown = null;
        }
        window.removeEventListener("keydown", annPopEsc);
      }
      // Hover-driven open/close for saved-comment pins. The popover opens on
      // pointerenter (no click needed) and stays open while the pointer is
      // over the pin OR the popover; leaving either arms a short grace timer
      // so the user can travel the pin↔popover gap without it vanishing.
      // Focus inside the popover (i.e. editing) suppresses the auto-close —
      // Esc / outside-click still dismiss that path.
      function cancelAnnClose() {
        if (vp._annHoverClose) {
          clearTimeout(vp._annHoverClose);
          vp._annHoverClose = null;
        }
      }
      function scheduleAnnClose() {
        cancelAnnClose();
        if (annPop.contains(document.activeElement)) return;
        vp._annHoverClose = setTimeout(() => {
          vp._annHoverClose = null;
          if (annPop.contains(document.activeElement)) return;
          closeAnnPop();
        }, THEME.annpopGraceMs);
      }
      function openAnnPop(a) {
        detachAnnGlobal(); // switching pins → drop the previous closer
        vp.annPopFor = a.id;
        annPop.hidden = false;
        renderAnnRead(a);
        placeAnnPop();
        // force a reflow so the pre-state (opacity 0) is committed before
        // .show flips it → the fade/slide-in actually transitions.
        void annPop.offsetWidth;
        annPop.classList.add("show");
        const onDown = (ev) => {
          if (annPop.contains(ev.target)) return;
          if (ev.target.classList && ev.target.classList.contains("ann-pin")) return;
          closeAnnPop();
        };
        vp._annPopDown = onDown;
        window.addEventListener("pointerdown", onDown, true);
        window.addEventListener("keydown", annPopEsc);
      }
      function closeAnnPop() {
        if (vp.annPopFor == null) return;
        vp.annPopFor = null;
        cancelAnnClose();
        annPop.classList.remove("show");
        detachAnnGlobal();
        // hide only after the fade-out so it can't swallow clicks meanwhile
        setTimeout(() => {
          if (vp.annPopFor == null) annPop.hidden = true;
        }, 240);
      }
      // Keep the popover alive while the pointer is inside it; re-arm the
      // grace close on leave. Bound once — annPop is a stable element.
      annPop.addEventListener("pointerenter", cancelAnnClose);
      annPop.addEventListener("pointerleave", scheduleAnnClose);

      // Surface proposals that have no visible anchor, split by whether a
      // scroll direction is meaningful:
      //   • Seen then scrolled away (everMatched, has lastCY) → ▲/▼ pill on
      //     the stream edge. The arrow IS a scroll-direction cue — the user
      //     can scroll there to reveal it. This is the original "off-screen"
      //     reminder, untouched.
      //   • Never matched (no anchor ever found in the describe tree) → a
      //     non-directional "◌ N hidden" badge in the top toolbar. No arrow:
      //     scrolling would not reveal it (it isn't on the device screen at
      //     all, just queued). The badge sits next to the round badge so the
      //     user always knows N pending choices exist, even when no stream
      //     is connected to position the directional pills.
      function updateOffscreenHint() {
        const r = streamRect();
        const top = [],
          bot = [],
          hidden = [];
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (!rec || !rec.gone) continue;
          if (rec.everMatched) {
            (rec.lastCY != null && rec.lastCY < 0.5 ? top : bot).push(p.element || "element");
          } else {
            hidden.push(p.element || "element");
          }
        }
        const paint = (el, list, arrow, y) => {
          if (!r || !list.length) {
            el.classList.remove("show");
            return;
          }
          el.textContent = `${arrow} ${list.length} choice${list.length > 1 ? "s" : ""} off-screen`;
          el.title = list.join(", ");
          el.style.left = r.x + r.w / 2 + "px";
          el.style.top = y + "px";
          el.classList.add("show");
        };
        paint(osTop, top, "▲", r ? r.y + 8 : 0);
        paint(osBot, bot, "▼", r ? r.y + r.h - 30 : 0);
        // Same stream-gate as the directional pills: before a stream is live
        // we haven't *tried* to match anything, so "N hidden" is misleading —
        // those proposals just haven't been looked for yet.
        if (r && hidden.length) {
          hiddenBadge.textContent = `◌ ${hidden.length} hidden`;
          hiddenBadge.title = hidden.join(", ");
          hiddenBadge.hidden = false;
        } else {
          hiddenBadge.hidden = true;
        }
      }

      // Structural pass (poll / resize / stage cadence). Positions, connector
      // and pin tracking are handled every animation frame by vpTick().
      function vpRender() {
        for (const p of vp.proposals) {
          p._node = vp.tree ? vpMatchNode(vp.tree, p.match) : null;
          if (p._node && !vp.thumbFrames[p.id]) {
            const f = p._node.frame;
            vp.thumbFrames[p.id] = { x: f.x, y: f.y, width: f.width, height: f.height };
          }
        }
        layoutCards();
        ensurePins();
        // Reconcile the review popover in the structural pass (like
        // ensurePins does for pins): if its annotation is gone — e.g. a new
        // round cleared vp.annotations — close it here, not only via the
        // rAF self-heal (vpTick can be idle and skip placeAnnPop).
        if (vp.annPopFor != null && !vp.annotations.some((a) => a.id === vp.annPopFor)) {
          closeAnnPop();
        }
        if (vp.inspect) paintSpot();
        updateOffscreenHint();

        const has = vp.proposals.length > 0 || vp.annotations.length > 0;
        footEl.hidden = !has;
        roundBadge.textContent = vp.proposals.length > 0 ? `round ${vp.round}` : "";
        completeBtn.disabled = vp.submitting || !has;
        commentBtn.hidden = !img; // only when a stream is live
      }

      // rAF loop, fixed-timestep so motion is identical at 60/120 Hz and after
      // a stutter (accumulator). Two damped springs (semi-implicit Euler):
      // bubbles use a slow, near-critically-damped spring so they drift into
      // place like a cloud; the connector endpoint uses a fast, zero-overshoot
      // spring so the line glides *continuously* between describe samples
      // (no arrive-wait-jump) and locks onto a fresh sample without wobble.
      const VP_DT = 1 / 120;
      // Spring feel comes from theme.css (ω rad/s, ζ damping); K = ω², C = 2ζω.
      const BUB_K = THEME.bubbleOmega * THEME.bubbleOmega,
        BUB_C = 2 * THEME.bubbleZeta * THEME.bubbleOmega;
      const CON_K = THEME.tightOmega * THEME.tightOmega,
        CON_C = 2 * THEME.tightZeta * THEME.tightOmega;
      function vpSpr(s, v, key, target, k, c) {
        const a = -k * (s[key] - target) - c * v[key];
        v[key] += a * VP_DT;
        s[key] += v[key] * VP_DT;
      }
      let vpLastT = 0;
      let vpAcc = 0;
      function vpTick(now) {
        requestAnimationFrame(vpTick);
        const t = now || performance.now();
        if (!vp.proposals.length && !vp.inspect && !vp.annotations.length) {
          vpLastT = t;
          vpAcc = 0;
          return;
        }
        const dt = vpLastT ? Math.min(0.25, (t - vpLastT) / 1000) : VP_DT;
        vpLastT = t;
        vpAcc += dt;
        let steps = 0;
        // Resolve each pin's target element point ONCE per frame (tree only
        // changes per describe poll); the spring below glides toward it.
        const pinT = vp._pinT || (vp._pinT = new Map());
        pinT.clear();
        if (vp.annotations.length && vp.tree) {
          for (const a of vp.annotations) {
            const n = vpMatchNode(vp.tree, a.match);
            const pt = n && elementPoint(n.frame);
            if (pt) pinT.set(String(a.id), pt);
          }
        }
        while (vpAcc >= VP_DT && steps < 30) {
          vpAcc -= VP_DT;
          steps++;
          for (const p of vp.proposals) {
            const rec = vp.cards.get(p.id);
            if (!rec) continue;
            if (rec.target) {
              const tf = rec.target;
              if (!rec.anim || !rec.animVel) {
                rec.anim = { x: tf.x, y: tf.y, width: tf.width, height: tf.height };
                rec.animVel = { x: 0, y: 0, width: 0, height: 0 };
              } else {
                vpSpr(rec.anim, rec.animVel, "x", tf.x, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "y", tf.y, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "width", tf.width, CON_K, CON_C);
                vpSpr(rec.anim, rec.animVel, "height", tf.height, CON_K, CON_C);
              }
            } else {
              rec.anim = null;
            }
            if (rec.pos && rec.home && !(rec.dragging && vp.cardDragging)) {
              vpSpr(rec.pos, rec.vel, "x", rec.home.x, BUB_K, BUB_C);
              vpSpr(rec.pos, rec.vel, "y", rec.home.y, BUB_K, BUB_C);
            }
          }
          // Pins use the same fast, zero-overshoot spring as connectors so
          // they track every animation frame and never snap between polls.
          for (const a of vp.annotations) {
            const key = String(a.id);
            const tp = pinT.get(key);
            if (!tp) continue;
            const pa = vp.pinAnim.get(key);
            if (!pa) {
              vp.pinAnim.set(key, { p: { x: tp.x, y: tp.y }, v: { x: 0, y: 0 } });
              continue;
            }
            vpSpr(pa.p, pa.v, "x", tp.x, CON_K, CON_C);
            vpSpr(pa.p, pa.v, "y", tp.y, CON_K, CON_C);
          }
        }
        if (steps >= 30) vpAcc = 0; // shed backlog after a long stall
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (rec && rec.pos && rec.home && !(rec.dragging && vp.cardDragging)) {
            rec.el.style.left = rec.pos.x + "px";
            rec.el.style.top = rec.pos.y + "px";
          }
        }
        drawConnectors();
        positionPins();
      }
      requestAnimationFrame(vpTick);

      async function vpComplete() {
        if (vp.submitting) return;
        if (vp.proposals.length === 0 && vp.annotations.length === 0) return;
        vp.submitting = true;
        completeBtn.disabled = true;
        setNote("Submitting…");
        const selections = vp.proposals.map((p) => ({
          elementId: p.id,
          variantId: vp.staged[p.id] || null,
          comment: vp.comments[p.id] || undefined,
        }));
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants/selection`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selections,
              annotations: vp.annotations.map((a) => ({
                target: a.target,
                match: a.match,
                comment: a.comment,
              })),
              globalComment: globalCommentEl ? globalCommentEl.value : "",
            }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          const picked = selections.filter((s) => s.variantId).length;
          vp.justCompletedRound = vp.round;
          setNote(
            `Sent ${picked} pick(s) + ${vp.annotations.length} comment(s) to the agent.`,
            "ok"
          );
        } catch (err) {
          setNote(`Failed: ${err.message || err}`, "err");
        } finally {
          vp.submitting = false;
          completeBtn.disabled = false;
        }
      }

      // Called by teardownStream when the stream is torn down.
      function vpResetOverlay() {
        vp.cards.clear();
        vp.thumbFrames = {};
        vp.conn.clear();
        vp.pinEls.clear();
        if (cardsEl) cardsEl.innerHTML = "";
        if (connEl) while (connEl.firstChild) connEl.removeChild(connEl.firstChild);
        if (vp.spot) {
          vp.spot.root.remove();
          vp.spot = null;
        }
        if (popEl) popEl.hidden = true;
        // Deterministic teardown — don't rely on the rAF self-heal here.
        closeAnnPop();
        if (annPop) annPop.hidden = true;
        vp.pinAnim.clear();
        if (vp._pinT) vp._pinT.clear();
        clearSpotIdle();
        vp.focus = null;
        vp.commentFor = null;
        // Fully exit inspect mode so a stream re-attach doesn't leave a
        // stuck/double-click state (button label, .inspecting class).
        vp.inspect = false;
        vp.cardDragging = false;
        commentBtn.classList.remove("active");
        commentBtn.textContent = "＋ Add comment";
        document.getElementById("root").classList.remove("inspecting");
      }

      // Safety net: HTML5 dragend can be missed if the source node is removed
      // mid-drag — never let vp.dragging latch true (it gates round clearing).
      document.addEventListener("dragend", () => {
        vp.dragging = false;
      });
      commentBtn.addEventListener("click", () => setInspect(!vp.inspect));
      completeBtn.addEventListener("click", vpComplete);
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape" || !vp.inspect) return;
        // Don't tear down the inspector (and lose an in-progress comment) if
        // the user is typing — let the comment-pop's own Cancel handle that.
        const ae = document.activeElement;
        if (ae && (ae.tagName === "TEXTAREA" || ae.tagName === "INPUT")) return;
        setInspect(false);
      });
      viewport.addEventListener("dragover", (ev) => {
        if (vp.proposals.length) ev.preventDefault();
      });
      viewport.addEventListener("drop", (ev) => {
        ev.preventDefault();
        let data = null;
        try {
          data = JSON.parse(ev.dataTransfer.getData("application/json"));
        } catch {}
        if (data) vpStage(data.elementId, data.variantId);
      });
      window.addEventListener("resize", () => vpRender());
      setInterval(pollVariants, THEME.pollMs);
      pollVariants();
      pollDescribe(); // arms the single fast describe loop

      refreshSimulators();
    </script>
  </body>
</html>
