<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argent Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0e0e10;
        --fg: #eaeaea;
        --muted: #8a8a90;
        --accent: #6aa6ff;
        --border: #2a2a2e;
        --surface: #16161a;
        --error: #ff8080;
        --ok: #5cdc8b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .toolbar label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .toolbar select,
      .toolbar button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 13px;
      }
      .toolbar select {
        min-width: 240px;
      }
      .toolbar button {
        cursor: pointer;
      }
      .toolbar .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }
      .toolbar .debug {
        color: var(--muted);
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        min-width: 220px;
        text-align: right;
      }
      .status.live::before,
      .status.error::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .status.live::before {
        background: var(--ok);
        animation: pulse 1.6s ease-in-out infinite;
      }
      .status.error::before {
        background: var(--error);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        min-height: 0;
        position: relative;
      }
      .stage {
        position: relative;
        max-width: 100%;
        max-height: 100%;
        display: flex;
      }
      .stage img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 10px;
        box-shadow: 0 10px 48px #0008;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        touch-action: none;
        pointer-events: auto;
        cursor: crosshair;
      }
      /* Multi-touch indicators overlay on the image, positioned via CSS vars. */
      .touch-dot {
        position: absolute;
        top: var(--y);
        left: var(--x);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: rgba(106, 166, 255, 0.25);
        border: 2px solid rgba(106, 166, 255, 0.9);
        pointer-events: none;
        box-shadow: 0 0 12px rgba(106, 166, 255, 0.5);
      }
      .touch-dot.pressed {
        background: rgba(106, 166, 255, 0.55);
      }
      .touch-dot.anchor {
        background: rgba(255, 200, 80, 0.9);
        border-color: rgba(255, 200, 80, 1);
      }
      .empty,
      .error-box {
        color: var(--muted);
        text-align: center;
        padding: 32px;
        max-width: 480px;
        line-height: 1.5;
      }
      .error-box {
        color: var(--error);
      }
      code {
        background: var(--surface);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 12px;
      }

      /* ── Variant proposals ─────────────────────────────────────────── */
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
        position: relative;
      }
      .sidebar {
        width: 340px;
        flex-shrink: 0;
        border-left: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .sidebar.hidden {
        display: none;
      }
      .sidebar-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sidebar-head h2 {
        font-size: 13px;
        margin: 0;
        font-weight: 600;
      }
      .sidebar-head .round-badge {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
      }
      .sidebar-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }
      .sidebar-empty {
        color: var(--muted);
        text-align: center;
        padding: 28px 16px;
        line-height: 1.5;
      }
      .vp-el {
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 10px;
        background: var(--bg);
        overflow: hidden;
      }
      .vp-el.offscreen {
        opacity: 0.62;
      }
      .vp-el-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .vp-el-head .name {
        font-weight: 600;
      }
      .vp-el-head .where {
        margin-left: auto;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .vp-el-head .where.on {
        color: var(--ok);
      }
      .vp-chips {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .vp-chip {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 9px;
        background: var(--surface);
        cursor: grab;
        user-select: none;
        transition:
          border-color 0.12s,
          background 0.12s;
      }
      .vp-chip:hover {
        border-color: var(--accent);
      }
      .vp-chip:active {
        cursor: grabbing;
      }
      .vp-chip.dragging {
        opacity: 0.5;
      }
      .vp-chip.staged {
        border-color: var(--ok);
        background: rgba(92, 220, 139, 0.12);
      }
      .vp-chip .vp-chip-top {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vp-chip .vp-chip-name {
        font-weight: 600;
      }
      .vp-chip .vp-chip-tag {
        margin-left: auto;
        font-size: 10px;
        color: var(--ok);
      }
      .vp-chip .vp-chip-summary {
        color: var(--muted);
        margin-top: 3px;
        font-size: 12px;
        line-height: 1.4;
      }
      .vp-chip pre {
        margin: 6px 0 0;
        padding: 6px 8px;
        background: #000;
        border-radius: 4px;
        font-size: 11px;
        max-height: 120px;
        overflow: auto;
        white-space: pre-wrap;
      }
      .vp-el-comment {
        width: 100%;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-top: 0;
        padding: 6px 9px;
        font: inherit;
        font-size: 12px;
        resize: vertical;
        min-height: 30px;
      }
      .sidebar-foot {
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sidebar-foot textarea {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 9px;
        font: inherit;
        font-size: 12px;
        resize: vertical;
        min-height: 34px;
      }
      .complete-btn {
        background: var(--accent);
        color: #06122b;
        border: 0;
        border-radius: 6px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .complete-btn:disabled {
        background: var(--border);
        color: var(--muted);
        cursor: not-allowed;
      }
      .complete-note {
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }
      .complete-note.ok {
        color: var(--ok);
      }
      /* Floating, draggable variant bubble pinned over an on-screen element. */
      .bubble {
        position: absolute;
        transform: translate(-50%, calc(-100% - 14px));
        min-width: 150px;
        max-width: 240px;
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 8px;
        box-shadow: 0 8px 28px #000a;
        z-index: 6;
        pointer-events: auto;
        font-size: 12px;
      }
      .bubble::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -7px;
        width: 12px;
        height: 12px;
        background: var(--surface);
        border-right: 1px solid var(--accent);
        border-bottom: 1px solid var(--accent);
        transform: translateX(-50%) rotate(45deg);
      }
      .bubble.dropping {
        border-color: var(--ok);
        box-shadow: 0 0 0 2px var(--ok);
      }
      .bubble-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 9px;
        border-bottom: 1px solid var(--border);
        cursor: move;
      }
      .bubble-head .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
      }
      .bubble-head .name {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bubble-head .count {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
      }
      .bubble-body {
        padding: 7px 9px;
      }
      .bubble-staged {
        color: var(--ok);
      }
      .bubble-hint {
        color: var(--muted);
      }
      /* Corner notification stack for off-screen / unmatched proposals. */
      .corner {
        position: absolute;
        left: 14px;
        bottom: 14px;
        z-index: 7;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 260px;
      }
      .corner-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid #d8a657;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 12px;
        box-shadow: 0 6px 20px #0007;
      }
      .corner-card.dropping {
        border-color: var(--ok);
        border-left-color: var(--ok);
      }
      .corner-card .ttl {
        font-weight: 600;
      }
      .corner-card .sub {
        color: var(--muted);
        font-size: 11px;
        margin-top: 2px;
      }
      .corner-card .sub.staged {
        color: var(--ok);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="toolbar">
        <label for="sim-select">Simulator</label>
        <select id="sim-select">
          <option>Loading…</option>
        </select>
        <button id="refresh-btn" title="Refresh simulator list">⟳</button>
        <span id="hint" class="debug" style="min-width: auto"></span>
        <span id="debug" class="debug"></span>
        <span id="status" class="status">idle</span>
      </div>
      <div class="main">
        <div class="viewport" id="viewport">
          <div class="empty">Select a booted simulator to start streaming.</div>
        </div>
        <div class="corner" id="corner"></div>
        <aside class="sidebar hidden" id="sidebar">
          <div class="sidebar-head">
            <h2>Design variants</h2>
            <span class="round-badge" id="round-badge"></span>
          </div>
          <div class="sidebar-body" id="sidebar-body">
            <div class="sidebar-empty">
              No variants proposed yet.<br />
              When the agent calls <code>propose_variant</code>, options appear here and as floating
              bubbles over the matching element on the stream. Drag a variant onto its element to
              stage it.
            </div>
          </div>
          <div class="sidebar-foot">
            <textarea
              id="global-comment"
              placeholder="Overall comment for the agent (optional)…"></textarea>
            <button class="complete-btn" id="complete-btn" disabled>Complete selection</button>
            <div class="complete-note" id="complete-note"></div>
          </div>
        </aside>
      </div>
    </div>

    <script>
      "use strict";

      // ── Config ──────────────────────────────────────────────────────────
      // Tool-server base URL. When this page is served by tool-server itself,
      // same-origin is correct. Override via ?toolServer=http://host:port for
      // standalone testing.
      const urlParams = new URLSearchParams(window.location.search);
      const TOOL_SERVER =
        urlParams.get("toolServer") ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:3001");

      // Browser KeyboardEvent.code → USB HID Keyboard Usage Page (0x07) keycode.
      // sim-server's `key` command expects these raw HID codes — shift/modifier
      // state is conveyed by the browser issuing separate ShiftLeft/ShiftRight
      // key events which we forward verbatim.
      const HID = {
        KeyA: 4,
        KeyB: 5,
        KeyC: 6,
        KeyD: 7,
        KeyE: 8,
        KeyF: 9,
        KeyG: 10,
        KeyH: 11,
        KeyI: 12,
        KeyJ: 13,
        KeyK: 14,
        KeyL: 15,
        KeyM: 16,
        KeyN: 17,
        KeyO: 18,
        KeyP: 19,
        KeyQ: 20,
        KeyR: 21,
        KeyS: 22,
        KeyT: 23,
        KeyU: 24,
        KeyV: 25,
        KeyW: 26,
        KeyX: 27,
        KeyY: 28,
        KeyZ: 29,
        Digit1: 30,
        Digit2: 31,
        Digit3: 32,
        Digit4: 33,
        Digit5: 34,
        Digit6: 35,
        Digit7: 36,
        Digit8: 37,
        Digit9: 38,
        Digit0: 39,
        Enter: 40,
        Escape: 41,
        Backspace: 42,
        Tab: 43,
        Space: 44,
        Minus: 45,
        Equal: 46,
        BracketLeft: 47,
        BracketRight: 48,
        Backslash: 49,
        Semicolon: 51,
        Quote: 52,
        Backquote: 53,
        Comma: 54,
        Period: 55,
        Slash: 56,
        CapsLock: 57,
        F1: 58,
        F2: 59,
        F3: 60,
        F4: 61,
        F5: 62,
        F6: 63,
        F7: 64,
        F8: 65,
        F9: 66,
        F10: 67,
        F11: 68,
        F12: 69,
        ArrowRight: 79,
        ArrowLeft: 80,
        ArrowDown: 81,
        ArrowUp: 82,
        NumpadDivide: 84,
        NumpadMultiply: 85,
        NumpadSubtract: 86,
        NumpadAdd: 87,
        NumpadEnter: 88,
        Numpad1: 89,
        Numpad2: 90,
        Numpad3: 91,
        Numpad4: 92,
        Numpad5: 93,
        Numpad6: 94,
        Numpad7: 95,
        Numpad8: 96,
        Numpad9: 97,
        Numpad0: 98,
        NumpadDecimal: 99,
        ControlLeft: 224,
        ShiftLeft: 225,
        AltLeft: 226,
        MetaLeft: 227,
        ControlRight: 228,
        ShiftRight: 229,
        AltRight: 230,
        MetaRight: 231,
        IntlBackslash: 86,
      };
      const CAPS_LOCK_HID = 57;

      // Multi-touch modifier — matches radon-ide: Alt on macOS, Ctrl elsewhere.
      const IS_MAC = /Mac|iPhone|iPad/.test(navigator.platform);
      const MULTITOUCH_CODES = IS_MAC
        ? new Set(["AltLeft", "AltRight"])
        : new Set(["ControlLeft", "ControlRight"]);

      // ── DOM ─────────────────────────────────────────────────────────────
      const select = document.getElementById("sim-select");
      const status = document.getElementById("status");
      const viewport = document.getElementById("viewport");
      const refreshBtn = document.getElementById("refresh-btn");
      const debugEl = document.getElementById("debug");
      const hintEl = document.getElementById("hint");
      hintEl.textContent = `Hold ${IS_MAC ? "Option" : "Ctrl"} for pinch · +Shift to move anchor`;

      // ── State ───────────────────────────────────────────────────────────
      /** @type {WebSocket | null} */
      let ws = null;
      let wsOpen = false;
      let currentUdid = null;
      let img = null;
      let stage = null;
      /** Elements for the three multi-touch indicators (primary / mirror / anchor). */
      let touchDots = { primary: null, mirror: null, anchor: null };
      let activePointerId = null;
      /** True while the mouse button is held inside the stage (finger is "down"). */
      let isPressing = false;
      /** True while the multi-touch modifier is held. */
      let isMultiTouching = false;
      /** Primary and anchor points in normalized [0,1] space. */
      let touchPoint = { x: 0.5, y: 0.5 };
      let anchorPoint = { x: 0.5, y: 0.5 };
      /** Keys currently held down (HID codes) — released on blur. */
      const pressedKeys = new Set();
      /** Last known CapsLock state to resync iOS if it drifts. */
      let lastCapsLockState = false;
      let cmdCounter = 0;

      // ── Helpers ─────────────────────────────────────────────────────────
      function setStatus(text, kind = "") {
        status.textContent = text;
        status.className = "status" + (kind ? " " + kind : "");
      }

      function nextCmdId() {
        return String(++cmdCounter);
      }

      function sendCmd(obj) {
        if (!ws || !wsOpen) {
          debugEl.textContent = `ws not open — dropped ${obj.cmd}`;
          return;
        }
        ws.send(JSON.stringify({ id: nextCmdId(), ...obj }));
        if (obj.cmd === "touch") {
          const tail =
            obj.second_x != null
              ? ` / (${obj.second_x.toFixed(3)}, ${obj.second_y.toFixed(3)})`
              : "";
          debugEl.textContent = `${obj.type} (${obj.x.toFixed(3)}, ${obj.y.toFixed(3)})${tail}`;
        } else if (obj.cmd === "key") {
          debugEl.textContent = `key ${obj.direction} ${obj.code}`;
        } else if (obj.cmd === "wheel") {
          debugEl.textContent = `wheel dx=${obj.dx} dy=${obj.dy}`;
        } else {
          debugEl.textContent = `${obj.cmd}`;
        }
      }

      /**
       * Convert a pointer/mouse/wheel event (in client coords) into the
       * normalized 0.0–1.0 device space the simulator-server expects.
       */
      function toDeviceCoords(ev) {
        if (!img) return null;
        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return null;
        const xRatio = (ev.clientX - rect.left) / rect.width;
        const yRatio = (ev.clientY - rect.top) / rect.height;
        return {
          x: Math.max(0, Math.min(1, xRatio)),
          y: Math.max(0, Math.min(1, yRatio)),
        };
      }

      function mirrorAround(pt, anchor) {
        return {
          x: Math.max(0, Math.min(1, 2 * anchor.x - pt.x)),
          y: Math.max(0, Math.min(1, 2 * anchor.y - pt.y)),
        };
      }

      /**
       * sim-server wheel deltas are small integers (~3–7). Browser deltaY can be
       * anything from 0.001 to 400+, so we clamp by magnitude the way radon-ide
       * does. Sign is negated so scroll direction matches iOS natural-scroll.
       */
      function normalizeWheel(delta) {
        const abs = Math.abs(delta);
        const magnitude = abs > 150 ? 7 : abs > 50 ? 5 : 3;
        return -Math.sign(delta) * magnitude;
      }

      function sendTouchEvent(type) {
        if (isMultiTouching) {
          const secondary = mirrorAround(touchPoint, anchorPoint);
          sendCmd({
            cmd: "touch",
            type,
            x: touchPoint.x,
            y: touchPoint.y,
            second_x: secondary.x,
            second_y: secondary.y,
          });
        } else {
          sendCmd({ cmd: "touch", type, x: touchPoint.x, y: touchPoint.y });
        }
      }

      // ── Multi-touch indicators ─────────────────────────────────────────
      function updateIndicators() {
        if (!stage) return;
        if (!isMultiTouching) {
          for (const k of ["primary", "mirror", "anchor"]) {
            if (touchDots[k]) touchDots[k].remove();
            touchDots[k] = null;
          }
          return;
        }
        const mirror = mirrorAround(touchPoint, anchorPoint);
        ensureDot("primary", touchPoint, 28, false);
        ensureDot("mirror", mirror, 28, false);
        ensureDot("anchor", anchorPoint, 10, true);
      }
      function ensureDot(key, pt, size, isAnchor) {
        const imgRect = img.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        // Position relative to the stage, inside the image area.
        const offsetX = imgRect.left - stageRect.left;
        const offsetY = imgRect.top - stageRect.top;
        const x = offsetX + pt.x * imgRect.width;
        const y = offsetY + pt.y * imgRect.height;
        let el = touchDots[key];
        if (!el) {
          el = document.createElement("div");
          el.className = "touch-dot" + (isAnchor ? " anchor" : "");
          stage.appendChild(el);
          touchDots[key] = el;
        }
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--size", `${size}px`);
        el.classList.toggle("pressed", isPressing && !isAnchor);
      }

      // ── Simulator list ─────────────────────────────────────────────────
      async function refreshSimulators() {
        setStatus("loading simulators…");
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/simulators`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { simulators } = await res.json();
          select.innerHTML = "";
          if (!simulators || simulators.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "(no simulators found)";
            select.appendChild(opt);
            select.disabled = true;
            setStatus("no simulators", "error");
            return;
          }
          select.disabled = false;
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "— choose simulator —";
          select.appendChild(placeholder);
          for (const s of simulators) {
            const opt = document.createElement("option");
            opt.value = s.udid;
            opt.textContent = `${s.state === "Booted" ? "● " : "○ "}${s.name}`;
            opt.disabled = s.state !== "Booted";
            select.appendChild(opt);
          }
          setStatus("idle");
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
        }
      }

      // ── Stream + WS wiring ─────────────────────────────────────────────
      function teardownStream() {
        releaseAllInput();
        if (ws) {
          try {
            ws.close();
          } catch {}
          ws = null;
        }
        wsOpen = false;
        // Explicitly clear the img src — otherwise the browser keeps the MJPEG
        // HTTP connection open after the element is detached, and re-selecting
        // a simulator leaks more connections. Same trick radon-ide uses.
        if (img) {
          img.src = "";
          img.removeAttribute("src");
        }
        img = null;
        stage = null;
        touchDots = { primary: null, mirror: null, anchor: null };
        viewport.innerHTML = "";
        // Bubble DOM lived inside `stage` (just wiped) — drop the now-detached
        // element refs so they're rebuilt against the next stream.
        vp.bubbles.clear();
      }

      async function connect(udid) {
        teardownStream();
        currentUdid = udid;
        setStatus("starting simulator-server…");
        viewport.innerHTML = '<div class="empty">Starting simulator-server…</div>';
        let info;
        try {
          const res = await fetch(
            `${TOOL_SERVER}/preview/simulator-server/${encodeURIComponent(udid)}`
          );
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          info = await res.json();
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
          viewport.innerHTML = `<div class="error-box">Could not start simulator-server.<br/>${escapeHtml(String(err.message || err))}</div>`;
          return;
        }

        if (!info.streamUrl) {
          setStatus("no stream URL", "error");
          viewport.innerHTML =
            '<div class="error-box">Simulator-server is running but did not advertise a stream URL.<br/>Rebuild with the <code>argent</code> cargo feature (which enables <code>streaming</code>).</div>';
          return;
        }

        // Build the viewport.
        stage = document.createElement("div");
        stage.className = "stage";
        img = document.createElement("img");
        img.alt = `Simulator ${udid.slice(0, 8)}`;
        img.draggable = false;
        // Append a cache-buster so re-connects don't reuse a stale MJPEG stream.
        img.src = `${info.streamUrl}?t=${Date.now()}`;
        img.onerror = () => setStatus("stream error", "error");
        stage.appendChild(img);
        viewport.innerHTML = "";
        viewport.appendChild(stage);

        attachInputHandlers(img);

        // Open WebSocket to sim-server.
        ws = new WebSocket(info.wsUrl);
        ws.onopen = () => {
          wsOpen = true;
          setStatus("live", "live");
        };
        ws.onclose = () => {
          wsOpen = false;
          if (currentUdid === udid) setStatus("disconnected", "error");
        };
        ws.onerror = () => {
          setStatus("ws error", "error");
        };
      }

      // ── Input handlers ─────────────────────────────────────────────────
      /**
       * Release any held touch/keys. Called on teardown and on window blur —
       * without this, losing focus mid-drag (or Cmd-tabbing with Shift held)
       * leaves the device stuck with a phantom touch / modifier.
       */
      function releaseAllInput() {
        if (isPressing) {
          sendTouchEvent("Up");
          isPressing = false;
        }
        isMultiTouching = false;
        updateIndicators();
        for (const code of pressedKeys) {
          sendCmd({ cmd: "key", direction: "Up", code });
        }
        pressedKeys.clear();
        activePointerId = null;
      }

      function attachInputHandlers(target) {
        target.addEventListener("dragstart", (ev) => ev.preventDefault());

        target.addEventListener("pointerdown", (ev) => {
          if (activePointerId !== null) return;
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          activePointerId = ev.pointerId;
          try {
            target.setPointerCapture(ev.pointerId);
          } catch {}
          touchPoint = pt;
          isPressing = true;
          sendTouchEvent("Down");
          updateIndicators();
          ev.preventDefault();
        });
        target.addEventListener("pointermove", (ev) => {
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          // Shift + Multi-touch + drag → move the anchor point along with the finger.
          if (isMultiTouching && ev.shiftKey) {
            anchorPoint = {
              x: Math.max(0, Math.min(1, anchorPoint.x + (pt.x - touchPoint.x))),
              y: Math.max(0, Math.min(1, anchorPoint.y + (pt.y - touchPoint.y))),
            };
          }
          touchPoint = pt;
          if (ev.pointerId === activePointerId && isPressing) {
            sendTouchEvent("Move");
          }
          updateIndicators();
          ev.preventDefault();
        });
        const endPointer = (ev) => {
          if (ev.pointerId !== activePointerId) return;
          const pt = toDeviceCoords(ev);
          if (pt) touchPoint = pt;
          if (isPressing) sendTouchEvent("Up");
          isPressing = false;
          try {
            target.releasePointerCapture(ev.pointerId);
          } catch {}
          activePointerId = null;
          updateIndicators();
          ev.preventDefault();
        };
        target.addEventListener("pointerup", endPointer);
        target.addEventListener("pointercancel", endPointer);

        // Mouse leaves the image while dragging — commit an Up so the device
        // doesn't stay stuck. If the user drags back in with the button still
        // held, pointerenter (re)starts a Down at the entry point.
        target.addEventListener("pointerleave", (ev) => {
          if (isPressing) {
            sendTouchEvent("Up");
            isPressing = false;
            updateIndicators();
          }
        });
        target.addEventListener("pointerenter", (ev) => {
          // Only auto-resume if the button is still held (buttons bitmask).
          if (ev.buttons & 1 && !isPressing) {
            const pt = toDeviceCoords(ev);
            if (pt) {
              touchPoint = pt;
              isPressing = true;
              sendTouchEvent("Down");
              updateIndicators();
            }
          }
        });

        target.addEventListener(
          "wheel",
          (ev) => {
            const pt = toDeviceCoords(ev);
            if (!pt) return;
            const dx = normalizeWheel(ev.deltaX);
            const dy = normalizeWheel(ev.deltaY);
            if (dx === 0 && dy === 0) {
              ev.preventDefault();
              return;
            }
            sendCmd({ cmd: "wheel", x: pt.x, y: pt.y, dx, dy });
            ev.preventDefault();
          },
          { passive: false }
        );
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
        );
      }

      // ── Events ──────────────────────────────────────────────────────────
      select.addEventListener("change", () => {
        const udid = select.value;
        if (!udid) return;
        // Blur the select so keys (including the multi-touch Option/Ctrl modifier)
        // route to our window-level handler instead of being swallowed by the
        // dropdown's built-in keyboard handling.
        select.blur();
        connect(udid).catch((err) => setStatus(String(err.message || err), "error"));
      });
      refreshBtn.addEventListener("click", () => {
        refreshBtn.blur();
        refreshSimulators();
      });

      // Global keyboard forwarding — active whenever a simulator is connected
      // and focus is not on a toolbar control. We forward raw keydown/keyup so
      // the simulator sees modifier keys (Shift, Ctrl, etc.) as real key events.
      function shouldForwardKey(ev) {
        if (!wsOpen) return false;
        const ae = document.activeElement;
        if (ae && (ae.tagName === "SELECT" || ae.tagName === "BUTTON" || ae.tagName === "INPUT")) {
          return false;
        }
        // Let the browser keep its own shortcuts (Cmd+R, Cmd+T, Cmd+W, Cmd+L, …).
        if (ev.metaKey && ev.code !== "MetaLeft" && ev.code !== "MetaRight") return false;
        return true;
      }

      /**
       * Sync CapsLock state to the device. Browser only fires keydown when
       * CapsLock turns on and keyup when it turns off — never a full sequence.
       * iOS expects a full down-up to toggle, and can drift out of sync when
       * CapsLock is pressed outside the webview. On any key event we check if
       * our cached CapsLock state diverges from the event's modifier state and
       * emit a full toggle sequence to resync.
       */
      function syncCapsLock(ev) {
        const current = ev.getModifierState && ev.getModifierState("CapsLock");
        if (current === undefined) return;
        if (current !== lastCapsLockState) {
          lastCapsLockState = current;
          sendCmd({ cmd: "key", direction: "Down", code: CAPS_LOCK_HID });
          sendCmd({ cmd: "key", direction: "Up", code: CAPS_LOCK_HID });
        }
      }

      function handleKeyEvent(ev) {
        if (!shouldForwardKey(ev)) return;
        syncCapsLock(ev);

        const isDown = ev.type === "keydown";

        // Multi-touch modifier → enter/exit two-finger mode, anchored at screen
        // center with the primary finger at the cursor. Shift+drag during
        // multi-touch moves the anchor.
        if (MULTITOUCH_CODES.has(ev.code)) {
          if (isDown && !isMultiTouching) {
            anchorPoint = { x: 0.5, y: 0.5 };
            // If we're mid-drag, smoothly promote the single touch to multi-touch
            // by issuing a Move with the second finger materialized.
            isMultiTouching = true;
            updateIndicators();
            if (isPressing) sendTouchEvent("Move");
          } else if (!isDown && isMultiTouching) {
            if (isPressing) sendTouchEvent("Up");
            isPressing = false;
            isMultiTouching = false;
            updateIndicators();
          }
          ev.preventDefault();
          return;
        }

        const code = HID[ev.code];
        if (code == null) return;
        if (code === CAPS_LOCK_HID) return; // handled by syncCapsLock

        if (isDown) {
          pressedKeys.add(code);
        } else {
          pressedKeys.delete(code);
        }
        sendCmd({ cmd: "key", direction: isDown ? "Down" : "Up", code });
        ev.preventDefault();
      }
      window.addEventListener("keydown", handleKeyEvent);
      window.addEventListener("keyup", handleKeyEvent);

      // Disable the right-click context menu over the stage so right-button
      // drags (if the user tries) don't pop up a menu on top of the stream.
      window.addEventListener("contextmenu", (ev) => {
        if (stage && stage.contains(ev.target)) ev.preventDefault();
      });

      // On focus loss, release any active touches/keys so the device doesn't
      // stay stuck with a held finger or modifier.
      window.addEventListener("blur", releaseAllInput);

      window.addEventListener("beforeunload", teardownStream);

      // ── Variant proposals ───────────────────────────────────────────────
      // Polls /preview/variants for the agent's staged design variants and
      // /preview/describe for the live element tree, then renders each element
      // as a floating draggable bubble pinned over its on-screen frame (or a
      // corner card when it is off-screen). The user drags a variant from the
      // sidebar onto its element to stage a pick; "Complete selection" POSTs
      // them back, unblocking the agent's await_user_selection call.
      const sidebar = document.getElementById("sidebar");
      const sidebarBody = document.getElementById("sidebar-body");
      const roundBadge = document.getElementById("round-badge");
      const cornerEl = document.getElementById("corner");
      const completeBtn = document.getElementById("complete-btn");
      const completeNote = document.getElementById("complete-note");
      const globalCommentEl = document.getElementById("global-comment");

      const vp = {
        round: -1,
        proposals: [],
        staged: {}, // elementId -> variantId
        comments: {}, // elementId -> string
        tree: null,
        treeAt: 0,
        bubbles: new Map(), // elementId -> { el, manual, mx, my }
        submitting: false,
        dragging: false,
        justCompletedRound: -1,
      };

      function vpMatchNode(node, match) {
        const out = [];
        const needle = (match.value || "").trim().toLowerCase();
        const walk = (n) => {
          if (!n || typeof n !== "object") return;
          const label = (n.label || "").toLowerCase();
          const ident = (n.identifier || "").toLowerCase();
          const value = (n.value || "").toLowerCase();
          const role = (n.role || "").toLowerCase();
          let hit = false;
          if (match.by === "label") hit = label === needle;
          else if (match.by === "identifier") hit = ident === needle;
          else if (match.by === "role") hit = role === needle;
          else hit = label.includes(needle) || ident.includes(needle) || value.includes(needle);
          if (hit && n.frame) out.push(n);
          if (Array.isArray(n.children)) n.children.forEach(walk);
        };
        walk(node);
        if (out.length === 0) return null;
        // Most specific = smallest on-screen area (e.g. the button, not its
        // container). Ignore degenerate / fully off-screen frames.
        let best = null;
        let bestArea = Infinity;
        for (const n of out) {
          const f = n.frame;
          if (!f || f.width <= 0 || f.height <= 0) continue;
          const cx = f.x + f.width / 2;
          const cy = f.y + f.height / 2;
          if (cx < 0 || cx > 1 || cy < 0 || cy > 1) continue;
          const area = f.width * f.height;
          if (area < bestArea) {
            bestArea = area;
            best = n;
          }
        }
        return best;
      }

      function vpBubbleXY(frame) {
        if (!img || !stage) return null;
        const imgRect = img.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        if (!imgRect.width || !imgRect.height) return null;
        const cx = frame.x + frame.width / 2;
        const cy = frame.y + frame.height / 2;
        return {
          x: imgRect.left - stageRect.left + cx * imgRect.width,
          y: imgRect.top - stageRect.top + cy * imgRect.height,
        };
      }

      async function vpPoll() {
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants`, { cache: "no-store" });
          if (res.ok) {
            const snap = await res.json();
            if (snap.round !== vp.round) {
              // New round → drop stale staging. Don't yank it out from under
              // an in-flight submit or an active drag; defer to a later poll
              // (vp.round stays unchanged so this re-fires next tick).
              if (!vp.submitting && !vp.dragging) {
                const hadWork =
                  Object.keys(vp.staged).length > 0 ||
                  Object.values(vp.comments).some((c) => c) ||
                  (globalCommentEl && globalCommentEl.value);
                const prev = vp.round;
                vp.round = snap.round;
                vp.staged = {};
                vp.comments = {};
                if (globalCommentEl) globalCommentEl.value = "";
                if (vp.justCompletedRound === snap.round) {
                  /* keep the success note from our own submit */
                } else if (prev >= 0 && hadWork) {
                  setCompleteNote(`Agent started a new round — previous selections were cleared.`);
                } else {
                  setCompleteNote("");
                }
              }
            }
            vp.proposals = Array.isArray(snap.proposals) ? snap.proposals : [];
          }
        } catch {
          /* tool-server momentarily unreachable — keep last state */
        }

        if (currentUdid && vp.proposals.length > 0) {
          try {
            const dres = await fetch(
              `${TOOL_SERVER}/preview/describe/${encodeURIComponent(currentUdid)}`,
              { cache: "no-store" }
            );
            if (dres.ok) {
              const d = await dres.json();
              if (d && d.tree) {
                vp.tree = d.tree;
                vp.treeAt = Date.now();
              }
            }
          } catch {
            /* describe is best-effort; stale tree is fine for ~6s */
          }
        }
        if (Date.now() - vp.treeAt > 6000) vp.tree = null;

        vpRender();
      }

      function vpStage(elementId, variantId) {
        vp.staged[elementId] = variantId;
        setCompleteNote("");
        vpRender();
      }

      function setCompleteNote(text, ok) {
        completeNote.textContent = text;
        completeNote.className = "complete-note" + (ok ? " ok" : "");
      }

      function vpChipDragData(ev, elementId, variantId) {
        ev.dataTransfer.setData("application/json", JSON.stringify({ elementId, variantId }));
        ev.dataTransfer.effectAllowed = "copy";
      }

      function vpReadDrag(ev) {
        try {
          return JSON.parse(ev.dataTransfer.getData("application/json"));
        } catch {
          return null;
        }
      }

      function vpRenderSidebar() {
        const has = vp.proposals.length > 0;
        sidebar.classList.toggle("hidden", !has);
        roundBadge.textContent = has ? `round ${vp.round}` : "";
        completeBtn.disabled = !has || vp.submitting;
        if (!has) {
          sidebarBody.innerHTML =
            '<div class="sidebar-empty">No variants proposed yet.<br/>When the agent calls ' +
            "<code>propose_variant</code>, options appear here and as floating bubbles over the " +
            "matching element on the stream. Drag a variant onto its element to stage it.</div>";
          return;
        }
        sidebarBody.innerHTML = "";
        for (const p of vp.proposals) {
          const onScreen = !!p._node;
          const wrap = document.createElement("div");
          wrap.className = "vp-el" + (onScreen ? "" : " offscreen");

          const head = document.createElement("div");
          head.className = "vp-el-head";
          const nm = document.createElement("span");
          nm.className = "name";
          nm.textContent = p.element;
          const where = document.createElement("span");
          where.className = "where" + (onScreen ? " on" : "");
          where.textContent = onScreen ? "on screen" : "off screen";
          head.appendChild(nm);
          head.appendChild(where);
          wrap.appendChild(head);

          const chips = document.createElement("div");
          chips.className = "vp-chips";
          for (const v of p.variants) {
            const staged = vp.staged[p.id] === v.id;
            const chip = document.createElement("div");
            chip.className = "vp-chip" + (staged ? " staged" : "");
            chip.draggable = true;
            chip.addEventListener("dragstart", (ev) => {
              chip.classList.add("dragging");
              vp.dragging = true;
              vpChipDragData(ev, p.id, v.id);
            });
            chip.addEventListener("dragend", () => {
              chip.classList.remove("dragging");
              vp.dragging = false;
            });
            // Click also stages — convenience + works without a live stream.
            chip.addEventListener("click", () => vpStage(p.id, v.id));

            const top = document.createElement("div");
            top.className = "vp-chip-top";
            const cn = document.createElement("span");
            cn.className = "vp-chip-name";
            cn.textContent = v.name;
            top.appendChild(cn);
            if (staged) {
              const tag = document.createElement("span");
              tag.className = "vp-chip-tag";
              tag.textContent = "✓ staged";
              top.appendChild(tag);
            }
            chip.appendChild(top);

            const sm = document.createElement("div");
            sm.className = "vp-chip-summary";
            sm.textContent = v.summary || "";
            chip.appendChild(sm);

            if (v.code) {
              const pre = document.createElement("pre");
              pre.textContent = v.code;
              chip.appendChild(pre);
            }
            if (v.filePath) {
              const fp = document.createElement("div");
              fp.className = "vp-chip-summary";
              fp.textContent = "↳ " + v.filePath;
              chip.appendChild(fp);
            }
            chips.appendChild(chip);
          }
          wrap.appendChild(chips);

          const cmt = document.createElement("textarea");
          cmt.className = "vp-el-comment";
          cmt.placeholder = `Comment on "${p.element}" (optional)…`;
          cmt.value = vp.comments[p.id] || "";
          cmt.addEventListener("input", () => {
            vp.comments[p.id] = cmt.value;
          });
          wrap.appendChild(cmt);

          sidebarBody.appendChild(wrap);
        }
      }

      function vpMakeDropTarget(el, elementId) {
        el.addEventListener("dragover", (ev) => {
          ev.preventDefault();
          ev.dataTransfer.dropEffect = "copy";
          el.classList.add("dropping");
        });
        el.addEventListener("dragleave", () => el.classList.remove("dropping"));
        el.addEventListener("drop", (ev) => {
          ev.preventDefault();
          el.classList.remove("dropping");
          const data = vpReadDrag(ev);
          if (!data) return;
          // Dropping a chip anywhere on the stream stages that chip's own
          // element/variant (the chip unambiguously identifies both); a
          // specific bubble/corner card narrows it to that element.
          const target = elementId || data.elementId;
          if (target !== data.elementId) return;
          vpStage(data.elementId, data.variantId);
        });
      }

      function vpEnsureBubble(p) {
        let rec = vp.bubbles.get(p.id);
        if (!rec) {
          const el = document.createElement("div");
          el.className = "bubble";
          rec = { el, manual: false, mx: 0, my: 0 };
          vp.bubbles.set(p.id, rec);
          vpMakeDropTarget(el, p.id);
          // Drag the bubble by its header to move it off the element it covers.
          el.addEventListener("pointerdown", (ev) => {
            if (!ev.target.closest(".bubble-head")) return;
            ev.stopPropagation();
            ev.preventDefault();
            const sr = stage.getBoundingClientRect();
            const move = (m) => {
              rec.manual = true;
              rec.mx = m.clientX - sr.left;
              rec.my = m.clientY - sr.top;
              el.style.left = rec.mx + "px";
              el.style.top = rec.my + "px";
            };
            const up = () => {
              window.removeEventListener("pointermove", move);
              window.removeEventListener("pointerup", up);
            };
            window.addEventListener("pointermove", move);
            window.addEventListener("pointerup", up);
          });
        }
        return rec;
      }

      function vpRenderBubbles() {
        const live = new Set();
        for (const p of vp.proposals) {
          if (!p._node || !stage || !img) continue;
          const pos = vpBubbleXY(p._node.frame);
          if (!pos) continue;
          p._onBubble = true; // shown as a bubble → not a corner card
          live.add(p.id);
          const rec = vpEnsureBubble(p);
          if (rec.el.parentElement !== stage) stage.appendChild(rec.el);
          if (!rec.manual) {
            rec.el.style.left = pos.x + "px";
            rec.el.style.top = pos.y + "px";
          }
          const stagedV = vp.staged[p.id] ? p.variants.find((v) => v.id === vp.staged[p.id]) : null;
          rec.el.innerHTML =
            '<div class="bubble-head"><span class="dot"></span>' +
            `<span class="name">${escapeHtml(p.element)}</span>` +
            `<span class="count">${p.variants.length} var${p.variants.length === 1 ? "" : "s"}</span></div>` +
            '<div class="bubble-body">' +
            (stagedV
              ? `<span class="bubble-staged">✓ ${escapeHtml(stagedV.name)}</span>`
              : '<span class="bubble-hint">drag a variant here</span>') +
            "</div>";
        }
        for (const [id, rec] of vp.bubbles) {
          if (!live.has(id)) {
            rec.el.remove();
            vp.bubbles.delete(id);
          }
        }
      }

      function vpRenderCorner() {
        cornerEl.innerHTML = "";
        // Anything not currently shown as an on-screen bubble (off-screen,
        // unmatched, stale describe tree, or no live stream surface) gets a
        // corner card so a proposal is never invisible.
        const off = vp.proposals.filter((p) => !p._onBubble);
        for (const p of off) {
          const card = document.createElement("div");
          card.className = "corner-card";
          const stagedV = vp.staged[p.id] ? p.variants.find((v) => v.id === vp.staged[p.id]) : null;
          card.innerHTML =
            `<div class="ttl">⚑ ${escapeHtml(p.element)}</div>` +
            `<div class="sub${stagedV ? " staged" : ""}">` +
            (stagedV
              ? `staged: ${escapeHtml(stagedV.name)}`
              : `${p.variants.length} variant${p.variants.length === 1 ? "" : "s"} · off screen — drop here or scroll it into view`) +
            "</div>";
          vpMakeDropTarget(card, p.id);
          cornerEl.appendChild(card);
        }
      }

      function vpRender() {
        // Resolve each proposal against the live tree (best-effort).
        for (const p of vp.proposals) {
          p._node = vp.tree ? vpMatchNode(vp.tree, p.match) : null;
          p._onBubble = false; // set true by vpRenderBubbles if anchored
        }
        vpRenderSidebar();
        vpRenderBubbles();
        vpRenderCorner();
      }

      async function vpComplete() {
        if (vp.submitting || vp.proposals.length === 0) return;
        vp.submitting = true;
        completeBtn.disabled = true;
        setCompleteNote("Submitting…");
        const selections = vp.proposals.map((p) => ({
          elementId: p.id,
          variantId: vp.staged[p.id] || null,
          comment: vp.comments[p.id] || undefined,
        }));
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants/selection`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selections,
              globalComment: globalCommentEl ? globalCommentEl.value : "",
            }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          const picked = selections.filter((s) => s.variantId).length;
          vp.justCompletedRound = vp.round;
          setCompleteNote(`Sent ${picked}/${selections.length} pick(s) to the agent.`, true);
        } catch (err) {
          setCompleteNote(`Failed: ${err.message || err}`);
        } finally {
          vp.submitting = false;
          completeBtn.disabled = vp.proposals.length === 0;
        }
      }

      completeBtn.addEventListener("click", vpComplete);
      // The stream itself is a drop target so a chip dropped anywhere on the
      // device stages that chip's own element (matches "drag onto the stream").
      const viewportEl = document.getElementById("viewport");
      viewportEl.addEventListener("dragover", (ev) => {
        if (vp.proposals.length) ev.preventDefault();
      });
      viewportEl.addEventListener("drop", (ev) => {
        ev.preventDefault();
        const data = vpReadDrag(ev);
        if (data) vpStage(data.elementId, data.variantId);
      });
      window.addEventListener("resize", () => {
        // Re-anchor auto-positioned bubbles to the new stage rect; keep any
        // bubbles the user manually dragged where they put them (don't discard
        // deliberate placement on an incidental resize / soft-keyboard).
        vpRender();
      });
      setInterval(vpPoll, 1500);
      vpPoll();

      refreshSimulators();
    </script>
  </body>
</html>
