<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argent Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0e0e10;
        --fg: #eaeaea;
        --muted: #8a8a90;
        --accent: #6aa6ff;
        --border: #2a2a2e;
        --surface: #16161a;
        --error: #ff8080;
        --ok: #5cdc8b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .toolbar label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .toolbar select,
      .toolbar button {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 13px;
      }
      .toolbar select {
        min-width: 240px;
      }
      .toolbar button {
        cursor: pointer;
      }
      .toolbar .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }
      .toolbar .debug {
        color: var(--muted);
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        min-width: 220px;
        text-align: right;
      }
      .status.live::before,
      .status.error::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .status.live::before {
        background: var(--ok);
        animation: pulse 1.6s ease-in-out infinite;
      }
      .status.error::before {
        background: var(--error);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        min-height: 0;
        position: relative;
      }
      .stage {
        position: relative;
        max-width: 100%;
        max-height: 100%;
        display: flex;
      }
      .stage img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 10px;
        box-shadow: 0 10px 48px #0008;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        touch-action: none;
        pointer-events: auto;
        cursor: crosshair;
      }
      /* Multi-touch indicators overlay on the image, positioned via CSS vars. */
      .touch-dot {
        position: absolute;
        top: var(--y);
        left: var(--x);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: rgba(106, 166, 255, 0.25);
        border: 2px solid rgba(106, 166, 255, 0.9);
        pointer-events: none;
        box-shadow: 0 0 12px rgba(106, 166, 255, 0.5);
      }
      .touch-dot.pressed {
        background: rgba(106, 166, 255, 0.55);
      }
      .touch-dot.anchor {
        background: rgba(255, 200, 80, 0.9);
        border-color: rgba(255, 200, 80, 1);
      }
      .empty,
      .error-box {
        color: var(--muted);
        text-align: center;
        padding: 32px;
        max-width: 480px;
        line-height: 1.5;
      }
      .error-box {
        color: var(--error);
      }
      code {
        background: var(--surface);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 12px;
      }

      /* ── Variant proposals + inspector ─────────────────────────────── */
      [hidden] {
        display: none !important;
      }
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        min-height: 0;
        position: relative;
      }
      #sim-picker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      #sim-label {
        color: var(--fg);
        font-size: 13px;
      }
      .round-badge {
        color: var(--muted);
        font-size: 11px;
      }
      .tool-toggle {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .tool-toggle:hover {
        border-color: var(--accent);
      }
      .tool-toggle.active {
        background: var(--accent);
        color: #06122b;
        border-color: var(--accent);
        font-weight: 700;
      }

      /* SVG layer for thin connector lines between cards and elements. */
      .connectors {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 4;
      }
      .connectors path {
        fill: none;
        stroke: var(--accent);
        stroke-width: 1.5;
        opacity: 0.7;
      }
      .connectors path.offscreen {
        stroke-dasharray: 4 4;
        opacity: 0.5;
      }
      .connectors circle {
        fill: var(--accent);
      }

      /* Floating variant cards, absolutely placed around the stream. */
      .cards {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      .vcard {
        position: absolute;
        width: 232px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 10px 30px #0009;
        pointer-events: auto;
        overflow: hidden;
      }
      .vcard-head {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        cursor: move;
        background: #1c1c21;
      }
      .vcard-head .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }
      .vcard-head .nm {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .vcard-head .where {
        margin-left: auto;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--muted);
        flex-shrink: 0;
      }
      .vcard-head .where.on {
        color: var(--ok);
      }
      .vcard-body {
        max-height: 320px;
        overflow-y: auto;
      }
      .vrow {
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        cursor: grab;
        user-select: none;
      }
      .vrow:last-child {
        border-bottom: 0;
      }
      .vrow:hover {
        background: #20202a;
      }
      .vrow:active {
        cursor: grabbing;
      }
      .vrow.dragging {
        opacity: 0.45;
      }
      .vrow.staged {
        background: rgba(92, 220, 139, 0.13);
      }
      .vrow .thumb {
        width: 52px;
        height: 92px;
        flex-shrink: 0;
        border-radius: 4px;
        border: 1px solid var(--border);
        object-fit: cover;
        background: #000;
      }
      .vrow .thumb.placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 9px;
        text-align: center;
      }
      .vrow .meta {
        min-width: 0;
        flex: 1;
      }
      .vrow .vn {
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .vrow .vn .tag {
        font-size: 10px;
        color: var(--ok);
      }
      .vrow .vs {
        color: var(--muted);
        font-size: 11px;
        margin-top: 3px;
        line-height: 1.35;
      }
      .vrow .vcode {
        margin: 5px 0 0;
        padding: 5px 7px;
        background: #000;
        border-radius: 4px;
        font-size: 10px;
        max-height: 90px;
        overflow: auto;
        white-space: pre-wrap;
      }
      .vcard-cmt {
        width: 100%;
        background: var(--bg);
        color: var(--fg);
        border: 0;
        border-top: 1px solid var(--border);
        padding: 6px 10px;
        font: inherit;
        font-size: 11px;
        resize: vertical;
        min-height: 28px;
      }

      /* Element-inspector spotlight: 4 blur+dim strips frame the focus rect. */
      .spot {
        position: absolute;
        background: rgba(8, 8, 10, 0.55);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        pointer-events: none;
      }
      .spot-ring {
        position: absolute;
        border: 2px solid var(--accent);
        border-radius: 4px;
        box-shadow: 0 0 0 1px #000a;
        pointer-events: none;
      }
      .spot-ring .lab {
        position: absolute;
        top: -22px;
        left: 0;
        background: var(--accent);
        color: #06122b;
        font-size: 11px;
        font-weight: 700;
        padding: 1px 7px;
        border-radius: 4px;
        white-space: nowrap;
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .spot-hit {
        position: absolute;
        cursor: crosshair;
        z-index: 8;
      }
      .inspecting .stage img {
        cursor: crosshair;
      }

      /* Comment box bubble anchored next to the inspected element. */
      .comment-pop {
        position: absolute;
        z-index: 9;
        width: 248px;
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 10px;
        box-shadow: 0 12px 36px #000b;
        padding: 10px;
      }
      .comment-pop h3 {
        margin: 0 0 7px;
        font-size: 12px;
        font-weight: 600;
      }
      .comment-pop h3 span {
        color: var(--accent);
      }
      .comment-pop textarea {
        width: 100%;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 8px;
        font: inherit;
        font-size: 12px;
        resize: vertical;
        min-height: 64px;
      }
      .comment-pop .row {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .comment-pop button {
        flex: 1;
        border: 0;
        border-radius: 5px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .comment-pop .save {
        background: var(--accent);
        color: #06122b;
      }
      .comment-pop .cancel {
        background: var(--border);
        color: var(--fg);
      }

      /* Saved-annotation pin shown on its element. */
      .ann-pin {
        position: absolute;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        border-radius: 50% 50% 50% 2px;
        background: #d8a657;
        color: #1a1205;
        font-size: 11px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 10px #0008;
        pointer-events: auto;
        cursor: help;
        z-index: 7;
      }

      /* Slim bottom action bar (replaces the old sidebar foot). */
      .footbar {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(22, 22, 26, 0.94);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        box-shadow: 0 10px 30px #0009;
        z-index: 10;
        max-width: 70%;
      }
      .footbar textarea {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 9px;
        font: inherit;
        font-size: 12px;
        resize: none;
        width: 260px;
        height: 32px;
      }
      .complete-btn {
        background: var(--accent);
        color: #06122b;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      .complete-btn:disabled {
        background: var(--border);
        color: var(--muted);
        cursor: not-allowed;
      }
      .complete-note {
        color: var(--muted);
        font-size: 11px;
        max-width: 200px;
      }
      .complete-note.ok {
        color: var(--ok);
      }
      .complete-note.err {
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="toolbar">
        <span id="sim-picker">
          <label for="sim-select">Simulator</label>
          <select id="sim-select">
            <option>Loading…</option>
          </select>
          <button id="refresh-btn" title="Refresh simulator list">⟳</button>
        </span>
        <span id="sim-label"></span>
        <button id="comment-btn" class="tool-toggle" hidden>＋ Add comment</button>
        <span id="round-badge" class="round-badge"></span>
        <span id="status" class="status">idle</span>
      </div>
      <div class="main" id="main">
        <div class="viewport" id="viewport">
          <div class="empty">Connecting…</div>
        </div>
        <svg class="connectors" id="connectors" aria-hidden="true"></svg>
        <div class="cards" id="cards"></div>
        <div class="comment-pop" id="comment-pop" hidden></div>
        <div class="footbar" id="footbar" hidden>
          <textarea
            id="global-comment"
            rows="1"
            placeholder="Overall comment for the agent (optional)…"></textarea>
          <button class="complete-btn" id="complete-btn">Complete selection</button>
          <span class="complete-note" id="complete-note"></span>
        </div>
      </div>
    </div>

    <script>
      "use strict";

      // ── Config ──────────────────────────────────────────────────────────
      // Tool-server base URL. When this page is served by tool-server itself,
      // same-origin is correct. Override via ?toolServer=http://host:port for
      // standalone testing.
      const urlParams = new URLSearchParams(window.location.search);
      const TOOL_SERVER =
        urlParams.get("toolServer") ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:3001");

      // Browser KeyboardEvent.code → USB HID Keyboard Usage Page (0x07) keycode.
      // sim-server's `key` command expects these raw HID codes — shift/modifier
      // state is conveyed by the browser issuing separate ShiftLeft/ShiftRight
      // key events which we forward verbatim.
      const HID = {
        KeyA: 4,
        KeyB: 5,
        KeyC: 6,
        KeyD: 7,
        KeyE: 8,
        KeyF: 9,
        KeyG: 10,
        KeyH: 11,
        KeyI: 12,
        KeyJ: 13,
        KeyK: 14,
        KeyL: 15,
        KeyM: 16,
        KeyN: 17,
        KeyO: 18,
        KeyP: 19,
        KeyQ: 20,
        KeyR: 21,
        KeyS: 22,
        KeyT: 23,
        KeyU: 24,
        KeyV: 25,
        KeyW: 26,
        KeyX: 27,
        KeyY: 28,
        KeyZ: 29,
        Digit1: 30,
        Digit2: 31,
        Digit3: 32,
        Digit4: 33,
        Digit5: 34,
        Digit6: 35,
        Digit7: 36,
        Digit8: 37,
        Digit9: 38,
        Digit0: 39,
        Enter: 40,
        Escape: 41,
        Backspace: 42,
        Tab: 43,
        Space: 44,
        Minus: 45,
        Equal: 46,
        BracketLeft: 47,
        BracketRight: 48,
        Backslash: 49,
        Semicolon: 51,
        Quote: 52,
        Backquote: 53,
        Comma: 54,
        Period: 55,
        Slash: 56,
        CapsLock: 57,
        F1: 58,
        F2: 59,
        F3: 60,
        F4: 61,
        F5: 62,
        F6: 63,
        F7: 64,
        F8: 65,
        F9: 66,
        F10: 67,
        F11: 68,
        F12: 69,
        ArrowRight: 79,
        ArrowLeft: 80,
        ArrowDown: 81,
        ArrowUp: 82,
        NumpadDivide: 84,
        NumpadMultiply: 85,
        NumpadSubtract: 86,
        NumpadAdd: 87,
        NumpadEnter: 88,
        Numpad1: 89,
        Numpad2: 90,
        Numpad3: 91,
        Numpad4: 92,
        Numpad5: 93,
        Numpad6: 94,
        Numpad7: 95,
        Numpad8: 96,
        Numpad9: 97,
        Numpad0: 98,
        NumpadDecimal: 99,
        ControlLeft: 224,
        ShiftLeft: 225,
        AltLeft: 226,
        MetaLeft: 227,
        ControlRight: 228,
        ShiftRight: 229,
        AltRight: 230,
        MetaRight: 231,
        IntlBackslash: 86,
      };
      const CAPS_LOCK_HID = 57;

      // Multi-touch modifier — matches radon-ide: Alt on macOS, Ctrl elsewhere.
      const IS_MAC = /Mac|iPhone|iPad/.test(navigator.platform);
      const MULTITOUCH_CODES = IS_MAC
        ? new Set(["AltLeft", "AltRight"])
        : new Set(["ControlLeft", "ControlRight"]);

      // ── DOM ─────────────────────────────────────────────────────────────
      const select = document.getElementById("sim-select");
      const simLabel = document.getElementById("sim-label");
      const status = document.getElementById("status");
      const viewport = document.getElementById("viewport");
      const refreshBtn = document.getElementById("refresh-btn");

      // ── State ───────────────────────────────────────────────────────────
      /** @type {WebSocket | null} */
      let ws = null;
      let wsOpen = false;
      let currentUdid = null;
      let img = null;
      let stage = null;
      /** Elements for the three multi-touch indicators (primary / mirror / anchor). */
      let touchDots = { primary: null, mirror: null, anchor: null };
      let activePointerId = null;
      /** True while the mouse button is held inside the stage (finger is "down"). */
      let isPressing = false;
      /** True while the multi-touch modifier is held. */
      let isMultiTouching = false;
      /** Primary and anchor points in normalized [0,1] space. */
      let touchPoint = { x: 0.5, y: 0.5 };
      let anchorPoint = { x: 0.5, y: 0.5 };
      /** Keys currently held down (HID codes) — released on blur. */
      const pressedKeys = new Set();
      /** Last known CapsLock state to resync iOS if it drifts. */
      let lastCapsLockState = false;
      let cmdCounter = 0;

      // ── Helpers ─────────────────────────────────────────────────────────
      function setStatus(text, kind = "") {
        status.textContent = text;
        status.className = "status" + (kind ? " " + kind : "");
      }

      function nextCmdId() {
        return String(++cmdCounter);
      }

      function sendCmd(obj) {
        if (!ws || !wsOpen) return;
        ws.send(JSON.stringify({ id: nextCmdId(), ...obj }));
      }

      /**
       * Convert a pointer/mouse/wheel event (in client coords) into the
       * normalized 0.0–1.0 device space the simulator-server expects.
       */
      function toDeviceCoords(ev) {
        if (!img) return null;
        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return null;
        const xRatio = (ev.clientX - rect.left) / rect.width;
        const yRatio = (ev.clientY - rect.top) / rect.height;
        return {
          x: Math.max(0, Math.min(1, xRatio)),
          y: Math.max(0, Math.min(1, yRatio)),
        };
      }

      function mirrorAround(pt, anchor) {
        return {
          x: Math.max(0, Math.min(1, 2 * anchor.x - pt.x)),
          y: Math.max(0, Math.min(1, 2 * anchor.y - pt.y)),
        };
      }

      /**
       * sim-server wheel deltas are small integers (~3–7). Browser deltaY can be
       * anything from 0.001 to 400+, so we clamp by magnitude the way radon-ide
       * does. Sign is negated so scroll direction matches iOS natural-scroll.
       */
      function normalizeWheel(delta) {
        const abs = Math.abs(delta);
        const magnitude = abs > 150 ? 7 : abs > 50 ? 5 : 3;
        return -Math.sign(delta) * magnitude;
      }

      function sendTouchEvent(type) {
        if (isMultiTouching) {
          const secondary = mirrorAround(touchPoint, anchorPoint);
          sendCmd({
            cmd: "touch",
            type,
            x: touchPoint.x,
            y: touchPoint.y,
            second_x: secondary.x,
            second_y: secondary.y,
          });
        } else {
          sendCmd({ cmd: "touch", type, x: touchPoint.x, y: touchPoint.y });
        }
      }

      // ── Multi-touch indicators ─────────────────────────────────────────
      function updateIndicators() {
        if (!stage) return;
        if (!isMultiTouching) {
          for (const k of ["primary", "mirror", "anchor"]) {
            if (touchDots[k]) touchDots[k].remove();
            touchDots[k] = null;
          }
          return;
        }
        const mirror = mirrorAround(touchPoint, anchorPoint);
        ensureDot("primary", touchPoint, 28, false);
        ensureDot("mirror", mirror, 28, false);
        ensureDot("anchor", anchorPoint, 10, true);
      }
      function ensureDot(key, pt, size, isAnchor) {
        const imgRect = img.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        // Position relative to the stage, inside the image area.
        const offsetX = imgRect.left - stageRect.left;
        const offsetY = imgRect.top - stageRect.top;
        const x = offsetX + pt.x * imgRect.width;
        const y = offsetY + pt.y * imgRect.height;
        let el = touchDots[key];
        if (!el) {
          el = document.createElement("div");
          el.className = "touch-dot" + (isAnchor ? " anchor" : "");
          stage.appendChild(el);
          touchDots[key] = el;
        }
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--size", `${size}px`);
        el.classList.toggle("pressed", isPressing && !isAnchor);
      }

      // ── Simulator list ─────────────────────────────────────────────────
      const simPicker = document.getElementById("sim-picker");
      async function refreshSimulators() {
        setStatus("loading simulators…");
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/simulators`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { simulators } = await res.json();
          const booted = (simulators || []).filter((s) => s.state === "Booted");

          // Exactly one usable simulator → skip the picker entirely and just
          // connect to it; show its name as a static label instead.
          if (booted.length === 1) {
            simPicker.hidden = true;
            simLabel.hidden = false;
            simLabel.textContent = booted[0].name;
            setStatus("idle");
            if (currentUdid !== booted[0].udid) {
              connect(booted[0].udid).catch((err) =>
                setStatus(String(err.message || err), "error")
              );
            }
            return;
          }

          simPicker.hidden = false;
          simLabel.hidden = true;
          select.innerHTML = "";
          if (!simulators || simulators.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "(no simulators found)";
            select.appendChild(opt);
            select.disabled = true;
            setStatus("no simulators", "error");
            return;
          }
          select.disabled = false;
          const placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "— choose simulator —";
          select.appendChild(placeholder);
          for (const s of simulators) {
            const opt = document.createElement("option");
            opt.value = s.udid;
            opt.textContent = `${s.state === "Booted" ? "● " : "○ "}${s.name}`;
            opt.disabled = s.state !== "Booted";
            select.appendChild(opt);
          }
          setStatus("idle");
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
        }
      }

      // ── Stream + WS wiring ─────────────────────────────────────────────
      function teardownStream() {
        releaseAllInput();
        if (ws) {
          try {
            ws.close();
          } catch {}
          ws = null;
        }
        wsOpen = false;
        // Explicitly clear the img src — otherwise the browser keeps the MJPEG
        // HTTP connection open after the element is detached, and re-selecting
        // a simulator leaks more connections. Same trick radon-ide uses.
        if (img) {
          img.src = "";
          img.removeAttribute("src");
        }
        img = null;
        stage = null;
        touchDots = { primary: null, mirror: null, anchor: null };
        viewport.innerHTML = "";
        // Overlay DOM lived inside `stage` (just wiped) — drop detached refs.
        vpResetOverlay();
      }

      async function connect(udid) {
        teardownStream();
        currentUdid = udid;
        setStatus("starting simulator-server…");
        viewport.innerHTML = '<div class="empty">Starting simulator-server…</div>';
        let info;
        try {
          const res = await fetch(
            `${TOOL_SERVER}/preview/simulator-server/${encodeURIComponent(udid)}`
          );
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          info = await res.json();
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
          viewport.innerHTML = `<div class="error-box">Could not start simulator-server.<br/>${escapeHtml(String(err.message || err))}</div>`;
          return;
        }

        if (!info.streamUrl) {
          setStatus("no stream URL", "error");
          viewport.innerHTML =
            '<div class="error-box">Simulator-server is running but did not advertise a stream URL.<br/>Rebuild with the <code>argent</code> cargo feature (which enables <code>streaming</code>).</div>';
          return;
        }

        // Build the viewport.
        stage = document.createElement("div");
        stage.className = "stage";
        img = document.createElement("img");
        img.alt = `Simulator ${udid.slice(0, 8)}`;
        img.draggable = false;
        // Append a cache-buster so re-connects don't reuse a stale MJPEG stream.
        img.src = `${info.streamUrl}?t=${Date.now()}`;
        img.onerror = () => setStatus("stream error", "error");
        stage.appendChild(img);
        viewport.innerHTML = "";
        viewport.appendChild(stage);

        attachInputHandlers(img);

        // Open WebSocket to sim-server.
        ws = new WebSocket(info.wsUrl);
        ws.onopen = () => {
          wsOpen = true;
          setStatus("live", "live");
        };
        ws.onclose = () => {
          wsOpen = false;
          if (currentUdid === udid) setStatus("disconnected", "error");
        };
        ws.onerror = () => {
          setStatus("ws error", "error");
        };
      }

      // ── Input handlers ─────────────────────────────────────────────────
      /**
       * Release any held touch/keys. Called on teardown and on window blur —
       * without this, losing focus mid-drag (or Cmd-tabbing with Shift held)
       * leaves the device stuck with a phantom touch / modifier.
       */
      function releaseAllInput() {
        if (isPressing) {
          sendTouchEvent("Up");
          isPressing = false;
        }
        isMultiTouching = false;
        updateIndicators();
        for (const code of pressedKeys) {
          sendCmd({ cmd: "key", direction: "Up", code });
        }
        pressedKeys.clear();
        activePointerId = null;
      }

      function attachInputHandlers(target) {
        target.addEventListener("dragstart", (ev) => ev.preventDefault());

        target.addEventListener("pointerdown", (ev) => {
          if (activePointerId !== null) return;
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          activePointerId = ev.pointerId;
          try {
            target.setPointerCapture(ev.pointerId);
          } catch {}
          touchPoint = pt;
          isPressing = true;
          sendTouchEvent("Down");
          updateIndicators();
          ev.preventDefault();
        });
        target.addEventListener("pointermove", (ev) => {
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          // Shift + Multi-touch + drag → move the anchor point along with the finger.
          if (isMultiTouching && ev.shiftKey) {
            anchorPoint = {
              x: Math.max(0, Math.min(1, anchorPoint.x + (pt.x - touchPoint.x))),
              y: Math.max(0, Math.min(1, anchorPoint.y + (pt.y - touchPoint.y))),
            };
          }
          touchPoint = pt;
          if (ev.pointerId === activePointerId && isPressing) {
            sendTouchEvent("Move");
          }
          updateIndicators();
          ev.preventDefault();
        });
        const endPointer = (ev) => {
          if (ev.pointerId !== activePointerId) return;
          const pt = toDeviceCoords(ev);
          if (pt) touchPoint = pt;
          if (isPressing) sendTouchEvent("Up");
          isPressing = false;
          try {
            target.releasePointerCapture(ev.pointerId);
          } catch {}
          activePointerId = null;
          updateIndicators();
          ev.preventDefault();
        };
        target.addEventListener("pointerup", endPointer);
        target.addEventListener("pointercancel", endPointer);

        // Mouse leaves the image while dragging — commit an Up so the device
        // doesn't stay stuck. If the user drags back in with the button still
        // held, pointerenter (re)starts a Down at the entry point.
        target.addEventListener("pointerleave", (ev) => {
          if (isPressing) {
            sendTouchEvent("Up");
            isPressing = false;
            updateIndicators();
          }
        });
        target.addEventListener("pointerenter", (ev) => {
          // Only auto-resume if the button is still held (buttons bitmask).
          if (ev.buttons & 1 && !isPressing) {
            const pt = toDeviceCoords(ev);
            if (pt) {
              touchPoint = pt;
              isPressing = true;
              sendTouchEvent("Down");
              updateIndicators();
            }
          }
        });

        target.addEventListener(
          "wheel",
          (ev) => {
            const pt = toDeviceCoords(ev);
            if (!pt) return;
            const dx = normalizeWheel(ev.deltaX);
            const dy = normalizeWheel(ev.deltaY);
            if (dx === 0 && dy === 0) {
              ev.preventDefault();
              return;
            }
            sendCmd({ cmd: "wheel", x: pt.x, y: pt.y, dx, dy });
            ev.preventDefault();
          },
          { passive: false }
        );
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
        );
      }

      // ── Events ──────────────────────────────────────────────────────────
      select.addEventListener("change", () => {
        const udid = select.value;
        if (!udid) return;
        // Blur the select so keys (including the multi-touch Option/Ctrl modifier)
        // route to our window-level handler instead of being swallowed by the
        // dropdown's built-in keyboard handling.
        select.blur();
        connect(udid).catch((err) => setStatus(String(err.message || err), "error"));
      });
      refreshBtn.addEventListener("click", () => {
        refreshBtn.blur();
        refreshSimulators();
      });

      // Global keyboard forwarding — active whenever a simulator is connected
      // and focus is not on a toolbar control. We forward raw keydown/keyup so
      // the simulator sees modifier keys (Shift, Ctrl, etc.) as real key events.
      function shouldForwardKey(ev) {
        if (!wsOpen) return false;
        const ae = document.activeElement;
        if (ae && (ae.tagName === "SELECT" || ae.tagName === "BUTTON" || ae.tagName === "INPUT")) {
          return false;
        }
        // Let the browser keep its own shortcuts (Cmd+R, Cmd+T, Cmd+W, Cmd+L, …).
        if (ev.metaKey && ev.code !== "MetaLeft" && ev.code !== "MetaRight") return false;
        return true;
      }

      /**
       * Sync CapsLock state to the device. Browser only fires keydown when
       * CapsLock turns on and keyup when it turns off — never a full sequence.
       * iOS expects a full down-up to toggle, and can drift out of sync when
       * CapsLock is pressed outside the webview. On any key event we check if
       * our cached CapsLock state diverges from the event's modifier state and
       * emit a full toggle sequence to resync.
       */
      function syncCapsLock(ev) {
        const current = ev.getModifierState && ev.getModifierState("CapsLock");
        if (current === undefined) return;
        if (current !== lastCapsLockState) {
          lastCapsLockState = current;
          sendCmd({ cmd: "key", direction: "Down", code: CAPS_LOCK_HID });
          sendCmd({ cmd: "key", direction: "Up", code: CAPS_LOCK_HID });
        }
      }

      function handleKeyEvent(ev) {
        if (!shouldForwardKey(ev)) return;
        syncCapsLock(ev);

        const isDown = ev.type === "keydown";

        // Multi-touch modifier → enter/exit two-finger mode, anchored at screen
        // center with the primary finger at the cursor. Shift+drag during
        // multi-touch moves the anchor.
        if (MULTITOUCH_CODES.has(ev.code)) {
          if (isDown && !isMultiTouching) {
            anchorPoint = { x: 0.5, y: 0.5 };
            // If we're mid-drag, smoothly promote the single touch to multi-touch
            // by issuing a Move with the second finger materialized.
            isMultiTouching = true;
            updateIndicators();
            if (isPressing) sendTouchEvent("Move");
          } else if (!isDown && isMultiTouching) {
            if (isPressing) sendTouchEvent("Up");
            isPressing = false;
            isMultiTouching = false;
            updateIndicators();
          }
          ev.preventDefault();
          return;
        }

        const code = HID[ev.code];
        if (code == null) return;
        if (code === CAPS_LOCK_HID) return; // handled by syncCapsLock

        if (isDown) {
          pressedKeys.add(code);
        } else {
          pressedKeys.delete(code);
        }
        sendCmd({ cmd: "key", direction: isDown ? "Down" : "Up", code });
        ev.preventDefault();
      }
      window.addEventListener("keydown", handleKeyEvent);
      window.addEventListener("keyup", handleKeyEvent);

      // Disable the right-click context menu over the stage so right-button
      // drags (if the user tries) don't pop up a menu on top of the stream.
      window.addEventListener("contextmenu", (ev) => {
        if (stage && stage.contains(ev.target)) ev.preventDefault();
      });

      // On focus loss, release any active touches/keys so the device doesn't
      // stay stuck with a held finger or modifier.
      window.addEventListener("blur", releaseAllInput);

      window.addEventListener("beforeunload", teardownStream);

      // ── Variant proposals + element-comment inspector ───────────────────
      // Polls /preview/variants and /preview/describe, renders each proposed
      // element as a floating card connected by a thin line to its live
      // on-screen position, and provides an "Add comment" element inspector
      // (spotlight: blur+dim everything except the hovered element, click to
      // attach a comment). Picks + comments + annotations are pushed back to
      // the agent's await_user_selection via "Complete selection".
      const mainEl = document.getElementById("main");
      const cardsEl = document.getElementById("cards");
      const connEl = document.getElementById("connectors");
      const popEl = document.getElementById("comment-pop");
      const footEl = document.getElementById("footbar");
      const commentBtn = document.getElementById("comment-btn");
      const roundBadge = document.getElementById("round-badge");
      const completeBtn = document.getElementById("complete-btn");
      const completeNote = document.getElementById("complete-note");
      const globalCommentEl = document.getElementById("global-comment");
      const SVGNS = "http://www.w3.org/2000/svg";

      const vp = {
        round: -1,
        proposals: [],
        staged: {}, // elementId -> variantId
        comments: {}, // elementId -> string
        annotations: [], // [{ id, target, match, comment }]
        tree: null,
        treeAt: 0,
        cards: new Map(), // elementId -> { el, pos:{x,y}|null }
        annId: 0,
        submitting: false,
        dragging: false,
        justCompletedRound: -1,
        inspect: false,
        focus: null, // describe node currently spotlighted
        commentFor: null, // describe node a comment-pop is open for
        spot: null, // spotlight layer root (child of mainEl)
      };

      function escapeAttr(s) {
        return String(s).replace(/[<>&"]/g, (c) => "&#" + c.charCodeAt(0) + ";");
      }
      function nodeText(n) {
        return (n && (n.label || n.value || n.identifier)) || "";
      }
      function nodeDesc(n) {
        return (n && (n.identifier || n.label || n.value || (n.role ? n.role : ""))) || "element";
      }
      function nodeMatch(n) {
        if (n.identifier) return { by: "identifier", value: n.identifier };
        if (n.label) return { by: "label", value: n.label };
        if (n.value) return { by: "text", value: n.value };
        return { by: "role", value: n.role || "" };
      }

      // Smallest on-screen describe node matching a proposal's matcher.
      function vpMatchNode(node, match) {
        const needle = (match.value || "").trim().toLowerCase();
        const out = [];
        const walk = (n) => {
          if (!n || typeof n !== "object") return;
          const label = (n.label || "").toLowerCase();
          const ident = (n.identifier || "").toLowerCase();
          const value = (n.value || "").toLowerCase();
          const role = (n.role || "").toLowerCase();
          let hit;
          if (match.by === "label") hit = label === needle;
          else if (match.by === "identifier") hit = ident === needle;
          else if (match.by === "role") hit = role === needle;
          else hit = label.includes(needle) || ident.includes(needle) || value.includes(needle);
          if (hit && n.frame) out.push(n);
          if (Array.isArray(n.children)) n.children.forEach(walk);
        };
        walk(node);
        let best = null,
          bestArea = Infinity;
        for (const n of out) {
          const f = n.frame;
          if (!f || f.width <= 0 || f.height <= 0) continue;
          const cx = f.x + f.width / 2,
            cy = f.y + f.height / 2;
          if (cx < 0 || cx > 1 || cy < 0 || cy > 1) continue;
          const a = f.width * f.height;
          if (a < bestArea) {
            bestArea = a;
            best = n;
          }
        }
        return best;
      }

      // Smallest node whose frame contains a normalized point (inspector pick).
      function vpNodeAtPoint(node, x, y) {
        let best = null,
          bestArea = Infinity;
        const walk = (n) => {
          if (!n || typeof n !== "object") return;
          const f = n.frame;
          if (
            f &&
            f.width > 0 &&
            f.height > 0 &&
            x >= f.x &&
            x <= f.x + f.width &&
            y >= f.y &&
            y <= f.y + f.height
          ) {
            const a = f.width * f.height;
            if (a < bestArea && nodeText(n)) {
              bestArea = a;
              best = n;
            }
          }
          if (Array.isArray(n.children)) n.children.forEach(walk);
        };
        walk(node);
        return best;
      }

      // Stream image rect, in coordinates relative to #main.
      function streamRect() {
        if (!img) return null;
        const ir = img.getBoundingClientRect();
        const mr = mainEl.getBoundingClientRect();
        if (!ir.width || !ir.height) return null;
        return { x: ir.left - mr.left, y: ir.top - mr.top, w: ir.width, h: ir.height };
      }
      function elementPoint(frame) {
        const r = streamRect();
        if (!r) return null;
        return {
          x: r.x + (frame.x + frame.width / 2) * r.w,
          y: r.y + (frame.y + frame.height / 2) * r.h,
        };
      }

      async function vpPoll() {
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants`, { cache: "no-store" });
          if (res.ok) {
            const snap = await res.json();
            if (snap.round !== vp.round) {
              if (!vp.submitting && !vp.dragging) {
                const hadWork =
                  Object.keys(vp.staged).length > 0 ||
                  vp.annotations.length > 0 ||
                  (globalCommentEl && globalCommentEl.value);
                const prev = vp.round;
                vp.round = snap.round;
                vp.staged = {};
                vp.comments = {};
                vp.annotations = [];
                if (globalCommentEl) globalCommentEl.value = "";
                if (vp.justCompletedRound === snap.round) {
                  /* keep our own success note */
                } else if (prev >= 0 && hadWork) {
                  setNote("Agent started a new round — previous selections cleared.");
                } else setNote("");
              }
            }
            vp.proposals = Array.isArray(snap.proposals) ? snap.proposals : [];
          }
        } catch {
          /* keep last state */
        }
        if (currentUdid && (vp.proposals.length > 0 || vp.inspect)) {
          try {
            const d = await fetch(
              `${TOOL_SERVER}/preview/describe/${encodeURIComponent(currentUdid)}`,
              { cache: "no-store" }
            );
            if (d.ok) {
              const j = await d.json();
              if (j && j.tree) {
                vp.tree = j.tree;
                vp.treeAt = Date.now();
              }
            }
          } catch {
            /* describe best-effort */
          }
        }
        if (Date.now() - vp.treeAt > 6000) vp.tree = null;
        vpRender();
      }

      function setNote(text, kind) {
        completeNote.textContent = text || "";
        completeNote.className = "complete-note" + (kind ? " " + kind : "");
      }
      function vpStage(elementId, variantId) {
        vp.staged[elementId] = variantId;
        setNote("");
        vpRender();
      }

      // ── Floating cards + connectors ─────────────────────────────────────
      function previewSrc(p, v) {
        if (!v.previewImage) return null;
        if (/^(https?:|data:)/i.test(v.previewImage)) return v.previewImage;
        return `${TOOL_SERVER}/preview/variant-image/${encodeURIComponent(
          p.id
        )}/${encodeURIComponent(v.id)}`;
      }

      function buildCard(p) {
        const el = document.createElement("div");
        el.className = "vcard";

        const head = document.createElement("div");
        head.className = "vcard-head";
        const dot = document.createElement("span");
        dot.className = "dot";
        const nm = document.createElement("span");
        nm.className = "nm";
        nm.textContent = p.element;
        const where = document.createElement("span");
        where.className = "where";
        head.append(dot, nm, where);
        el.appendChild(head);

        // Drag the card by its header to reposition it.
        head.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          const mr = mainEl.getBoundingClientRect();
          const rec = vp.cards.get(p.id);
          const move = (m) => {
            const x = m.clientX - mr.left - el.offsetWidth / 2;
            const y = m.clientY - mr.top - 12;
            if (rec) rec.pos = { x, y };
            el.style.left = x + "px";
            el.style.top = y + "px";
            drawConnectors();
          };
          const up = () => {
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
          };
          window.addEventListener("pointermove", move);
          window.addEventListener("pointerup", up);
        });

        const body = document.createElement("div");
        body.className = "vcard-body";
        for (const v of p.variants) {
          const row = document.createElement("div");
          row.className = "vrow" + (vp.staged[p.id] === v.id ? " staged" : "");
          row.draggable = true;
          row.addEventListener("dragstart", (ev) => {
            row.classList.add("dragging");
            vp.dragging = true;
            ev.dataTransfer.setData(
              "application/json",
              JSON.stringify({ elementId: p.id, variantId: v.id })
            );
            ev.dataTransfer.effectAllowed = "copy";
          });
          row.addEventListener("dragend", () => {
            row.classList.remove("dragging");
            vp.dragging = false;
          });
          row.addEventListener("click", () => vpStage(p.id, v.id));

          const src = previewSrc(p, v);
          if (src) {
            const im = document.createElement("img");
            im.className = "thumb";
            im.src = src;
            im.alt = v.name;
            im.onerror = () => {
              im.replaceWith(placeholderThumb());
            };
            row.appendChild(im);
          } else {
            row.appendChild(placeholderThumb());
          }

          const meta = document.createElement("div");
          meta.className = "meta";
          const vn = document.createElement("div");
          vn.className = "vn";
          const vnt = document.createElement("span");
          vnt.textContent = v.name;
          vn.appendChild(vnt);
          if (vp.staged[p.id] === v.id) {
            const tag = document.createElement("span");
            tag.className = "tag";
            tag.textContent = "✓ staged";
            vn.appendChild(tag);
          }
          const vs = document.createElement("div");
          vs.className = "vs";
          vs.textContent = v.summary || "";
          meta.append(vn, vs);
          if (v.code) {
            const pre = document.createElement("pre");
            pre.className = "vcode";
            pre.textContent = v.code;
            meta.appendChild(pre);
          }
          if (v.filePath) {
            const fp = document.createElement("div");
            fp.className = "vs";
            fp.textContent = "↳ " + v.filePath;
            meta.appendChild(fp);
          }
          row.appendChild(meta);
          body.appendChild(row);
        }
        el.appendChild(body);

        const cmt = document.createElement("textarea");
        cmt.className = "vcard-cmt";
        cmt.placeholder = `Comment on "${p.element}" (optional)…`;
        cmt.value = vp.comments[p.id] || "";
        cmt.addEventListener("input", () => {
          vp.comments[p.id] = cmt.value;
        });
        cmt.addEventListener("pointerdown", (e) => e.stopPropagation());
        el.appendChild(cmt);
        return el;
      }
      function placeholderThumb() {
        const d = document.createElement("div");
        d.className = "thumb placeholder";
        d.textContent = "no preview";
        return d;
      }

      function layoutCards() {
        const mr = mainEl.getBoundingClientRect();
        const mw = mr.width,
          mh = mr.height;
        const r = streamRect();
        const cardW = 232;
        const gutterX = r
          ? Math.min(mw - cardW - 14, r.x + r.w + 26)
          : Math.max(14, mw - cardW - 14);
        const live = new Set();
        let y = 14;
        for (const p of vp.proposals) {
          live.add(p.id);
          let rec = vp.cards.get(p.id);
          if (!rec) {
            rec = { el: buildCard(p), pos: null };
            vp.cards.set(p.id, rec);
          } else {
            const fresh = buildCard(p);
            rec.el.replaceWith(fresh);
            rec.el = fresh;
          }
          if (rec.el.parentElement !== cardsEl) cardsEl.appendChild(rec.el);
          const pos = rec.pos || { x: gutterX, y };
          rec.el.style.left = pos.x + "px";
          rec.el.style.top = pos.y + "px";
          y = (rec.pos ? y : pos.y) + rec.el.offsetHeight + 12;
        }
        for (const [id, rec] of vp.cards) {
          if (!live.has(id)) {
            rec.el.remove();
            vp.cards.delete(id);
          }
        }
      }

      function drawConnectors() {
        while (connEl.firstChild) connEl.removeChild(connEl.firstChild);
        const mr = mainEl.getBoundingClientRect();
        connEl.setAttribute("width", mr.width);
        connEl.setAttribute("height", mr.height);
        const r = streamRect();
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (!rec) continue;
          const cr = rec.el.getBoundingClientRect();
          const from = { x: cr.left - mr.left, y: cr.top - mr.top + cr.height / 2 };
          // anchor on the card side facing the stream
          if (r && from.x > r.x + r.w) from.x = cr.left - mr.left;
          else from.x = cr.left - mr.left + cr.width;

          let to,
            off = false;
          if (p._node) {
            to = elementPoint(p._node.frame);
          }
          if (!to && r) {
            off = true;
            to = { x: r.x + r.w / 2, y: r.y + 8 }; // points at the screen, top-center
          }
          if (!to) continue;
          const path = document.createElementNS(SVGNS, "path");
          const mx = (from.x + to.x) / 2;
          path.setAttribute(
            "d",
            `M ${from.x} ${from.y} C ${mx} ${from.y} ${mx} ${to.y} ${to.x} ${to.y}`
          );
          if (off) path.setAttribute("class", "offscreen");
          connEl.appendChild(path);
          if (!off) {
            const c = document.createElementNS(SVGNS, "circle");
            c.setAttribute("cx", to.x);
            c.setAttribute("cy", to.y);
            c.setAttribute("r", "4");
            connEl.appendChild(c);
          }
        }
      }

      // ── Element-comment inspector (spotlight) ───────────────────────────
      function ensureSpot() {
        if (vp.spot) return vp.spot;
        const root = document.createElement("div");
        root.style.position = "absolute";
        root.style.inset = "0";
        root.style.zIndex = "8";
        root.style.pointerEvents = "none";
        const strips = [0, 1, 2, 3].map(() => {
          const s = document.createElement("div");
          s.className = "spot";
          root.appendChild(s);
          return s;
        });
        const ring = document.createElement("div");
        ring.className = "spot-ring";
        const lab = document.createElement("span");
        lab.className = "lab";
        ring.appendChild(lab);
        root.appendChild(ring);
        const hit = document.createElement("div");
        hit.className = "spot-hit";
        root.appendChild(hit);
        hit.addEventListener("pointermove", (ev) => {
          const r = streamRect();
          if (!r || !vp.tree || vp.commentFor) return;
          const x = (ev.clientX - mainEl.getBoundingClientRect().left - r.x) / r.w;
          const y = (ev.clientY - mainEl.getBoundingClientRect().top - r.y) / r.h;
          vp.focus = vpNodeAtPoint(vp.tree, x, y);
          paintSpot();
        });
        hit.addEventListener("click", (ev) => {
          if (!vp.focus) return;
          vp.commentFor = vp.focus;
          openCommentPop(vp.focus);
        });
        mainEl.appendChild(root);
        vp.spot = { root, strips, ring, lab, hit };
        return vp.spot;
      }
      function paintSpot() {
        if (!vp.inspect) return;
        const s = ensureSpot();
        const r = streamRect();
        if (!r) {
          s.root.style.display = "none";
          return;
        }
        s.root.style.display = "";
        s.hit.style.left = r.x + "px";
        s.hit.style.top = r.y + "px";
        s.hit.style.width = r.w + "px";
        s.hit.style.height = r.h + "px";
        const n = vp.commentFor || vp.focus;
        if (!n) {
          // whole stream dimmed, no cutout
          s.strips[0].style.cssText = `position:absolute;left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px`;
          s.strips[1].style.display =
            s.strips[2].style.display =
            s.strips[3].style.display =
              "none";
          s.strips[0].className = "spot";
          s.strips[0].style.display = "";
          s.ring.style.display = "none";
          return;
        }
        const f = n.frame;
        const ex = r.x + f.x * r.w,
          ey = r.y + f.y * r.h,
          ew = f.width * r.w,
          eh = f.height * r.h;
        const set = (el, x, y, w, h) => {
          el.className = "spot";
          el.style.display = "";
          el.style.left = x + "px";
          el.style.top = y + "px";
          el.style.width = Math.max(0, w) + "px";
          el.style.height = Math.max(0, h) + "px";
        };
        set(s.strips[0], r.x, r.y, r.w, ey - r.y); // top
        set(s.strips[1], r.x, ey + eh, r.w, r.y + r.h - (ey + eh)); // bottom
        set(s.strips[2], r.x, ey, ex - r.x, eh); // left
        set(s.strips[3], ex + ew, ey, r.x + r.w - (ex + ew), eh); // right
        s.ring.style.display = "";
        s.ring.style.left = ex + "px";
        s.ring.style.top = ey + "px";
        s.ring.style.width = ew + "px";
        s.ring.style.height = eh + "px";
        s.lab.textContent = nodeDesc(n);
      }
      function setInspect(on) {
        vp.inspect = on;
        commentBtn.classList.toggle("active", on);
        commentBtn.textContent = on ? "✕ Done commenting" : "＋ Add comment";
        document.getElementById("root").classList.toggle("inspecting", on);
        if (!on) {
          vp.focus = null;
          vp.commentFor = null;
          popEl.hidden = true;
          if (vp.spot) {
            vp.spot.root.remove();
            vp.spot = null;
          }
        } else {
          ensureSpot();
          paintSpot();
          vpPoll();
        }
      }
      function openCommentPop(node) {
        const r = streamRect();
        if (!r) return;
        const f = node.frame;
        const ex = r.x + f.x * r.w,
          ey = r.y + f.y * r.h,
          ew = f.width * r.w;
        popEl.innerHTML = "";
        const h = document.createElement("h3");
        h.textContent = "Comment on ";
        const sp = document.createElement("span");
        sp.textContent = nodeDesc(node);
        h.appendChild(sp);
        const ta = document.createElement("textarea");
        ta.placeholder = "What should change about this element?";
        const rowd = document.createElement("div");
        rowd.className = "row";
        const save = document.createElement("button");
        save.className = "save";
        save.textContent = "Save comment";
        const cancel = document.createElement("button");
        cancel.className = "cancel";
        cancel.textContent = "Cancel";
        rowd.append(save, cancel);
        popEl.append(h, ta, rowd);
        popEl.hidden = false;
        // place to the right of the element, or left if no room
        const mr = mainEl.getBoundingClientRect();
        let px = ex + ew + 14;
        if (px + 260 > mr.width) px = Math.max(8, ex - 262);
        let py = Math.min(Math.max(8, ey - 10), mr.height - 180);
        popEl.style.left = px + "px";
        popEl.style.top = py + "px";
        ta.focus();
        const close = () => {
          popEl.hidden = true;
          vp.commentFor = null;
          paintSpot();
        };
        save.addEventListener("click", () => {
          const text = ta.value.trim();
          if (text) {
            vp.annotations.push({
              id: ++vp.annId,
              target: nodeDesc(node),
              match: nodeMatch(node),
              comment: text,
            });
          }
          close();
          setInspect(false);
          vpRender();
        });
        cancel.addEventListener("click", () => {
          close();
          vp.focus = null;
        });
      }

      function renderPins() {
        cardsEl.querySelectorAll(".ann-pin").forEach((e) => e.remove());
        if (!vp.tree) return;
        vp.annotations.forEach((a, i) => {
          const n = vpMatchNode(vp.tree, a.match);
          if (!n) return;
          const pt = elementPoint(n.frame);
          if (!pt) return;
          const pin = document.createElement("div");
          pin.className = "ann-pin";
          pin.textContent = String(i + 1);
          pin.title = a.target + ": " + a.comment;
          pin.style.left = pt.x + "px";
          pin.style.top = pt.y + "px";
          pin.addEventListener("click", () => {
            if (confirm(`Remove comment on "${a.target}"?\n\n“${a.comment}”`)) {
              vp.annotations = vp.annotations.filter((x) => x.id !== a.id);
              vpRender();
            }
          });
          cardsEl.appendChild(pin);
        });
      }

      function vpRender() {
        for (const p of vp.proposals) {
          p._node = vp.tree ? vpMatchNode(vp.tree, p.match) : null;
        }
        layoutCards();
        // reflect on-screen / off-screen on each card header
        for (const p of vp.proposals) {
          const rec = vp.cards.get(p.id);
          if (!rec) continue;
          const w = rec.el.querySelector(".where");
          if (w) {
            w.textContent = p._node ? "on screen" : "off screen";
            w.className = "where" + (p._node ? " on" : "");
          }
        }
        drawConnectors();
        renderPins();
        if (vp.inspect) paintSpot();

        const has = vp.proposals.length > 0 || vp.annotations.length > 0;
        footEl.hidden = !has;
        roundBadge.textContent = vp.proposals.length > 0 ? `round ${vp.round}` : "";
        completeBtn.disabled = vp.submitting || !has;
        commentBtn.hidden = !img; // only when a stream is live
      }

      async function vpComplete() {
        if (vp.submitting) return;
        if (vp.proposals.length === 0 && vp.annotations.length === 0) return;
        vp.submitting = true;
        completeBtn.disabled = true;
        setNote("Submitting…");
        const selections = vp.proposals.map((p) => ({
          elementId: p.id,
          variantId: vp.staged[p.id] || null,
          comment: vp.comments[p.id] || undefined,
        }));
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants/selection`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              selections,
              annotations: vp.annotations.map((a) => ({
                target: a.target,
                match: a.match,
                comment: a.comment,
              })),
              globalComment: globalCommentEl ? globalCommentEl.value : "",
            }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          const picked = selections.filter((s) => s.variantId).length;
          vp.justCompletedRound = vp.round;
          setNote(
            `Sent ${picked} pick(s) + ${vp.annotations.length} comment(s) to the agent.`,
            "ok"
          );
        } catch (err) {
          setNote(`Failed: ${err.message || err}`, "err");
        } finally {
          vp.submitting = false;
          completeBtn.disabled = false;
        }
      }

      // Called by teardownStream when the stream is torn down.
      function vpResetOverlay() {
        vp.cards.clear();
        if (cardsEl) cardsEl.innerHTML = "";
        if (connEl) while (connEl.firstChild) connEl.removeChild(connEl.firstChild);
        if (vp.spot) {
          vp.spot.root.remove();
          vp.spot = null;
        }
        if (popEl) popEl.hidden = true;
        vp.focus = null;
        vp.commentFor = null;
      }

      commentBtn.addEventListener("click", () => setInspect(!vp.inspect));
      completeBtn.addEventListener("click", vpComplete);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && vp.inspect) setInspect(false);
      });
      viewport.addEventListener("dragover", (ev) => {
        if (vp.proposals.length) ev.preventDefault();
      });
      viewport.addEventListener("drop", (ev) => {
        ev.preventDefault();
        let data = null;
        try {
          data = JSON.parse(ev.dataTransfer.getData("application/json"));
        } catch {}
        if (data) vpStage(data.elementId, data.variantId);
      });
      window.addEventListener("resize", () => vpRender());
      setInterval(vpPoll, 1500);
      vpPoll();

      refreshSimulators();
    </script>
  </body>
</html>
