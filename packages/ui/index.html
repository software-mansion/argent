<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argent Preview</title>
    <link rel="stylesheet" href="theme.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--color-bg);
        color: var(--color-fg);
        font-family: var(--font-sans);
        font-size: var(--fs-body);
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      /* Frameless window, no title bar / toolbar. Dragging is done by a
         full-bleed drag LAYER rather than #main itself: -webkit-app-region is
         "union of drag boxes minus no-drag boxes", so a full-cover no-drag layer
         (.cards) would cancel the entire region. The drag layer is:
           • inset a few px so the window's resize edges keep working (the top
             edge resizes, it does NOT drag),
           • pointer-events:none so clicks fall through to the stream/cards.
         Every interactive surface subtracts itself with no-drag. Crucially the
         .cards POSITIONING layer is NOT no-drag — only the real .vcard chips are,
         so the empty background between/around them stays draggable. Harmless in
         a browser, where the property is simply ignored. */
      .drag-region {
        position: absolute;
        inset: var(--resize-edge);
        pointer-events: none;
        -webkit-app-region: drag;
      }
      .stage,
      .vcard,
      .float-controls,
      .float-status,
      .footbar,
      .comment-pop,
      .ann-pop,
      .modal,
      .dev-picker {
        -webkit-app-region: no-drag;
      }
      /* Floating status pill (top-left). Hidden while idle; surfaces loading /
         error / disconnect messages without a permanent bar. */
      .float-status {
        position: absolute;
        top: var(--footbar-bottom);
        left: var(--footbar-right);
        display: flex;
        align-items: center;
        gap: var(--gap-list);
        z-index: var(--z-overlay);
      }
      .status {
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-pill);
        padding: var(--pad-pill);
        color: var(--color-muted);
        font-size: var(--fs-note);
        box-shadow: var(--shadow-card);
      }
      .status.error::before {
        content: "";
        display: inline-block;
        width: var(--dot-size);
        height: var(--dot-size);
        border-radius: var(--radius-round);
        margin-right: var(--gap-inline);
        vertical-align: middle;
        background: var(--color-error);
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--pad-view);
        min-height: 0;
        position: relative;
      }
      .stage {
        position: relative;
        max-width: 100%;
        max-height: 100%;
        display: flex;
      }
      /* While a card/chip is being dragged (#root.drag-muting, set by vpTick),
         the stream is inert so the drag never taps the device. */
      .drag-muting .stage {
        pointer-events: none;
      }
      .stage img {
        max-width: 100%;
        max-height: var(--stream-max-h);
        object-fit: contain;
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-stream);
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        touch-action: none;
        pointer-events: auto;
        cursor: crosshair;
      }
      /* Multi-touch indicators overlay on the image, positioned via CSS vars. */
      .touch-dot {
        position: absolute;
        top: var(--y);
        left: var(--x);
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        border-radius: var(--radius-round);
        background: var(--touch-fill);
        border: var(--border-strong) solid var(--touch-stroke);
        pointer-events: none;
        box-shadow: var(--touch-glow);
      }
      .touch-dot.pressed {
        background: var(--touch-fill-pressed);
      }
      .touch-dot.anchor {
        background: var(--touch-anchor-fill);
        border-color: var(--touch-anchor-stroke);
      }
      .empty,
      .error-box {
        color: var(--color-muted);
        text-align: center;
        padding: var(--pad-empty);
        max-width: var(--empty-max-width);
        line-height: var(--lh-normal);
      }
      .error-box {
        color: var(--color-error);
      }
      .dev-picker {
        display: flex;
        flex-direction: column;
        gap: var(--gap-stack);
        width: 100%;
        max-width: var(--picker-max-width);
        padding: var(--pad-picker);
      }
      .dev-picker h2 {
        margin: 0;
        font-size: var(--fs-title);
        font-weight: var(--fw-semibold);
        color: var(--color-fg);
        text-align: center;
      }
      .dev-picker .sub {
        margin: var(--sub-margin);
        font-size: var(--fs-note);
        color: var(--color-muted);
        text-align: center;
      }
      .dev-list {
        display: flex;
        flex-direction: column;
        gap: var(--gap-list);
      }
      .dev-item {
        display: flex;
        align-items: center;
        gap: var(--gap-bar);
        width: 100%;
        text-align: left;
        background: var(--color-surface);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-item);
        padding: var(--pad-item);
        font-size: var(--fs-body);
        cursor: pointer;
        transition:
          border-color var(--dur-hover) ease,
          background var(--dur-hover) ease,
          transform var(--dur-press) ease;
      }
      .dev-item:hover {
        border-color: var(--color-accent);
        background: var(--color-surface-hover);
      }
      .dev-item:active {
        transform: translateY(var(--press-shift));
      }
      .dev-item:disabled {
        cursor: not-allowed;
        opacity: var(--opacity-disabled);
      }
      .dev-item:disabled:hover {
        border-color: var(--color-border);
        background: var(--color-surface);
      }
      .dev-item .dot {
        width: var(--dot-size);
        height: var(--dot-size);
        border-radius: var(--radius-round);
        flex: none;
        background: var(--color-ok);
        box-shadow: var(--dot-glow);
      }
      .dev-item:disabled .dot {
        background: var(--color-muted);
        box-shadow: none;
      }
      .dev-item .nm {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .dev-item .rt {
        flex: none;
        color: var(--color-muted);
        font-size: var(--fs-label);
      }
      .dev-picker .refresh-row {
        display: flex;
        justify-content: center;
      }
      .dev-picker .refresh-row button {
        background: var(--color-bg);
        color: var(--color-muted);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-control);
        padding: var(--pad-refresh);
        font-size: var(--fs-note);
        cursor: pointer;
      }
      .dev-picker .refresh-row button:hover {
        color: var(--color-fg);
        border-color: var(--color-accent);
      }
      code {
        background: var(--color-surface);
        padding: var(--pad-code);
        border-radius: var(--radius-chip);
        font-size: var(--fs-note);
      }

      /* ── Variant proposals + inspector ─────────────────────────────── */
      [hidden] {
        display: none !important;
      }
      .main {
        flex: 1;
        display: flex;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }
      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--pad-view);
        min-height: 0;
        position: relative;
      }
      /* `.hidden-badge` surfaces proposals whose element isn't on screen and
         whose location is unknown (never matched). A floating accent pill so it
         reads as a signal (the user has things they can't see), not metadata. */
      .hidden-badge {
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-accent);
        border-radius: var(--radius-pill);
        padding: var(--pad-pill);
        color: var(--color-accent);
        font-size: var(--fs-note);
        font-weight: var(--fw-semibold);
        box-shadow: var(--shadow-card);
      }
      /* Floating top-right controls (Add comment, Close): larger pill buttons
         that sit over the stream, away from the slim drag-handle toolbar. */
      .float-controls {
        position: absolute;
        top: var(--footbar-bottom);
        right: var(--footbar-right);
        display: flex;
        gap: var(--gap-list);
        z-index: var(--z-overlay);
        -webkit-app-region: no-drag;
      }
      .float-btn {
        background: var(--color-surface);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-button);
        padding: var(--pad-complete);
        font-size: var(--fs-body);
        font-weight: var(--fw-bold);
        cursor: pointer;
        box-shadow: var(--shadow-card);
        white-space: nowrap;
      }
      .float-btn:hover {
        border-color: var(--color-accent);
      }
      .float-btn.active {
        background: var(--color-accent);
        color: var(--color-on-accent);
        border-color: var(--color-accent);
      }

      /* SVG layer for thin connector lines between cards and elements. */
      .connectors {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: var(--z-connectors);
      }
      .connectors path {
        fill: none;
        stroke: var(--color-accent);
        stroke-width: var(--connector-width);
        opacity: var(--opacity-connector);
      }
      .connectors circle {
        fill: var(--color-accent);
      }

      /* Floating variant cards, absolutely placed around the stream. */
      .cards {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: var(--z-cards);
      }

      /* Minimal off-screen reminder: when a variant element scrolls out of
         the device viewport its card fades away; these tiny non-interactive
         pills stay docked at the stream's top/bottom edge so the user keeps
         seeing that N choices still exist and which way to scroll. */
      .os-pill {
        position: absolute;
        z-index: var(--z-pop);
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: var(--gap-tight);
        padding: var(--pad-pill);
        font-size: var(--fs-label);
        font-weight: var(--fw-bold);
        color: var(--color-on-accent);
        background: var(--color-accent);
        border-radius: var(--radius-pill);
        box-shadow: var(--shadow-pill);
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--dur-pill) ease;
        white-space: nowrap;
      }
      .os-pill.show {
        opacity: var(--opacity-pill);
      }
      .vcard {
        position: absolute;
        width: var(--card-width);
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        pointer-events: auto;
        overflow: hidden;
        transform-origin: center center;
        /* left/top are JS spring-driven; scale+opacity pop via CSS. */
        transition:
          opacity var(--dur-card-in) ease,
          transform var(--dur-card-move) var(--ease-pop);
      }
      .vcard.gone {
        opacity: 0;
        transform: scale(var(--card-gone-scale));
        pointer-events: none;
      }
      .vcard-head {
        display: flex;
        align-items: center;
        gap: var(--gap-inline);
        padding: var(--pad-card-head);
        border-bottom: var(--border-hairline) solid var(--color-border);
        cursor: move;
        background: var(--color-surface-raised);
      }
      .vcard-head .dot {
        width: var(--card-dot-size);
        height: var(--card-dot-size);
        border-radius: var(--radius-round);
        background: var(--color-accent);
        flex-shrink: 0;
      }
      .vcard-head .nm {
        font-weight: var(--fw-semibold);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .vcard-head .where {
        margin-left: auto;
        font-size: var(--fs-tag);
        text-transform: uppercase;
        letter-spacing: var(--tracking-where);
        color: var(--color-muted);
        flex-shrink: 0;
      }
      .vcard-head .where.on {
        color: var(--color-ok);
      }
      .vcard-body {
        max-height: var(--vcard-body-max-h);
        overflow-y: auto;
        /* Hide the scrollbar so its appearance NEVER changes the body's content
           width. A space-taking scrollbar caused a perpetual resize loop: a
           preview sized to the full width pushes the body past max-height → the
           scrollbar appears → content width shrinks ~15px → applyThumbCrop (its
           cache key includes that width) re-fits the preview smaller → content
           fits → scrollbar disappears → width grows → re-fit bigger → … forever.
           Hidden = constant width = no loop, and no un-highlighted gutter strip
           on hovered rows. The body still scrolls by wheel/trackpad. */
        scrollbar-width: none;
      }
      .vcard-body::-webkit-scrollbar {
        display: none;
      }
      .vrow {
        display: flex;
        gap: var(--gap-list);
        padding: var(--pad-row);
        border-bottom: var(--border-hairline) solid var(--color-border);
        cursor: grab;
        user-select: none;
        /* Padding/gap/font/color animate together when a sibling gets
           staged (the :has() rule below collapses non-picked variants to
           a one-line summary). Without this transition the rows jumped
           into the tight layout instantly. */
        transition:
          padding var(--dur-card-move) var(--ease-out),
          gap var(--dur-card-move) var(--ease-out),
          font-size var(--dur-card-move) var(--ease-out),
          color var(--dur-card-move) var(--ease-out);
      }
      .vrow:last-child {
        border-bottom: 0;
      }
      .vrow:hover {
        background: var(--color-row-hover);
      }
      .vrow:active {
        cursor: grabbing;
      }
      .vrow.dragging {
        opacity: var(--opacity-disabled);
      }
      .vrow.staged {
        background: var(--color-row-staged);
      }
      /* DEMO: collapse-on-stage + non-selected image hiding are DISABLED.
         Staging a variant only tints its row (.vrow.staged above); the other
         variants stay full-size with their images visible. This removes the
         inner-layout collapse — and the card resize that was driving the
         never-ending bounce/jitter on selection — and the dead space left when
         images hid but rows didn't shrink. To re-enable, restore the
         `:has(.vrow.staged) .vrow:not(.staged)` collapse + `.thumb` hide rules. */
      /* Wide/square previews read better stacked (image above text); only
         clearly-portrait previews keep the side-by-side row. */
      .vrow.col {
        flex-direction: column;
      }
      .vrow.col .thumb {
        align-self: center;
      }
      .vrow .thumb {
        position: relative;
        width: var(--thumb-size);
        height: var(--thumb-size);
        flex-shrink: 0;
        border-radius: var(--radius-control);
        border: var(--border-hairline) solid var(--color-border);
        overflow: hidden;
        background: var(--color-thumb-bg);
        transition:
          width var(--dur-card-move) var(--ease-out),
          height var(--dur-card-move) var(--ease-out),
          border-width var(--dur-card-move) var(--ease-out),
          opacity var(--dur-fade) ease;
      }
      .vrow .thumb-img {
        position: absolute;
        top: 0;
        left: 0;
        max-width: none;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }
      .vrow .thumb.placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-muted);
        font-size: var(--fs-mini);
        text-align: center;
      }
      .vrow .meta {
        min-width: 0;
        flex: 1;
      }
      .vrow .vn {
        font-weight: var(--fw-semibold);
        display: flex;
        align-items: center;
        gap: var(--gap-inline);
      }
      .vrow .vn .tag {
        font-size: var(--fs-tag);
        color: var(--color-ok);
      }
      .vcard-cmt {
        width: 100%;
        background: var(--color-bg);
        color: var(--color-fg);
        border: 0;
        border-top: var(--border-hairline) solid var(--color-border);
        padding: var(--pad-cmt);
        font: inherit;
        font-size: var(--fs-label);
        /* No manual resize: card height is column-packed in layoutCards.
           Dragging this resize handle used to grow the card and force
           neighbouring cards in the same column to compress to make room. */
        resize: none;
        min-height: var(--cmt-min-h);
      }

      /* Element-inspector spotlight: ONE blur+dim layer over the stream with
         a rectangular hole punched by clip-path (even-odd). A single element
         (not 4 strips) → zero overlap, so no compounding dark/bright shapes
         flicker as the cutout moves. The donut path keeps a constant segment
         structure so the clip-path transition interpolates smoothly. */
      .spot {
        position: absolute;
        background: var(--spotlight-scrim);
        backdrop-filter: blur(var(--backdrop-blur));
        -webkit-backdrop-filter: blur(var(--backdrop-blur));
        pointer-events: none;
        will-change: clip-path;
        transition:
          clip-path var(--dur-spot) var(--ease-out),
          opacity var(--dur-fade) ease;
      }
      .spot-ring {
        position: absolute;
        border: var(--border-strong) solid var(--color-accent);
        border-radius: var(--radius-control);
        box-shadow: var(--ring-outline);
        pointer-events: none;
        /* Match .spot's clip-path transition exactly (same duration + same
           easing) so the ring and the no-blur hole move in perfect lockstep.
           A different curve/duration here makes the ring overshoot and bounce
           while the hole glides, which reads as the ring lagging the hole. */
        transition:
          left var(--dur-spot) var(--ease-out),
          top var(--dur-spot) var(--ease-out),
          width var(--dur-spot) var(--ease-out),
          height var(--dur-spot) var(--ease-out);
      }
      .spot-ring .lab {
        position: absolute;
        top: var(--lab-top);
        left: 0;
        background: var(--color-accent);
        color: var(--color-on-accent);
        font-size: var(--fs-label);
        font-weight: var(--fw-bold);
        padding: var(--pad-lab);
        border-radius: var(--radius-control);
        white-space: nowrap;
        max-width: var(--lab-max-width);
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .spot-hit {
        position: absolute;
        cursor: crosshair;
        z-index: var(--z-spot-hit);
        /* The spotlight root sets pointer-events:none; this capture layer must
           opt back in or hover/click never reaches it and nothing un-blurs. */
        pointer-events: auto;
      }
      .inspecting .stage img {
        cursor: crosshair;
      }

      /* Comment box bubble anchored next to the inspected element. */
      .comment-pop {
        position: absolute;
        z-index: var(--z-pop);
        width: var(--comment-pop-width);
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-pop);
        padding: var(--pad-pop);
      }
      .comment-pop h3 {
        margin: 0 0 var(--comment-title-gap);
        font-size: var(--fs-note);
        font-weight: var(--fw-semibold);
      }
      .comment-pop h3 span {
        color: var(--color-accent);
      }
      .comment-pop textarea {
        width: 100%;
        background: var(--color-bg);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-input);
        padding: var(--pad-input);
        font: inherit;
        font-size: var(--fs-note);
        resize: vertical;
        min-height: var(--textarea-min-h);
      }
      .comment-pop .row {
        display: flex;
        gap: var(--gap-inline);
        margin-top: var(--gap-list);
      }
      .comment-pop button {
        flex: 1;
        border: 0;
        border-radius: var(--radius-input);
        padding: var(--pad-btn);
        font-size: var(--fs-note);
        font-weight: var(--fw-semibold);
        cursor: pointer;
      }
      .comment-pop .save {
        background: var(--color-accent);
        color: var(--color-on-accent);
      }
      .comment-pop .cancel {
        background: var(--color-border);
        color: var(--color-fg);
      }

      /* Saved-annotation pin shown on its element. */
      .ann-pin {
        position: absolute;
        transform: translate(-50%, -50%);
        width: var(--pin-size);
        height: var(--pin-size);
        border-radius: var(--radius-round) var(--radius-round) var(--radius-round)
          var(--radius-pin-tail);
        background: var(--color-pin-bg);
        color: var(--color-pin-fg);
        font-size: var(--fs-label);
        font-weight: var(--fw-extrabold);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-pin);
        pointer-events: auto;
        cursor: help;
        z-index: var(--z-pin);
      }

      /* Review popover for a saved annotation — fades/slides in right above
         its pin (replaces the old native confirm()). */
      .ann-pop {
        position: absolute;
        z-index: var(--z-overlay);
        width: var(--annpop-width);
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-pop);
        padding: var(--pad-pop);
        transform-origin: 50% 100%;
        transform: translate(-50%, calc(-100% - var(--annpop-gap)));
        opacity: 0;
        pointer-events: none;
        transition:
          opacity var(--dur-fade) ease,
          transform var(--dur-fade) var(--ease-out);
      }
      .ann-pop.show {
        transform: translate(-50%, calc(-100% - var(--annpop-gap-show)));
        opacity: 1;
        pointer-events: auto;
      }
      .ann-pop h4 {
        margin: 0 0 var(--gap-inline);
        font-size: var(--fs-label);
        font-weight: var(--fw-bold);
        color: var(--color-accent);
        text-transform: uppercase;
        letter-spacing: var(--tracking-label);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ann-pop .txt {
        font-size: var(--fs-read);
        line-height: var(--lh-snug);
        color: var(--color-fg);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: var(--annpop-txt-max-h);
        overflow: auto;
      }
      .ann-pop textarea {
        width: 100%;
        background: var(--color-bg);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-input);
        padding: var(--pad-input);
        font: inherit;
        font-size: var(--fs-note);
        resize: vertical;
        min-height: var(--textarea-min-h);
      }
      .ann-pop .row {
        display: flex;
        gap: var(--gap-inline);
        margin-top: var(--annrow-mt);
      }
      .ann-pop button {
        flex: 1;
        border: 0;
        border-radius: var(--radius-input);
        padding: var(--pad-btn);
        font-size: var(--fs-note);
        font-weight: var(--fw-semibold);
        cursor: pointer;
      }
      .ann-pop .edit {
        background: var(--color-accent);
        color: var(--color-on-accent);
      }
      .ann-pop .del,
      .clear-btn {
        background: var(--color-bg);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
      }
      .ann-pop .del:hover,
      .clear-btn:hover {
        border-color: var(--color-error);
        color: var(--color-error);
      }
      .ann-pop .cancel {
        background: var(--color-border);
        color: var(--color-fg);
      }

      /* Bottom-right action stack: comment textarea on top, complete button beneath. */
      .footbar {
        position: absolute;
        right: var(--footbar-right);
        bottom: var(--footbar-bottom);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: var(--gap-list);
        background: var(--footbar-bg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-card);
        padding: var(--pad-footbar);
        box-shadow: var(--shadow-card);
        z-index: var(--z-overlay);
        max-width: var(--footbar-max-width);
      }
      .footbar textarea {
        background: var(--color-bg);
        color: var(--color-fg);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-input);
        padding: var(--pad-footbar-input);
        font: inherit;
        font-size: var(--fs-note);
        resize: none;
        width: var(--footbar-input-width);
      }
      .footbar .btn-row {
        display: flex;
        gap: var(--gap-list);
      }
      .footbar .btn-row > button {
        flex: 1;
      }
      .complete-btn,
      .clear-btn {
        border-radius: var(--radius-button);
        padding: var(--pad-complete);
        font-size: var(--fs-body);
        font-weight: var(--fw-bold);
        cursor: pointer;
        white-space: nowrap;
      }
      .complete-btn {
        background: var(--color-accent);
        color: var(--color-on-accent);
        border: 0;
      }
      .complete-btn:disabled {
        background: var(--color-border);
        color: var(--color-muted);
        cursor: not-allowed;
      }
      .complete-note {
        color: var(--color-muted);
        font-size: var(--fs-label);
        max-width: var(--complete-note-max-width);
      }
      .complete-note.ok {
        color: var(--color-ok);
      }
      .complete-note.err {
        color: var(--color-error);
      }

      /* Confirm modal — shared backstop for destructive actions (Remove, Clear). */
      .modal {
        position: fixed;
        inset: 0;
        background: var(--spotlight-scrim);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: var(--z-modal);
      }
      .modal[hidden] {
        display: none;
      }
      .modal-card {
        background: var(--color-surface);
        border: var(--border-hairline) solid var(--color-border);
        border-radius: var(--radius-card);
        padding: var(--pad-modal);
        max-width: var(--modal-max-width);
        box-shadow: var(--shadow-pop);
      }
      .modal-msg {
        margin: 0 0 var(--gap-stack);
        color: var(--color-fg);
        font-size: var(--fs-body);
        line-height: var(--lh-snug);
      }
      .modal .row {
        display: flex;
        gap: var(--gap-list);
        justify-content: flex-end;
      }
      .modal button {
        border: 0;
        border-radius: var(--radius-button);
        padding: var(--pad-btn);
        font-size: var(--fs-body);
        font-weight: var(--fw-semibold);
        cursor: pointer;
      }
      .modal .cancel {
        background: var(--color-border);
        color: var(--color-fg);
      }
      .modal .confirm {
        background: var(--color-danger-bg);
        color: var(--color-danger-fg);
      }

      /* Post-submit confirmation card — centred above everything, fades and
         pops in via --ease-pop, then either auto-dismisses (browser mode) or
         is overrun by the Electron window's close-squeeze. */
      .success-toast {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: var(--z-modal);
      }
      .success-toast[hidden] {
        display: none;
      }
      .success-toast .success-card {
        background: var(--color-ok);
        color: var(--color-on-accent);
        padding: var(--pad-modal) calc(var(--pad-modal) * 1.6);
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-pop);
        display: flex;
        align-items: center;
        gap: var(--gap-stack);
        opacity: 0;
        transform: scale(0.82);
        transition:
          opacity var(--dur-fade) ease,
          transform var(--dur-card-in) var(--ease-pop);
      }
      .success-toast.show .success-card {
        opacity: 1;
        transform: scale(1);
      }
      .success-toast .success-icon {
        font-size: 26px;
        font-weight: var(--fw-extrabold);
        line-height: 1;
      }
      .success-toast .success-text {
        font-size: var(--fs-title);
        font-weight: var(--fw-bold);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="main" id="main">
        <!-- Window drag handle: a full-bleed, click-through layer behind the
             content. See .drag-region in the stylesheet. -->
        <div class="drag-region"></div>
        <div class="viewport" id="viewport">
          <div class="empty">Loading simulators…</div>
        </div>
        <svg class="connectors" id="connectors" aria-hidden="true"></svg>
        <div class="cards" id="cards"></div>
        <div class="os-pill" id="os-top"></div>
        <div class="os-pill" id="os-bot"></div>
        <div class="comment-pop" id="comment-pop" hidden></div>
        <div class="ann-pop" id="ann-pop" hidden></div>
        <div class="float-status" id="float-status">
          <span id="status" class="status" hidden></span>
          <span id="hidden-badge" class="hidden-badge" hidden></span>
        </div>
        <div class="float-controls" id="float-controls">
          <button id="comment-btn" class="float-btn" hidden>＋ Add comment</button>
          <button id="close-btn" class="float-btn" title="Close preview window">✕ Close</button>
        </div>
        <div class="footbar" id="footbar" hidden>
          <textarea
            id="global-comment"
            rows="4"
            placeholder="Overall comment for the agent (optional)…"></textarea>
          <div class="btn-row">
            <button class="complete-btn" id="complete-btn">Complete</button>
            <button class="clear-btn" id="clear-btn">Clear</button>
          </div>
          <span class="complete-note" id="complete-note"></span>
        </div>
        <div class="modal" id="confirm-modal" hidden>
          <div class="modal-card">
            <p class="modal-msg" id="confirm-msg"></p>
            <div class="row">
              <button class="cancel" id="confirm-cancel">Cancel</button>
              <button class="confirm" id="confirm-yes">Confirm</button>
            </div>
          </div>
        </div>
        <div class="success-toast" id="success-toast" hidden>
          <div class="success-card">
            <span class="success-icon" aria-hidden="true">✓</span>
            <span class="success-text" id="success-text">Selection sent</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      "use strict";

      // ── Config ──────────────────────────────────────────────────────────
      // Tool-server base URL. When this page is served by tool-server itself,
      // same-origin is correct. Override via ?toolServer=http://host:port for
      // standalone testing.
      const urlParams = new URLSearchParams(window.location.search);
      const TOOL_SERVER =
        urlParams.get("toolServer") ||
        (window.location.origin.startsWith("http")
          ? window.location.origin
          : "http://127.0.0.1:3001");

      // ── Theme bridge ───────────────────────────────────────────────────
      // Visual + motion *feel* lives in theme.css (the single source). The few
      // values the physics/timing JS needs are read from there once at boot,
      // so there is still no hardcoded look/feel in this script. Fallbacks
      // equal the prior literals, so a missing/unloaded theme.css cannot
      // change behaviour.
      const cssNum = (name, fallback) => {
        const raw = getComputedStyle(document.documentElement).getPropertyValue(name);
        const n = parseFloat(raw);
        return Number.isFinite(n) ? n : fallback;
      };
      const THEME = {
        bubbleOmega: cssNum("--spring-bubble-omega", 4.2),
        bubbleZeta: cssNum("--spring-bubble-zeta", 0.9),
        tightOmega: cssNum("--spring-tight-omega", 26),
        tightZeta: cssNum("--spring-tight-zeta", 1),
        goneGraceMs: cssNum("--card-gone-grace-ms", 550),
        pollMs: cssNum("--poll-interval-ms", 1200),
        treeStaleMs: cssNum("--tree-stale-ms", 6000),
        flickMaxVel: cssNum("--flick-max-vel", 1500),
        cardWidth: cssNum("--card-width", 232),
        spotIdleMs: cssNum("--spot-idle-dismiss-ms", 150),
        spotTrajWindowMs: cssNum("--spot-traj-window-ms", 80),
        spotTrajStoppedSpeed: cssNum("--spot-traj-stopped-speed", 0.05),
        spotTrajReach: cssNum("--spot-traj-reach", 0.5),
        spotTrajHitboxMargin: cssNum("--spot-traj-hitbox-margin", 0.2),
        spotMaxFrameArea: cssNum("--spot-max-frame-area", 0.85),
        annpopGraceMs: cssNum("--annpop-hover-grace-ms", 280),
        successToastShowMs: cssNum("--success-toast-show-ms", 1200),
      };

      // Browser KeyboardEvent.code → USB HID Keyboard Usage Page (0x07) keycode.
      // sim-server's `key` command expects these raw HID codes — shift/modifier
      // state is conveyed by the browser issuing separate ShiftLeft/ShiftRight
      // key events which we forward verbatim.
      const HID = {
        KeyA: 4,
        KeyB: 5,
        KeyC: 6,
        KeyD: 7,
        KeyE: 8,
        KeyF: 9,
        KeyG: 10,
        KeyH: 11,
        KeyI: 12,
        KeyJ: 13,
        KeyK: 14,
        KeyL: 15,
        KeyM: 16,
        KeyN: 17,
        KeyO: 18,
        KeyP: 19,
        KeyQ: 20,
        KeyR: 21,
        KeyS: 22,
        KeyT: 23,
        KeyU: 24,
        KeyV: 25,
        KeyW: 26,
        KeyX: 27,
        KeyY: 28,
        KeyZ: 29,
        Digit1: 30,
        Digit2: 31,
        Digit3: 32,
        Digit4: 33,
        Digit5: 34,
        Digit6: 35,
        Digit7: 36,
        Digit8: 37,
        Digit9: 38,
        Digit0: 39,
        Enter: 40,
        Escape: 41,
        Backspace: 42,
        Tab: 43,
        Space: 44,
        Minus: 45,
        Equal: 46,
        BracketLeft: 47,
        BracketRight: 48,
        Backslash: 49,
        Semicolon: 51,
        Quote: 52,
        Backquote: 53,
        Comma: 54,
        Period: 55,
        Slash: 56,
        CapsLock: 57,
        F1: 58,
        F2: 59,
        F3: 60,
        F4: 61,
        F5: 62,
        F6: 63,
        F7: 64,
        F8: 65,
        F9: 66,
        F10: 67,
        F11: 68,
        F12: 69,
        ArrowRight: 79,
        ArrowLeft: 80,
        ArrowDown: 81,
        ArrowUp: 82,
        NumpadDivide: 84,
        NumpadMultiply: 85,
        NumpadSubtract: 86,
        NumpadAdd: 87,
        NumpadEnter: 88,
        Numpad1: 89,
        Numpad2: 90,
        Numpad3: 91,
        Numpad4: 92,
        Numpad5: 93,
        Numpad6: 94,
        Numpad7: 95,
        Numpad8: 96,
        Numpad9: 97,
        Numpad0: 98,
        NumpadDecimal: 99,
        ControlLeft: 224,
        ShiftLeft: 225,
        AltLeft: 226,
        MetaLeft: 227,
        ControlRight: 228,
        ShiftRight: 229,
        AltRight: 230,
        MetaRight: 231,
        IntlBackslash: 86,
      };
      const CAPS_LOCK_HID = 57;

      // Multi-touch modifier — matches radon-ide: Alt on macOS, Ctrl elsewhere.
      const IS_MAC = /Mac|iPhone|iPad/.test(navigator.platform);
      const MULTITOUCH_CODES = IS_MAC
        ? new Set(["AltLeft", "AltRight"])
        : new Set(["ControlLeft", "ControlRight"]);

      // ── DOM ─────────────────────────────────────────────────────────────
      const status = document.getElementById("status");
      const viewport = document.getElementById("viewport");
      // Device the window was opened for (?udid=…), set by the tool-server from
      // the agent's propose_variant. When present we connect straight to it and
      // never show a simulator chooser.
      const initialUdid = urlParams.get("udid");

      // ── State ───────────────────────────────────────────────────────────
      /** @type {WebSocket | null} */
      let ws = null;
      let wsOpen = false;
      let currentUdid = null;
      let img = null;
      let stage = null;
      /** Elements for the three multi-touch indicators (primary / mirror / anchor). */
      let touchDots = { primary: null, mirror: null, anchor: null };
      let activePointerId = null;
      /** True while the mouse button is held inside the stage (finger is "down"). */
      let isPressing = false;
      /** True while the multi-touch modifier is held. */
      let isMultiTouching = false;
      /** Primary and anchor points in normalized [0,1] space. */
      let touchPoint = { x: 0.5, y: 0.5 };
      let anchorPoint = { x: 0.5, y: 0.5 };
      /** Keys currently held down (HID codes) — released on blur. */
      const pressedKeys = new Set();
      /** Last known CapsLock state to resync iOS if it drifts. */
      let lastCapsLockState = false;
      let cmdCounter = 0;
      /** Trailing-debounce state for wheel scrolling (see attachInputHandlers). */
      let wheelTimer = null;
      let wheelPt = null;
      let wheelDX = 0;
      let wheelDY = 0;

      // ── Helpers ─────────────────────────────────────────────────────────
      function setStatus(text, kind = "") {
        status.textContent = text;
        status.className = "status" + (kind ? " " + kind : "");
        // The status is a floating pill now — keep it out of the way unless
        // there is something worth showing (loading / error / disconnect).
        status.hidden = !text || text === "idle";
      }

      function nextCmdId() {
        return String(++cmdCounter);
      }

      function sendCmd(obj) {
        if (!ws || !wsOpen) return;
        // While the element-comment inspector is active the stream is a
        // read-only annotation surface — never drive the device.
        if (typeof vp !== "undefined" && vp.inspect) return;
        ws.send(JSON.stringify({ id: nextCmdId(), ...obj }));
        // Every command (touch/scroll/key) likely moved the screen — wake the
        // describe loop *now* so connectors/pins track interaction, not just
        // the fixed cadence. Only when something is actually anchored to the
        // stream, else it would needlessly collapse the idle wait.
        // kickDescribe() is hoisted + self-throttled.
        if (vp.proposals.length || vp.annotations.length) kickDescribe();
      }

      /**
       * Convert a pointer/mouse/wheel event (in client coords) into the
       * normalized 0.0–1.0 device space the simulator-server expects.
       */
      function toDeviceCoords(ev) {
        if (!img) return null;
        const rect = img.getBoundingClientRect();
        if (!rect.width || !rect.height) return null;
        const xRatio = (ev.clientX - rect.left) / rect.width;
        const yRatio = (ev.clientY - rect.top) / rect.height;
        return {
          x: Math.max(0, Math.min(1, xRatio)),
          y: Math.max(0, Math.min(1, yRatio)),
        };
      }

      function mirrorAround(pt, anchor) {
        return {
          x: Math.max(0, Math.min(1, 2 * anchor.x - pt.x)),
          y: Math.max(0, Math.min(1, 2 * anchor.y - pt.y)),
        };
      }

      /**
       * sim-server wheel deltas are small integers (~3–7). Browser deltaY can be
       * anything from 0.001 to 400+, so we clamp by magnitude the way radon-ide
       * does. Sign is negated so scroll direction matches iOS natural-scroll.
       */
      function normalizeWheel(delta) {
        const abs = Math.abs(delta);
        const magnitude = abs > 150 ? 7 : abs > 50 ? 5 : 3;
        return -Math.sign(delta) * magnitude;
      }

      function sendTouchEvent(type) {
        if (isMultiTouching) {
          const secondary = mirrorAround(touchPoint, anchorPoint);
          sendCmd({
            cmd: "touch",
            type,
            x: touchPoint.x,
            y: touchPoint.y,
            second_x: secondary.x,
            second_y: secondary.y,
          });
        } else {
          sendCmd({ cmd: "touch", type, x: touchPoint.x, y: touchPoint.y });
        }
      }

      // ── Multi-touch indicators ─────────────────────────────────────────
      function updateIndicators() {
        if (!stage) return;
        if (!isMultiTouching) {
          for (const k of ["primary", "mirror", "anchor"]) {
            if (touchDots[k]) touchDots[k].remove();
            touchDots[k] = null;
          }
          return;
        }
        const mirror = mirrorAround(touchPoint, anchorPoint);
        ensureDot("primary", touchPoint, 28, false);
        ensureDot("mirror", mirror, 28, false);
        ensureDot("anchor", anchorPoint, 10, true);
      }
      function ensureDot(key, pt, size, isAnchor) {
        const imgRect = img.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        // Position relative to the stage, inside the image area.
        const offsetX = imgRect.left - stageRect.left;
        const offsetY = imgRect.top - stageRect.top;
        const x = offsetX + pt.x * imgRect.width;
        const y = offsetY + pt.y * imgRect.height;
        let el = touchDots[key];
        if (!el) {
          el = document.createElement("div");
          el.className = "touch-dot" + (isAnchor ? " anchor" : "");
          stage.appendChild(el);
          touchDots[key] = el;
        }
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--size", `${size}px`);
        el.classList.toggle("pressed", isPressing && !isAnchor);
      }

      // ── Simulator list ─────────────────────────────────────────────────
      // Device chooser rendered into the main viewport when there are multiple
      // booted simulators (or none) and nothing is connected yet. Replaces the
      // old static "Connecting…" placeholder, which looked stuck because the
      // only way to pick was a small toolbar dropdown that was easy to miss.
      function renderDevicePicker(sims) {
        const booted = sims.filter((s) => s.state === "Booted");
        const others = sims.filter((s) => s.state !== "Booted");

        const wrap = document.createElement("div");
        wrap.className = "dev-picker";

        const h = document.createElement("h2");
        h.textContent = booted.length ? "Choose a simulator" : "No booted simulators";
        wrap.appendChild(h);

        const sub = document.createElement("div");
        sub.className = "sub";
        sub.textContent = booted.length
          ? `${booted.length} booted device${booted.length === 1 ? "" : "s"} available`
          : "Boot a simulator, then refresh.";
        wrap.appendChild(sub);

        const addList = (items, disabled) => {
          if (!items.length) return;
          const list = document.createElement("div");
          list.className = "dev-list";
          for (const s of items) {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "dev-item";
            b.disabled = disabled;
            if (disabled) b.title = "Not booted — boot it first";
            const dot = document.createElement("span");
            dot.className = "dot";
            const nm = document.createElement("span");
            nm.className = "nm";
            nm.textContent = s.name;
            const rt = document.createElement("span");
            rt.className = "rt";
            rt.textContent = disabled ? s.state || "" : s.runtime || "";
            b.append(dot, nm, rt);
            if (!disabled) {
              b.addEventListener("click", () => {
                b.blur();
                connect(s.udid).catch((err) => setStatus(String(err.message || err), "error"));
              });
            }
            list.appendChild(b);
          }
          wrap.appendChild(list);
        };
        addList(booted, false);
        addList(others, true);

        const row = document.createElement("div");
        row.className = "refresh-row";
        const rb = document.createElement("button");
        rb.type = "button";
        rb.textContent = "⟳ Refresh";
        rb.addEventListener("click", () => {
          rb.blur();
          refreshSimulators();
        });
        row.appendChild(rb);
        wrap.appendChild(row);

        viewport.innerHTML = "";
        viewport.appendChild(wrap);
      }

      async function refreshSimulators() {
        setStatus("loading simulators…");
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/simulators`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { simulators } = await res.json();
          const all = simulators || [];
          const booted = all.filter((s) => s.state === "Booted");

          // Exactly one usable simulator → connect to it directly.
          if (booted.length === 1) {
            setStatus("idle");
            if (currentUdid !== booted[0].udid) {
              connect(booted[0].udid).catch((err) =>
                setStatus(String(err.message || err), "error")
              );
            }
            return;
          }

          // Zero or multiple booted and nothing live yet → in-viewport device
          // picker. This is only a fallback: normally the window is opened for a
          // specific ?udid and connects without ever reaching here. Don't
          // clobber an active stream when ⟳ is pressed while connected.
          setStatus(
            booted.length ? "choose a device" : "no booted simulators",
            booted.length ? "" : "error"
          );
          if (!currentUdid) renderDevicePicker(all);
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
        }
      }

      // ── Stream + WS wiring ─────────────────────────────────────────────
      function teardownStream() {
        releaseAllInput();
        if (ws) {
          try {
            ws.close();
          } catch {}
          ws = null;
        }
        wsOpen = false;
        // No live stream → no current device. Prevents the describe loop from
        // firing one stale GET /preview/describe/<oldUdid> after teardown.
        currentUdid = null;
        describeWarmupPending = false;
        // Explicitly clear the img src — otherwise the browser keeps the MJPEG
        // HTTP connection open after the element is detached, and re-selecting
        // a simulator leaks more connections. Same trick radon-ide uses.
        if (img) {
          img.src = "";
          img.removeAttribute("src");
        }
        img = null;
        stage = null;
        touchDots = { primary: null, mirror: null, anchor: null };
        viewport.innerHTML = "";
        // Overlay DOM lived inside `stage` (just wiped) — drop detached refs.
        vpResetOverlay();
      }

      async function connect(udid) {
        teardownStream();
        currentUdid = udid;
        // Warm the describe pipeline in the background: the first /describe on
        // iOS AX or Android uiautomator cold-starts the platform service and
        // can take several seconds, which the user would otherwise pay on
        // their first right-click. Triggering it now lets it run in parallel
        // with stream setup, so the tree is usually already in vp.tree by the
        // time the user reaches for an element.
        describeWarmupPending = true;
        describeOnce();
        setStatus("starting simulator-server…");
        viewport.innerHTML = '<div class="empty">Starting simulator-server…</div>';
        let info;
        try {
          const res = await fetch(
            `${TOOL_SERVER}/preview/simulator-server/${encodeURIComponent(udid)}`
          );
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          info = await res.json();
        } catch (err) {
          setStatus(`failed: ${err.message || err}`, "error");
          viewport.innerHTML = `<div class="error-box">Could not start simulator-server.<br/>${escapeHtml(String(err.message || err))}</div>`;
          return;
        }

        if (!info.streamUrl) {
          setStatus("no stream URL", "error");
          viewport.innerHTML =
            '<div class="error-box">Simulator-server is running but did not advertise a stream URL.<br/>Rebuild it with the <code>streaming</code> cargo feature enabled.</div>';
          return;
        }

        // Build the viewport.
        stage = document.createElement("div");
        stage.className = "stage";
        img = document.createElement("img");
        img.alt = `Simulator ${udid.slice(0, 8)}`;
        img.draggable = false;
        // Append a cache-buster so re-connects don't reuse a stale MJPEG stream.
        img.src = `${info.streamUrl}?t=${Date.now()}`;
        img.onerror = () => setStatus("stream error", "error");
        stage.appendChild(img);
        viewport.innerHTML = "";
        viewport.appendChild(stage);

        attachInputHandlers(img);

        // Open WebSocket to sim-server.
        ws = new WebSocket(info.wsUrl);
        ws.onopen = () => {
          wsOpen = true;
          setStatus("");
        };
        ws.onclose = () => {
          wsOpen = false;
          if (currentUdid === udid) setStatus("disconnected", "error");
        };
        ws.onerror = () => {
          setStatus("ws error", "error");
        };
      }

      // ── Input handlers ─────────────────────────────────────────────────
      /**
       * Release any held touch/keys. Called on teardown and on window blur —
       * without this, losing focus mid-drag (or Cmd-tabbing with Shift held)
       * leaves the device stuck with a phantom touch / modifier.
       */
      function releaseAllInput() {
        if (isPressing) {
          sendTouchEvent("Up");
          isPressing = false;
        }
        isMultiTouching = false;
        updateIndicators();
        for (const code of pressedKeys) {
          sendCmd({ cmd: "key", direction: "Up", code });
        }
        pressedKeys.clear();
        activePointerId = null;
        // Drop any pending trailing wheel flush so a scroll can't fire into a
        // torn-down / blurred stream after the fact.
        if (wheelTimer) {
          clearTimeout(wheelTimer);
          wheelTimer = null;
        }
      }

      function attachInputHandlers(target) {
        target.addEventListener("dragstart", (ev) => ev.preventDefault());

        target.addEventListener("pointerdown", (ev) => {
          // Mute the device while a floating card (or a variant chip) is being
          // dragged: a drag that crosses or is released over the stream must
          // never register as a tap on the simulator. Blocking the Down here is
          // enough — Move/Up only fire once a Down has armed `isPressing`.
          if (vp.cardDragging || vp.dragging) return;
          // Only the primary button drives the device. Right-click (button 2)
          // is reserved for the comment-popover shortcut handled in the
          // window-level `contextmenu` listener; middle-click is ignored too.
          if (ev.button !== 0) return;
          if (activePointerId !== null) return;
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          activePointerId = ev.pointerId;
          try {
            target.setPointerCapture(ev.pointerId);
          } catch {}
          touchPoint = pt;
          isPressing = true;
          sendTouchEvent("Down");
          updateIndicators();
          ev.preventDefault();
        });
        target.addEventListener("pointermove", (ev) => {
          const pt = toDeviceCoords(ev);
          if (!pt) return;
          // Shift + Multi-touch + drag → move the anchor point along with the finger.
          if (isMultiTouching && ev.shiftKey) {
            anchorPoint = {
              x: Math.max(0, Math.min(1, anchorPoint.x + (pt.x - touchPoint.x))),
              y: Math.max(0, Math.min(1, anchorPoint.y + (pt.y - touchPoint.y))),
            };
          }
          touchPoint = pt;
          if (ev.pointerId === activePointerId && isPressing) {
            sendTouchEvent("Move");
          }
          updateIndicators();
          ev.preventDefault();
        });
        const endPointer = (ev) => {
          if (ev.pointerId !== activePointerId) return;
          const pt = toDeviceCoords(ev);
          if (pt) touchPoint = pt;
          if (isPressing) sendTouchEvent("Up");
          isPressing = false;
          try {
            target.releasePointerCapture(ev.pointerId);
          } catch {}
          activePointerId = null;
          updateIndicators();
          ev.preventDefault();
        };
        target.addEventListener("pointerup", endPointer);
        target.addEventListener("pointercancel", endPointer);

        // Mouse leaves the image while dragging — commit an Up so the device
        // doesn't stay stuck. If the user drags back in with the button still
        // held, pointerenter (re)starts a Down at the entry point.
        target.addEventListener("pointerleave", (ev) => {
          if (isPressing) {
            sendTouchEvent("Up");
            isPressing = false;
            updateIndicators();
          }
        });
        target.addEventListener("pointerenter", (ev) => {
          // Only auto-resume if the button is still held (buttons bitmask).
          if (ev.buttons & 1 && !isPressing) {
            const pt = toDeviceCoords(ev);
            if (pt) {
              touchPoint = pt;
              isPressing = true;
              sendTouchEvent("Down");
              updateIndicators();
            }
          }
        });

        // A single trackpad scrub emits a long flood of wheel events (incl. a
        // ~1–2s macOS momentum tail). sim-server turns *each* wheel command into
        // a ~400ms swipe driven to the screen edge, so forwarding the whole
        // flood makes one flick scroll "forever". Mirror radon-ide: swallow the
        // burst and emit ONE wheel command 100ms after it settles.
        target.addEventListener(
          "wheel",
          (ev) => {
            ev.preventDefault();
            const pt = toDeviceCoords(ev);
            if (!pt) return;
            wheelPt = pt;
            wheelDX = ev.deltaX;
            wheelDY = ev.deltaY;
            if (wheelTimer) clearTimeout(wheelTimer);
            wheelTimer = setTimeout(() => {
              wheelTimer = null;
              const dx = normalizeWheel(wheelDX);
              const dy = normalizeWheel(wheelDY);
              if ((dx !== 0 || dy !== 0) && wheelPt) {
                sendCmd({ cmd: "wheel", x: wheelPt.x, y: wheelPt.y, dx, dy });
              }
            }, 100);
          },
          { passive: false }
        );
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
        );
      }

      // ── Events ──────────────────────────────────────────────────────────
      // Close button: ask the tool-server to dismiss the Electron window (it
      // owns the window lifecycle over stdin, so it plays the close animation
      // and quits the host cleanly — more reliable than renderer window.close()
      // under the sandboxed BrowserWindow).
      const closeBtn = document.getElementById("close-btn");
      closeBtn.addEventListener("click", () => {
        closeBtn.blur();
        fetch(`${TOOL_SERVER}/preview/close`, { method: "POST" }).catch(() => {});
      });

      // Global keyboard forwarding — active whenever a simulator is connected
      // and focus is not on a toolbar control. We forward raw keydown/keyup so
      // the simulator sees modifier keys (Shift, Ctrl, etc.) as real key events.
      function shouldForwardKey(ev) {
        if (!wsOpen) return false;
        const ae = document.activeElement;
        if (
          ae &&
          (ae.tagName === "SELECT" ||
            ae.tagName === "BUTTON" ||
            ae.tagName === "INPUT" ||
            ae.tagName === "TEXTAREA" ||
            ae.isContentEditable)
        ) {
          return false;
        }
        // Let the browser keep its own shortcuts (Cmd+R, Cmd+T, Cmd+W, Cmd+L, …).
        if (ev.metaKey && ev.code !== "MetaLeft" && ev.code !== "MetaRight") return false;
        return true;
      }

      /**
       * Sync CapsLock state to the device. Browser only fires keydown when
       * CapsLock turns on and keyup when it turns off — never a full sequence.
       * iOS expects a full down-up to toggle, and can drift out of sync when
       * CapsLock is pressed outside the webview. On any key event we check if
       * our cached CapsLock state diverges from the event's modifier state and
       * emit a full toggle sequence to resync.
       */
      function syncCapsLock(ev) {
        const current = ev.getModifierState && ev.getModifierState("CapsLock");
        if (current === undefined) return;
        if (current !== lastCapsLockState) {
          lastCapsLockState = current;
          sendCmd({ cmd: "key", direction: "Down", code: CAPS_LOCK_HID });
          sendCmd({ cmd: "key", direction: "Up", code: CAPS_LOCK_HID });
        }
      }

      function handleKeyEvent(ev) {
        if (!shouldForwardKey(ev)) return;
        syncCapsLock(ev);

        const isDown = ev.type === "keydown";

        // Multi-touch modifier → enter/exit two-finger mode, anchored at screen
        // center with the primary finger at the cursor. Shift+drag during
        // multi-touch moves the anchor.
        if (MULTITOUCH_CODES.has(ev.code)) {
          if (isDown && !isMultiTouching) {
            anchorPoint = { x: 0.5, y: 0.5 };
            // If we're mid-drag, smoothly promote the single touch to multi-touch
            // by issuing a Move with the second finger materialized.
            isMultiTouching = true;
            updateIndicators();
            if (isPressing) sendTouchEvent("Move");
          } else if (!isDown && isMultiTouching) {
            if (isPressing) sendTouchEvent("Up");
            isPressing = false;
            isMultiTouching = false;
            updateIndicators();
          }
          ev.preventDefault();
          return;
        }

        const code = HID[ev.code];
        if (code == null) return;
        if (code === CAPS_LOCK_HID) return; // handled by syncCapsLock

        if (isDown) {
          pressedKeys.add(code);
        } else {
          pressedKeys.delete(code);
        }
        sendCmd({ cmd: "key", direction: isDown ? "Down" : "Up", code });
        ev.preventDefault();
      }
      window.addEventListener("keydown", handleKeyEvent);
      window.addEventListener("keyup", handleKeyEvent);

      // Right-click over the stream is the "add comment" shortcut: same
      // outcome as left-clicking with inspect mode on, but works regardless
      // of whether inspect is currently active. Suppresses the native menu
      // either way so users can rely on it across the surface.
      window.addEventListener("contextmenu", (ev) => {
        const overStage = stage && stage.contains(ev.target);
        const overSpot = vp.spot && vp.spot.hit && vp.spot.hit.contains(ev.target);
        if (!overStage && !overSpot) return;
        ev.preventDefault();
        const r = streamRect();
        if (!r) return;
        const mr = mainEl.getBoundingClientRect();
        const x = (ev.clientX - mr.left - r.x) / r.w;
        const y = (ev.clientY - mr.top - r.y) / r.h;
        // Activate inspect mode so the spotlight is visible and the describe
        // loop keeps the tree fresh while the user composes a comment.
        if (!vp.inspect) setInspect(true);
        const tryPick = () => {
          if (!vp.tree) return false;
          const node = vpNodeAtPoint(vp.tree, x, y);
          if (!node) return false;
          vp.focus = node;
          vp.commentFor = node;
          paintSpot();
          openCommentPop(node);
          return true;
        };
        if (tryPick()) return;
        // Tree not loaded yet (inspect just turned on / cached tree expired) —
        // queue the click; describeOnce will resolve it once the tree lands.
        vp.pendingComment = { x, y };
        kickDescribe();
      });

      // On focus loss, release any active touches/keys so the device doesn't
      // stay stuck with a held finger or modifier.
      window.addEventListener("blur", releaseAllInput);

      window.addEventListener("beforeunload", teardownStream);

      // ── Variant proposals + element-comment inspector ───────────────────
      // Polls /preview/variants and /preview/describe, renders each proposed
      // element as a floating card connected by a thin line to its live
      // on-screen position, and provides an "Add comment" element inspector
      // (spotlight: blur+dim everything except the hovered element, click to
      // attach a comment). Picks + comments + annotations are pushed back to
      // the agent's await_user_selection via "Complete selection".
      const mainEl = document.getElementById("main");
      const cardsEl = document.getElementById("cards");
      const rootEl = document.getElementById("root");
      const connEl = document.getElementById("connectors");
      const popEl = document.getElementById("comment-pop");
      const annPop = document.getElementById("ann-pop");
      const osTop = document.getElementById("os-top");
      const osBot = document.getElementById("os-bot");
      const footEl = document.getElementById("footbar");
      const commentBtn = document.getElementById("comment-btn");
      const hiddenBadge = document.getElementById("hidden-badge");
      const completeBtn = document.getElementById("complete-btn");
      const clearBtn = document.getElementById("clear-btn");
      const completeNote = document.getElementById("complete-note");
      const globalCommentEl = document.getElementById("global-comment");
      const confirmModal = document.getElementById("confirm-modal");
      const confirmMsg = document.getElementById("confirm-msg");
      const confirmCancel = document.getElementById("confirm-cancel");
      const confirmYes = document.getElementById("confirm-yes");
      const successToast = document.getElementById("success-toast");
      const successText = document.getElementById("success-text");
      const SVGNS = "http://www.w3.org/2000/svg";

      const vp = {
        round: -1,
        proposals: [],
        staged: {}, // elementId -> variantId
        comments: {}, // elementId -> string
        annotations: [], // [{ id, target, match, comment }]
        tree: null,
        treeAt: 0,
        cards: new Map(), // id -> { el, sig, target, anim, animVel, home, pos, vel, pinned, gone, spawned, dragging }
        thumbFrames: {}, // id -> frozen frame for the static preview crop
        anchors: {}, // id -> last-matched element frame {x,y,width,height} (disambiguates shared labels by size)
        conn: new Map(), // id -> { path, dot } reused SVG nodes
        pinEls: new Map(), // annId -> reused pin element
        annId: 0,
        submitting: false,
        dragging: false,
        cardDragging: false,
        justCompletedRound: -1,
        inspect: false,
        focus: null, // describe node currently spotlighted
        commentFor: null, // describe node a comment-pop is open for
        spot: null, // spotlight layer root (child of mainEl)
        pinAnim: new Map(), // annId -> { p:{x,y}, v:{x,y} } spring-eased pin
        annPopFor: null, // annotation id whose review popover is open
        pendingComment: null, // { x, y } right-click awaiting tree-load to resolve
        trajSamples: [], // recent off-element pointer samples {x,y,t} in normalized stream coords
      };

      // iOS AX labels for elements that embed SF Symbol glyphs (tab bar
      // buttons, many toolbar items) include the glyph as a BMP private-use
      // code point. After stripping the unrenderable glyph, the leftover
      // commas (which separate the symbol from the human text) leak into
      // headers like `Comment on , , Favourites (6)`. cleanLabel removes
      // the private-use chars and collapses comma/space runs while
      // preserving case for display.
      function cleanLabel(s) {
        return (s || "")
          .replace(/[-]/g, "")
          .replace(/[,\s]+/g, " ")
          .trim();
      }
      // Display-friendly element name for the spotlight label, the
      // "Comment on …" header, and the annotation target. Prefers the
      // screen-reader-visible label/value over the developer-facing
      // identifier — on Android `identifier` is the raw resource-id
      // ("com.google.android.apps.nexuslauncher:id/search_container_hotseat")
      // which is hostile in a UI header. nodeMatch keeps the identifier
      // priority since that's still the most reliable matching key.
      function humanizeIdentifier(raw) {
        const s = (raw || "").trim();
        if (!s) return "";
        // Android resource-id shape: "<pkg>:id/<name>". iOS identifiers don't
        // carry the package prefix; pass them through unchanged after the
        // separator-to-space normalization below.
        const m = s.match(/^[\w.]+:id\/(.+)$/);
        const tail = m ? m[1] : s;
        return tail
          .replace(/[_\-.]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      function nodeDesc(n) {
        if (!n) return "element";
        const lab = cleanLabel(n.label);
        if (lab) return lab;
        const val = cleanLabel(n.value);
        if (val) return val;
        const id = humanizeIdentifier(n.identifier);
        if (id) return id;
        const role = (n.role || "").trim();
        return role || "element";
      }
      function nodeMatch(n) {
        if (n.identifier) return { by: "identifier", value: n.identifier };
        if (n.label) return { by: "label", value: n.label };
        if (n.value) return { by: "text", value: n.value };
        return { by: "role", value: n.role || "" };
      }

      // Smallest on-screen describe node matching a proposal's matcher.
      // iOS AX labels for elements that use SF Symbols (tab-bar buttons,
      // many toolbar items) embed the glyph as a BMP private-use code point.
      // The Map tab's raw label is `, , Map`, but the proposer
      // (LLM, doc snippet, human) sees and writes `Map`. Strict equality
      // `, , Map` !== `Map` silently failed. Strip BMP private-use
      // (U+E000-U+F8FF) and collapse the resulting comma/space runs so both
      // forms normalise to `map`; substring is then allowed on `by:"label"`
      // so a clean needle still hits a wrapped element.
      function vpNormLabel(s) {
        return (s || "")
          .toLowerCase()
          .replace(/[-]/g, "")
          .replace(/[\s,]+/g, " ")
          .trim();
      }
      function vpMatchNode(node, match, anchor) {
        const needle = vpNormLabel(match.value);
        const out = [];
        const walk = (n) => {
          if (!n || typeof n !== "object") return;
          const label = vpNormLabel(n.label);
          const ident = vpNormLabel(n.identifier);
          const value = vpNormLabel(n.value);
          const role = (n.role || "").toLowerCase();
          let hit;
          if (!needle) hit = false;
          else if (match.by === "label") hit = label === needle || label.includes(needle);
          else if (match.by === "identifier") hit = ident === needle;
          else if (match.by === "role") hit = role === needle;
          else hit = label.includes(needle) || ident.includes(needle) || value.includes(needle);
          if (hit && n.frame) out.push(n);
          if (Array.isArray(n.children)) n.children.forEach(walk);
        };
        walk(node);
        // Disambiguate elements that share a label (e.g. a "Favourites" tab AND
        // a "Favourites" header). The stable signal is SIZE, not position: an
        // element keeps its width/height as it scrolls (it can teleport across
        // the screen in a single frame on a fast scroll or a refresh and still
        // be the same element), whereas a different same-labeled element is a
        // very different size. So `anchor` (the matched element's last frame,
        // seeded from the propose-time frame) gates candidates by size, and
        // position is only a tie-breaker among the size-matches. When the real
        // target leaves the screen, the remaining same-labeled element fails the
        // size gate → the bubble goes off-screen instead of snapping onto it.
        // Without an anchor (older proposals / no frame) fall back to the
        // smallest sane box.
        const MAX_SIZE_RATIO = 2.5; // per dimension; header↔tab differ far more
        const sizeMatches = (f) => {
          const wr = Math.max(f.width, anchor.width) / Math.max(1e-6, Math.min(f.width, anchor.width));
          const hr =
            Math.max(f.height, anchor.height) / Math.max(1e-6, Math.min(f.height, anchor.height));
          return wr <= MAX_SIZE_RATIO && hr <= MAX_SIZE_RATIO;
        };
        let best = null,
          bestScore = Infinity;
        for (const n of out) {
          const f = n.frame;
          if (!f || f.width <= 0 || f.height <= 0) continue;
          const cx = f.x + f.width / 2,
            cy = f.y + f.height / 2;
          if (cx < 0 || cx > 1 || cy < 0 || cy > 1) continue;
          const a = f.width * f.height;
          // Ignore near-full-screen matches so a proposal that accidentally
          // resolves to a container root doesn't paint a screen-spanning
          // bubble. Same filter `vpNodeAtPoint` uses for the inspector pick.
          if (a > THEME.spotMaxFrameArea) continue;
          let score;
          if (anchor) {
            if (!sizeMatches(f)) continue; // wrong size → not this element
            // Nearest to the last-known position wins (only matters when two
            // same-sized, same-labeled elements are both on screen).
            score = Math.hypot(cx - (anchor.x + anchor.width / 2), cy - (anchor.y + anchor.height / 2));
          } else {
            score = a;
          }
          if (score < bestScore) {
            bestScore = score;
            best = n;
          }
        }
        return best;
      }

      // Smallest on-screen node whose frame contains a normalized point
      // (inspector pick). Deliberately NOT gated on element text: an icon-only
      // pressable (a star button, a bare <Pressable>, an image button) has no
      // label/value/identifier, so the old text gate made it un-hoverable.
      // "Innermost" falls out of smallest-area, so a labelled child still wins
      // over its container without any role/interactivity heuristic (those
      // overfit per-platform and Android/iOS expose traits differently). The
      // on-screen guard — positive size + centre within the viewport, the same
      // test vpMatchNode uses — keeps scrolled-away / zero-size tree nodes from
      // being selected (the earlier "I can pick things that aren't visible"
      // regression), generalised rather than special-cased.
      //
      // The describe ROOT node (an "AXGroup" that spans the whole stream) is
      // treated as if it did not exist: it contains every point, so without
      // this it would be the smallest match over empty gaps — making the
      // whole screen the "element" (full-stream focus, no release path ever
      // fires) and visually swallowing small nested pressables. Skipping it
      // means a gap returns null → the trajectory-based release applies, and
      // real descendants are still picked normally.
      //
      // The `isRoot` flag handles iOS's single explicit root. Android dumps
      // tend to expose multiple full-screen-or-near container Views below the
      // root, so we also drop any node whose frame covers more than
      // spotMaxFrameArea of the screen — a generic size filter that catches
      // those Android wrappers (and any future near-root container on either
      // platform) without per-platform special-casing.
      function vpNodeAtPoint(node, x, y) {
        let best = null,
          bestArea = Infinity;
        const walk = (n, isRoot) => {
          if (!n || typeof n !== "object") return;
          const f = n.frame;
          if (
            !isRoot &&
            f &&
            f.width > 0 &&
            f.height > 0 &&
            x >= f.x &&
            x <= f.x + f.width &&
            y >= f.y &&
            y <= f.y + f.height
          ) {
            const cx = f.x + f.width / 2,
              cy = f.y + f.height / 2;
            const onScreen = cx >= 0 && cx <= 1 && cy >= 0 && cy <= 1;
            const a = f.width * f.height;
            if (onScreen && a < bestArea && a <= THEME.spotMaxFrameArea) {
              bestArea = a;
              best = n;
            }
          }
          if (Array.isArray(n.children)) n.children.forEach((c) => walk(c, false));
        };
        walk(node, true);
        return best;
      }

      // Stream image rect, in coordinates relative to #main.
      function streamRect() {
        if (!img) return null;
        const ir = img.getBoundingClientRect();
        const mr = mainEl.getBoundingClientRect();
        if (!ir.width || !ir.height) return null;
        return { x: ir.left - mr.left, y: ir.top - mr.top, w: ir.width, h: ir.height };
      }
      function elementPoint(frame) {
        const r = streamRect();
        if (!r) return null;
        return {
          x: r.x + (frame.x + frame.width / 2) * r.w,
          y: r.y + (frame.y + frame.height / 2) * r.h,
        };
      }

      // Proposals change rarely → poll on a relaxed interval.
      async function pollVariants() {
        try {
          const res = await fetch(`${TOOL_SERVER}/preview/variants`, { cache: "no-store" });
          if (res.ok) {
            const snap = await res.json();
            if (snap.round !== vp.round) {
              if (!vp.submitting && !vp.dragging) {
                const hadWork =
                  Object.keys(vp.staged).length > 0 ||
                  vp.annotations.length > 0 ||
                  (globalCommentEl && globalCommentEl.value);
                const prev = vp.round;
                vp.round = snap.round;
                vp.staged = {};
                vp.comments = {};
                vp.annotations = [];
                vp.thumbFrames = {};
                vp.anchors = {};
                if (globalCommentEl) globalCommentEl.value = "";
                if (vp.justCompletedRound === snap.round) {
                  /* keep our own success note */
                } else if (prev >= 0 && hadWork) {
                  setNote("Agent started a new round — previous selections cleared.");
                } else setNote("");
              }
            }
            vp.proposals = Array.isArray(snap.proposals) ? snap.proposals : [];
          }
        } catch {
          /* keep last state */
        }
        vpRender();
      }

      // Element geometry changes continuously as the user scrolls the device,
      // so poll describe as fast as it can answer (self-scheduling, never
      // overlapping) — combined with vpTick easing, the lines track the stream.
      let describeInFlight = false;
      // Set once when a new simulator connects so the first describe fires
      // even before any inspect-mode interaction, warming the platform's
      // accessibility service. The flag self-clears the first time we land a
      // tree, so steady-state polling is unaffected.
      let describeWarmupPending = false;
      async function describeOnce() {
        const need =
          currentUdid && (vp.proposals.length > 0 || vp.inspect || describeWarmupPending);
        if (need && !describeInFlight) {
          describeInFlight = true;
          // Bound each request — describe is polled ~3×/s now, so a single
          // stuck socket must not latch describeInFlight and stall the loop.
          const ac = new AbortController();
          const killer = setTimeout(() => ac.abort(), 4000);
          try {
            const d = await fetch(
              `${TOOL_SERVER}/preview/describe/${encodeURIComponent(currentUdid)}`,
              { cache: "no-store", signal: ac.signal }
            );
            if (d.ok) {
              const j = await d.json();
              if (j && j.tree) {
                vp.tree = j.tree;
                vp.treeAt = Date.now();
                describeWarmupPending = false;
                // A right-click that landed before the tree was loaded waits
                // here; the first successful describe completes the pick.
                const pc = vp.pendingComment;
                if (pc) {
                  const node = vpNodeAtPoint(vp.tree, pc.x, pc.y);
                  if (node) {
                    vp.pendingComment = null;
                    vp.focus = node;
                    vp.commentFor = node;
                    paintSpot();
                    openCommentPop(node);
                  }
                }
              }
            }
          } catch {
            /* describe best-effort (incl. abort/timeout) */
          } finally {
            clearTimeout(killer);
            describeInFlight = false;
          }
        }
        if (Date.now() - vp.treeAt > THEME.treeStaleMs) vp.tree = null;
        vpRender();
      }
      // Interruptible delay: an un-skippable floor (rate ceiling), then a
      // remainder that a kick (device interaction) can cut short. A kick that
      // lands during the floor is remembered so a single tap still re-describes
      // promptly. Reset per wait so only kicks during *this* wait count.
      let describeWaker = null;
      let describeKicked = false;
      function kickDescribe() {
        describeKicked = true;
        const w = describeWaker;
        if (w) {
          describeWaker = null;
          w();
        }
      }
      function describeDelay(ms, floorMs) {
