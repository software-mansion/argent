name: Windows E2E

on:
  push:
    branches:
      - feat/windows-support
      - feat/android-emulator-support
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Cheap-but-thorough first pass: build everything, run unit tests, exercise
  # the CLI's offline surface (init, tools list, mcp dispatcher). Runs on
  # every push so cross-platform regressions are caught immediately, without
  # paying for a 6-minute Android-emulator boot every time.
  windows-build-and-cli:
    name: Build + unit + CLI smoke (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Patch rollup native bindings (Windows)
        run: npm install @rollup/rollup-win32-x64-msvc --no-save

      - name: Build workspace
        run: npm run build

      - name: Run unit tests
        run: npm test --workspaces --if-present
        shell: pwsh

      - name: Pack the publishable @swmansion/argent
        # Builds the workspace and runs the @swmansion/argent bundler. The
        # download step pulls only `simulator-server-argent-macos` —
        # see scripts/download-simulator-server.cjs for why we don't ship
        # vanilla Windows / Linux variants.
        run: |
          node scripts/download-simulator-server.cjs
          npm run build
          npm run build -w @swmansion/argent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert the bundle does NOT contain a Windows simulator-server
        # We deliberately do NOT ship `simulator-server.exe` in
        # `@swmansion/argent` until upstream radon publishes
        # `simulator-server-argent-windows.exe` (streaming-stripped). This
        # step guards against an accidental regression that re-adds the
        # vanilla binary to the bundle.
        shell: pwsh
        run: |
          $bin = "packages\argent\bin\simulator-server.exe"
          if (Test-Path $bin) {
            throw "Regression: $bin must not ship until upstream argent-windows is published. See scripts/download-simulator-server.cjs for the rationale."
          }
          # The macOS argent binary IS expected — proves the bundle pipeline
          # ran end-to-end.
          if (-not (Test-Path "packages\argent\bin\simulator-server")) {
            throw "Bundle missing the macOS simulator-server."
          }

      - name: Run argent CLI offline smoke
        shell: pwsh
        timeout-minutes: 2
        run: |
          # `argent --version` exercises the dispatcher's argv parsing and
          # version-string lookup. The tool-server bundle's `--get-available-tools`
          # mode dumps the registry and exits, which proves the bundle loaded
          # without crashing on Windows-only paths (no /bin/sh, /tmp, /dev/null
          # at module load). Calling the tool-server bundle directly instead of
          # `argent tools` because the CLI's `tools` subcommand starts a
          # long-running server, not a one-shot lister.
          node packages\argent\dist\cli.js --version
          node packages\argent\dist\tool-server.cjs --get-available-tools | Out-Null

      - name: Assert simulator-server resolver fails closed on Windows
        shell: pwsh
        run: node scripts/assert-windows-fails-closed.cjs

  # Real Android emulator + drive a tool through the full tool-server
  # transport. Disabled today because:
  #   1. `@swmansion/argent` doesn't ship a Windows simulator-server (the
  #      vanilla `simulator-server-windows.exe` retains the streaming
  #      surface the macOS argent build deliberately strips). Until
  #      upstream radon publishes `simulator-server-argent-windows.exe`,
  #      the tool-server resolver fail-closes on Windows.
  #   2. Hosted `windows-latest` runners with WHPX available still stall
  #      Android-34 google_apis/x86_64 graphics init past 20 minutes —
  #      the runner is not a reliable proxy for a real Windows machine.
  # Re-enable by changing `if` to `github.event_name == 'workflow_dispatch'`
  # once both blockers clear. Until then, drive `scripts/windows-e2e.cjs`
  # against a local UTM/Parallels VM (see `docs/windows-support.md`).
  windows-android-e2e:
    name: Android emulator E2E (windows-latest)
    if: false
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Patch rollup native bindings (Windows)
        run: npm install @rollup/rollup-win32-x64-msvc --no-save

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools emulator system-images;android-34;google_apis;x86_64"

      - name: Add Android SDK binaries to PATH
        # `setup-android` sets ANDROID_HOME but doesn't append `emulator/` or
        # `platform-tools/` to PATH on Windows, so bare `emulator` /
        # `avdmanager` calls below would fail with "not recognized as a
        # cmdlet". Append both so the rest of the job can call them by name.
        shell: pwsh
        run: |
          "$env:ANDROID_HOME\emulator" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "$env:ANDROID_HOME\platform-tools" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "$env:ANDROID_HOME\cmdline-tools\latest\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Verify emulator acceleration
        # WHPX (Windows Hypervisor Platform) ships with windows-latest.
        # `accel-check` exits 0 when a hypervisor is usable; non-zero means
        # the emulator will fall back to TCG (slow but functional). Don't
        # fail the job on missing acceleration — the emulator still boots,
        # it just takes longer.
        shell: pwsh
        run: emulator -accel-check; if ($LASTEXITCODE -ne 0) { Write-Warning "no hypervisor accel; falling back to TCG" }

      - name: Create AVD
        shell: pwsh
        run: |
          # Pipe a literal "no" to the avdmanager prompt about custom hardware
          # profiles. The `Write-Output` form is portable across PowerShell
          # versions on windows-latest.
          "no" | avdmanager create avd --force --name argent_e2e `
            --abi google_apis/x86_64 --package "system-images;android-34;google_apis;x86_64"

      - name: Build argent
        run: |
          node scripts/download-simulator-server.cjs
          npm run build
          npm run build -w @swmansion/argent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Launch Android emulator
        shell: pwsh
        run: |
          # Headless boot. `-no-window` skips the GUI; `-no-snapshot` and
          # `-no-snapshot-save` force a clean cold boot end-to-end (no AVD
          # state mutation across runs). `-no-audio` / `-no-boot-anim`
          # eliminate slow-path shaders. `-no-metrics` blocks a Google
          # telemetry call that's been observed to add ~20s on Windows CI.
          # `-accel on` is the safe form on windows-latest where WHPX is
          # available; on a host without WHPX the emulator quietly falls
          # back to TCG. Background the process — the next step polls for
          # boot completion via adb.
          Start-Process -FilePath emulator -ArgumentList @(
            "-avd","argent_e2e",
            "-no-window","-no-snapshot","-no-snapshot-save","-no-audio","-no-boot-anim",
            "-no-metrics","-accel","on","-gpu","swiftshader_indirect","-verbose"
          ) -RedirectStandardOutput emulator.log -RedirectStandardError emulator.err.log

      - name: Wait for emulator to fully boot
        shell: pwsh
        timeout-minutes: 25
        run: |
          # 25-minute window: hosted Windows runners boot Android-34
          # google_apis/x86_64 in 6-15 minutes when WHPX cooperates and as
          # long as 20+ minutes when graphics init stalls. Aborting earlier
          # would catch a slow-but-healthy boot as a failure.
          $deadline = (Get-Date).AddMinutes(25)
          while ((Get-Date) -lt $deadline) {
            $serial = (& adb devices) -split "`n" `
              | Where-Object { $_ -match "^emulator-\d+\s+device" } `
              | Select-Object -First 1
            if ($serial) {
              $serial = ($serial -split '\s+')[0]
              $ready = & adb -s $serial shell getprop sys.boot_completed 2>$null
              if ($ready.Trim() -eq "1") {
                Write-Output "Emulator $serial fully booted"
                exit 0
              }
            }
            Start-Sleep -Seconds 5
          }
          Write-Error "Emulator never reported sys.boot_completed=1 within deadline"
          Get-Content emulator.log -Tail 80
          Get-Content emulator.err.log -Tail 80
          exit 1

      - name: Run argent E2E flow against emulator
        shell: pwsh
        env:
          ARGENT_E2E: "1"
        run: node scripts/windows-e2e.cjs

      - name: Capture emulator logs on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path emulator.log) { Get-Content emulator.log -Tail 200 }
          if (Test-Path emulator.err.log) { Get-Content emulator.err.log -Tail 200 }

      - name: Stop emulator
        if: always()
        shell: pwsh
        run: |
          $serial = (& adb devices) -split "`n" `
            | Where-Object { $_ -match "^emulator-\d+\s+device" } `
            | ForEach-Object { ($_ -split '\s+')[0] } `
            | Select-Object -First 1
          if ($serial) { & adb -s $serial emu kill }
