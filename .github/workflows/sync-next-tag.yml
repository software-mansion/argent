name: Sync 'next' dist-tag

# Re-points the `next` npm dist-tag at the highest published version of
# @swmansion/argent (prerelease or stable). Runs automatically after either
# publish workflow succeeds; the manual trigger repairs `next` without
# republishing — e.g. when it has drifted behind `latest`.

on:
  workflow_run:
    workflows:
      - "Publish to npm"
      - "Publish prerelease to npm (next)"
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report what would change without mutating the dist-tag"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # A manual dispatch always runs; an automatic run only follows a
    # *successful* publish (a failed publish has nothing new to sync).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@swmansion"

      # Dependency-free script — no `npm ci` needed.
      - name: Sync 'next' dist-tag to highest published version
        run: node scripts/sync-next-dist-tag.mjs ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
