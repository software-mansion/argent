name: Publish prerelease to npm (next)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to publish (e.g. v0.6.0-next.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@swmansion"

      - name: Verify package version is a prerelease
        run: |
          VERSION=$(node -p "require('./packages/argent/package.json').version")
          echo "Resolved version: $VERSION"
          if [[ "$VERSION" != *-* ]]; then
            echo "::error::Version '$VERSION' is not a SemVer prerelease (no '-IDENTIFIER' suffix). Refusing to publish under the 'next' dist-tag." >&2
            echo "Bump the version in packages/argent/package.json to e.g. ${VERSION}-next.0 before running this workflow." >&2
            exit 1
          fi

      - name: Resolve native binaries tag
        id: binaries_tag
        run: |
          REF="${{ inputs.ref }}"
          echo "tag=argent-${REF//\//-}" >> $GITHUB_OUTPUT

      - name: Download signed simulator-server binary
        run: bash scripts/download-simulator-server.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download signed native binaries (dylibs + ax-service)
        run: bash scripts/download-native-binaries.sh "${{ steps.binaries_tag.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - run: npm run build -w @swmansion/argent

      - run: test -x packages/argent/bin/simulator-server
      - run: test -x packages/argent/bin/ax-service
      - run: test -f packages/argent/dylibs/libNativeDevtoolsIos.dylib
      - run: test -f packages/argent/dylibs/libKeyboardPatch.dylib
      - run: test -f packages/argent/dylibs/libArgentInjectionBootstrap.dylib
      - run: npm pack --dry-run -w @swmansion/argent

      - run: npm publish -w @swmansion/argent --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
