# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
version: 2

updates:
  # npm: root + every workspace package (packages/*)
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    ignore:
      # tree-sitter 0.25.0 ships no Node 24 prebuilds and its binding.gyp forces
      # C++17 while Node 22+ v8 (cppgc) headers require C++20, so the native
      # build fails `npm install`/`npm ci` on current Node. Stay on ^0.21.1,
      # which ships N-API prebuilds (no compile). Patch updates stay allowed;
      # drop this ignore once upstream restores prebuilt binaries.
      - dependency-name: "tree-sitter"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      # Batch all minor + patch updates into one PR per week to cut noise.
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Keep majors grouped but separate, since they typically need human review.
      npm-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
      # Group security updates across all directories.
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions used by workflows under .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
